body:
  text: 養性延命錄教誡篇第一神農經曰食谷者智慧聰明食石者肥澤不老謂煉五石也食芝者延年不死食元氣者地不能埋天不能殺是故食藥者與天相翼日月並列混元道經曰穀神不死河上公曰谷養也能養神則不死神為五臟之神肝藏魂肺藏魄心藏神腎藏精脾藏志五臟盡傷則五神去是謂玄牝言不死之道在於玄牝玄天地天於人為鼻牝地也地於人為口天食人以五氣從鼻入藏於心五氣清微為精神聰明音聲五性其鬼曰魂魂者雄也出入人鼻與天通故鼻為玄也地食人以五味從口入藏於胃五味濁滯為形骸骨肉血脈六情其鬼曰魄魄者雌也出入於口與地通故口為牝也玄牝之門是謂天地根根原也言鼻口之門乃是天地之元氣所從往來也綿綿若存鼻口呼吸喘息當綿綿微妙若可存復若無有也用之不勤用氣當寬舒不當急疾勤勞混元道德經曰出生謂情欲出於五內魂定魄靜故生也入死謂情欲入於胸臆精散神惑故死也生之徒十有三死之徒十有三言生死之類各十有三謂之九竅而四關也其生也目不妄視耳不妄聽鼻不妄嗅口不妄言手不妄持足不妄行精不妄施其死也反是人之生也動皆之死地十有三人慾求生動作反之十有三之死地夫何故以其求生之厚也所以動之死地者以其求生之活之太厚也遠道反天妄行失紀蓋聞善攝生者陸行不遇兕虎入軍不被甲兵兕無所投其角虎無所措其爪兵無所容其刃夫何故以其無死地以其不犯上十有三之死地也莊子養生篇曰吾生也有涯向秀曰生之所稟各有極也而智也無涯嵇康曰夫不慮而欲性之動也識而發感智之用也性動者遇物而當足則無餘智從感不求倦而不已故世之所患恆在於智困不在性動也以有涯隨無涯殆已郭象曰以有限之性尋無趣之智安得而不困哉已而為智者殆而已矣向秀曰已困於智矣又為智以救之者又殆矣莊子曰達生之情者不務生之所無以為向秀曰生之所無以為者分外物也張湛曰生理自全為分外所為此是以有涯隨無涯也達命之情者不務智之所無奈何時秀曰命盡而死者是張湛曰乘生順之理窮所稟分豈智所知何也列子曰少不勤行壯不競時長而安貧老而寡欲閒心榮形養生之方也列子曰一體之盈虛消息皆通於天地應於萬類張湛曰人與陰陽通氣和之於始和之於終靜神滅想生之道也始終和則神志不散混元妙真經曰人常失道非道失人人常去生非生去人故養生者慎勿失道為道者慎勿失生使道與生相守生與道相保黃老經玄示曰天道施化與萬物無窮人道施化形神消亡轉神施精精竭故衰形本生精精生於神不以生施故能與天合德不與神化故能與道同式玄示曰以形化者尸解之類神與形離二者不俱遂象飛鳥入海為蛤而隨季秋陰陽之氣以氣化者生可冀也以形化者甚可畏也嚴君平老子指歸曰遊心於虛靜結志於微妙委慮於無欲歸計於無為故能達生延命與道為久大有經曰或疑者云始同起於無外終受氣於陰陽載形魄於天地資生長於食息而有愚有智有強有弱有壽有夭天耶人耶解者曰夫形生愚智天也強弱壽夭人也天道自然人道自己始而胎氣充實生而乳食有餘長而滋味不足壯而聲色有節者強而壽始而胎氣虛耗生而乳食不足長而滋味有餘壯而聲色自放者弱而夭生長全足加之導養年未可量道機曰人生而命有長短者非自然也皆由將身不謹飲食過差淫泆無度忤逆陰陽魂神不守精竭命衰百病萌生故不終其壽河圖帝視萌曰侮天時者凶順天時者吉春夏樂山高處秋冬居卑深藏吉利多福壽考無窮洛書寶予命曰古人治病之方和以醴泉潤以元氣藥不辛不苦甘甜多味常能服之津流五臟系在心肺終身無患孔子家語曰食肉者勇敢而悍虎狼之類食氣者神明而壽仙人靈龜是也食谷者智慧而夭人也不食者不死而神直任喘息而無思慮傳曰雜食者百病妖邪所鍾所食愈少心愈開年愈益所食愈多心愈寒年愈損焉太史公司馬談曰夫神者生之本形者生之具也神大用則竭形大勞則斃神形早衰欲與天地長久非所聞也故人所以生者神也神之所託者形也神形離別則死死者不可復生離者不可復返故乃聖人重之夫養生之道有都領大歸未能具其會者但思每與俗反則暗踐勝轍獲過半之功矣有心之徒可不察歟小有經曰少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡行此十二少養生之都契也多思則神殆多念則志散多欲則損志多事則形疲多語則氣爭多笑則傷臟多愁則心懾多樂則意溢多喜則忘錯昏亂多怒則百脈不定多好則專迷不治多惡則憔煎無歡此十二多不除喪生之本也無多者幾乎真人大計奢懶者壽慳勤者夭放散劬恡之異也田夫壽膏粱夭嗜欲少多之驗也處士少疾遊子多患事務繁簡之殊也故俗人競利道士罕營胡昭曰目不欲視不正之色耳不欲聽醜穢之言鼻不欲向膻腥之氣口不欲嘗毒刺之味心不欲謀欺詐之事此辱神損壽又居常而嘆息晨夜而吟嘯干正來邪也夫常人不得無欲又復不得無事但當和心少念靜身捐慮先去亂神犯性此則嗇神之一術也黃庭經曰玉池清水灌靈根審能修之可長存名曰飲食自然自然者則是華池華池者口中唾也呼吸如法咽之則不飢也老君尹氏內解曰唾者湊為醴泉聚為玉漿流為華池散為精浮降為甘露故口為華池中有醴泉漱而咽之溉臟潤身流利百脈化養萬神支節毛髮宗之而生也中經曰靜者壽躁者夭靜而不能養減壽躁而能養延年然靜易御躁難將盡順養之宜者則靜亦可養躁亦可養韓融元長曰酒者五穀之華味之至也亦能損人然美物難將而易過養性所宜慎之邵仲湛曰五穀充肌體而不能益壽百藥療疾延年而不甘口甘口充肌者俗人所珍苦口延年者道士之所寶素問曰黃帝問岐伯曰余聞上古之人春秋皆百歲而動作不衰謂血氣猶盛也今時之人年始半百動作皆衰者時世異耶將人之失耶岐伯曰上古之人其知道者法則陰陽和於術數房中交接之法飲食有節起居有度不妄動作故能形與神俱盡終其天年壽過百歲今時之人則不然以酒為漿以妄為常醉以入房以欲竭其精以好散其真不知持滿不識御神務快其心遊於陰陽生活起居無節無度故半百而衰也老君曰人生大期百年為限節護之者可至千歲如膏之用小炷與大耳眾人大言而我小語眾人多煩而我少記眾人悸暴而我不怒不以人事累意不修仕祿之業淡然無為神氣自滿以為不死之藥天下莫我知也無謂幽冥無知人情無謂闇昧神見人形心言小語鬼聞人聲犯禁滿千地收人形人為陽善吉人報之人為陰善鬼神報之人為陽惡賊人治之人為陰惡鬼神治之故天不欺人依以影地不欺人依以響老君曰人修善積德而遇其凶禍者受先人之餘殃也犯禁為惡而遇其福者蒙先人之餘慶也名醫敘病論曰世人不終耆壽咸多夭歿者皆由不自愛惜忿爭盡意邀名射利聚毒攻神內傷骨髓外貶筋肉血氣將無經脈便擁肉理空疏唯招蠱疾正氣日衰邪氣日盛矣不異舉滄波以注爝火頹華嶺而斷涓流語其易也甚於茲矣彭祖曰道不在煩但能不思衣不思食不思聲不思色不思勝不思負不思失不思得不思榮不思辱心不勞形不極常導引納氣胎息爾可得千歲欲長生無限者當服上藥仲長統曰蕩六情五性有心而不以之思有口而不以之言有體而不以之安安之而能遷樂之而不愛以之圖之不知日之益也不知物之易也其彭祖老聃庶幾不然彼何為與人者同類而與人者異壽陳紀元方曰百病橫夭多由飲食飲食之患過於聲色聲色可絕之逾年飲食不可廢之一日為益亦多為患亦切多則切傷少則增益張湛云凡脫貴勢者雖不中邪精神內傷身必死亡非妖禍外侵直由冰炭內煎則自崩傷中嘔血也始富後貧雖不中邪皮焦筋出委闢為攣貧富之於人利害猶於權勢故痾疹損於形骸而已動勝寒靜勝熱能動能靜所以長生精氣清靜乃與道合莊子曰真人其寢不夢慎子云晝無事者夜不夢張道人年百數十甚翹壯也云養性之道莫久行久坐久臥久視久聽莫強食飲莫大沉醉莫大憂愁莫大哀思此所謂能中和能中和者必久壽也仙經曰我命在我不在天但愚人不能知此道為生命之要所以致百病風邪者皆由恣意極情不知自惜故虛損生也譬如枯朽之木遇風即折將崩之岸值水先頹今若不能服藥但知愛精節情亦得一二百年壽也張湛養生集敘曰養生大要一曰嗇神二曰愛氣三曰養形四曰導引五曰言語六曰飲食七曰房室八曰反俗九曰醫藥十曰禁忌過此以往義可略焉青牛道士言人不欲使樂樂人不壽但當莫強健為力所不任舉重引強掘地苦作倦而不息以致筋骨疲竭耳然於勞苦勝於逸樂也能從朝至暮常有所為使之不息乃快但覺極當息息復為之此與導引無異也夫流水不腐戶樞不朽者以其勞動數故也飽食不用坐與臥欲得行步務作以散之不爾使人得積聚不消之疾及手足痹蹶面目黧皯必損年壽也皇甫隆問青牛道士青牛道士姓封字君達其養性法則可施用大略云體欲常勞食欲常少勞無過極少無過虛去肥濃節鹹酸減思慮捐喜怒除馳逐慎房室武帝行之有效彭祖曰人之受氣雖不知方術但養之得理常壽之一百二十歲不得此者皆傷之也小復曉道可得二百四十歲復微加藥物可得四百八十歲嵇康亦云導養得理上可壽千歲下可壽百年彭祖曰養壽之法但莫傷之而已夫冬溫夏涼不失四時之和所以適身也彭祖曰重衣厚褥體不勞苦以致風寒之疾厚味脯臘醉飽厭飫以致聚結之病美色妖麗嬪妾盈房以致虛損之禍淫聲哀音怡心悅耳以致荒耽之惑馳騁遊觀弋獵原野以致發狂之失謀得戰勝兼弱取亂以致驕逸之敗蓋聖賢或失其理也然養生之具譬猶水火不可失適反為害耳彭祖曰人不知道徑服藥損傷血氣不足肉理空疏髓腦不實內已先病故為外物所犯風寒酒色以發之耳若本充實豈有病乎仙人曰罪莫大於淫禍莫大於貪咎莫大於讒此三者禍之車小則危身大則危家若欲延年少病者誡勿施精命夭殘勿大溫消骨髓勿大寒傷肌肉勿咳唾失肥液勿卒呼驚魂魄勿久泣神悲慼勿恚怒神不樂勿念內志恍惚能行此道可以長生食誡篇第二真人曰雖常服藥物而不知養性之術亦難以長生也養性之道不欲飽食便臥及終日久坐皆損壽也人慾小勞但莫至疲及強所不能堪勝耳人食畢當行步躊躇有所修為為快也故流水不腐戶樞不朽蠹以其勞動數故也故人不要夜食食畢但當行中庭如數里可佳飽食即臥生百病不消成積聚也食欲少而數不欲頓多難銷常如飽中飢飢中飽故養性者先飢乃食先渴而飲恐覺飢乃食食必多盛渴乃飲飲必過食畢當行行畢使人以粉摩腹數百過大益也青牛道士言食不欲過飽故道士先飢而食也飲不欲過多故道士先渴而飲也食畢行數百步中益也暮食畢行五里許乃臥令人除病凡食先欲得食熱食次食溫暖食次冷食食熱暖食訖如無冷食者即吃冷水一兩咽甚妙若能恆記即是養性之要法也凡食欲得先微吸取氣咽一兩咽乃食主無病真人言熱食傷骨冷食減臟熱物灼唇冷物痛齒食訖踟躕長生飽食勿大語大飲則血脈閉大醉則神散春宜食辛夏宜食酸秋宜食苦冬宜食鹹此皆助五臟益血氣闢諸病食酸鹹甜苦即不得過分食春不食肝夏不食心秋不食肺冬不食腎四季不食脾如能不食此五臟尤順天理燕不可食入水為蛟蛇所吞亦不宜殺之飽食訖即臥成病背疼飲酒不欲多多即吐吐不佳醉臥不可當風亦不可用扇皆損人白蜜勿合李子同食傷五內醉不可強食令人發癰疽生瘡醉飽交接小者令人面皯咳嗽不幸傷絕臟脈損命凡食欲得恆溫暖宜入易銷勝於習冷凡食皆熟勝於生少勝於多飽食走馬成心癡飲水勿忽咽之成氣病及水癖人食酪勿食酢變為血痰及尿血食熱食汗出勿洗面令人失顏色面如蟲行食熱食訖勿以醋漿漱口令人口臭及血齒馬汗息及馬毛入食中亦能害人雞兔犬肉不可合食爛茅屋上水滴浸諸脯名曰郁脯食之損人久飢不得飽食飽食成癖病飽食夜臥失覆多霍亂死時病新瘥勿食生魚成痢不止食生魚勿食乳酪變成蟲食兔肉勿食乾薑成霍亂人食肉不用取上頭最肥者必眾人先目之食者變成結氣及疰癘食皆然空腹勿食生果令人膈上熱骨蒸作癰癤銅器蓋食汗出落食中食之發瘡肉疽觸寒未解食熱食亦作剌風飲酒熱未解勿以冷水洗面令人面發瘡飽食勿沐發沐發令人作頭風蕎麥和豬肉食不過三頓成熱風干脯勿置秫米甕中食之閉氣干脯火燒不動出火始動擘之筋縷相交者食之患人或殺人羊胛中有肉如珠子者名羊懸筋食之患癲癇諸濕食不見形影者食之成疰腹脹暴疾後不周飲酒膈上變熱新病瘥不用食生棗羊肉生菜損顏色終身不復多致死膈上熱蒸凡食熱脂餅物不用飲冷醋漿水善失聲苦咽生蔥白合蜜食害人切忌干脯得水自動殺人曝肉作脯不肯燥勿食羊肝勿合椒食傷人心胡苽合羊肉食之發熱多酒食肉名曰癡脂憂狂無恆食良藥五穀充悅者名曰中士猶慮疾苦食氣保精存神名曰上士與天同年雜誡忌禳害祈善篇第三久視傷血久臥傷氣久立傷骨久坐傷肉凡遠思強健傷人憂恚悲哀傷人喜樂過差傷人忿怒不解傷人汲汲所願傷人慼慼所患傷人寒熱失節傷人陰陽不交傷人凡交須依導引諸術若能避眾傷之事而復陰陽之術則是不死之道大樂氣飛揚大愁氣不通用精令人氣力乏多視令人目盲多睡令人心煩貪美食令人泄痢俗人但知貪於五味不知元氣可飲聖人知五味之生病故不貪知元氣可服故閉口不言精氣自應也唾不咽則海不潤海不潤則津液乏是知服元氣飲醴泉乃延年之本也沐浴無常不吉夫婦同沐浴不吉新沐浴及醉飽遠行歸還大疲倦並不可行房室之事生病切慎之丈夫勿頭北臥令人六神不安多愁忘勿跂井今古大忌若見十步地牆勿順牆坐臥被風吹發癲癇疾勿怒目久視日月失目明凡大汗忽脫衣不慎多患偏風半身不遂新沐浴了不得露頭當風不幸得大風刺風疾觸寒來勿臨面火上成癇起風眩凡汗勿跂床懸腳久成血痹足重腰疼凡腳汗勿入水作骨痹亦作遁疰久忍小便膝冷兼成冷痹凡食熱物汗出勿當風發疰頭痛令人目澀饒淚凡欲眠勿歌詠不祥起眠訖勿大語損人氣凡飛鳥投人不可食焉若開口及毛下有瘡並不可食之凡熱泔洗頭冷水濯成頭風凡人臥頭邊勿安火爐令人頭重目赤鼻乾凡臥訖頭邊勿安燈令人六神不安冬日溫足凍腦春秋腦足俱凍此乃聖人之常法也凡新哭泣訖便食即成氣病夜臥勿覆頭婦人勿跂灶坐大忌凡若唾不用遠遠即成肺病令人手重背疼咳嗽凡人魘勿點燈照定魘死暗喚之即吉亦不可近前及急喚凡人臥勿開口久成消渴並失血色凡旦起勿以冷水開目洗面令人目澀失明饒淚凡行途中觸熱逢河勿洗面生烏皯人睡訖忽覺勿飲水更臥成水痹凡時病新瘥汗解勿飲冷水損人心腹不平復凡空腹不可見聞臭屍氣入鼻令人成病凡欲見死屍皆須先飲酒及咬蒜闢毒氣凡小兒不用令指月兩耳後生瘡是斷名月蝕瘡搗蛤蟆末敷即瘥並別余瘡並不生凡產婦不可見狐臭人能令產婦著腫凡人臥不用於窗欂下令人六神不安凡臥春夏欲得頭向東秋冬頭向西有所利益凡丈夫飢欲得坐小便飽則立小便令人無病凡人睡欲得屈膝側臥益人氣力凡臥欲得數轉側微語笑欲令至少語莫令聲高大春欲得暝臥早起夏秋欲得侵夜臥早起冬欲得早臥晏起皆有所益雖云早起莫在雞鳴前晏起莫在日出後冬日天地閉陽氣藏人不欲勞作汗出發泄陽氣損人新沐浴訖勿當風失語勿以濕頭臥使人患頭風眩悶發頹面腫齒痛耳聾濕衣及汗衣皆不可久著令發瘡及患風瘙癢老君曰正月旦中庭向寅地再拜咒曰某甲年年受大道之恩太清玄門願還某甲去歲之年男女皆三通自咒常行此道延年玄女有清神之法淮南崇祠灶之規咸欲體合真靈護衛真生者仙經秘要常存念心中有氣大如雞子內赤外黃闢眾邪延年也欲卻眾邪百鬼常存為炎火如斗煌煌光明則百邪不敢幹人可入瘟疫之中暮臥常存作赤氣在外白氣在內以覆身闢眾邪鬼魅老君曰凡人求道勿犯五逆六不祥有犯者凶大小便向西一逆向北二逆向日三逆向月四逆仰視天及星辰五逆夜起裸形一不祥旦起嗔恚二不祥向灶罵詈三不祥以足內火四不祥夫妻晝合五不祥盜恚師父六不祥凡人旦起恆言善事天與之福勿言奈何歌嘯名曰請禍慎勿上床臥歌凶始臥伏床凶飲食伏床凶以匙箸擊盤上凶司陰之神在人口左人有陰禍司陰白之於天天則考人魂魄司殺之神在人口右人有惡言司殺白之於司命司命記之罪滿即殺二神監口唯向人求非安可不慎言舌者身之兵善惡由之而生故道家所忌食玉泉者令人延年除百病玉泉者口中唾也雞鳴平旦日中日晡黃昏夜半時一日一夕凡七漱玉泉食之每食輒滿口咽之延年發血之窮齒骨之窮爪筋之窮千過梳髮發不白朝夕啄齒齒不齲爪不數截筋不替人常欲數照鏡謂之存形形與神相存此其意也若矜容顏色自愛玩不如勿照凡人常以正月一日二月二日三月三日四月八日五月一日六月二十七日七月十一日八月八日九月二十一日十月十四日十一月十一日十二月三十日但常以此日取枸杞菜煮作湯沐浴令人光澤不病不老月蝕宜救活人除殃活萬人與天同功天不好殺聖人則之不好殺者是助天地長養故招勝福善夢可說惡夢默之則養性延年也服氣療病篇第四元陽經曰常以鼻納氣含而漱滿舌撩唇齒咽之一日一夜得千咽甚佳當少飲食飲食多則氣逆百脈閉百脈閉則氣不行氣不行則生病玄示曰志者氣之帥也氣者體之元也善者遂其生惡者喪其形故行氣之法少食自節動其形和其氣血因輕而止之勿過失突復而還之其狀若咽正體端形心意專一固守中外上下俱閉神周形骸調暢四溢修守關元滿而足實因之而眾邪自出彭祖曰常閉氣納息從平旦至日中乃跪坐拭目摩搦身體舐唇嚥唾服氣數十乃起行言笑其偶有疲倦不安便導引閉氣以攻所患必存其身頭面九竅五臟四肢至於發端皆令所在覺其氣云行體中起於鼻口下達十指末則澄和真神不須針藥灸刺凡行氣欲除百病隨所在作念之頭痛念頭足痛念足和氣往攻之從時至時便自消矣時氣中冷可閉氣以取汗汗出輒周身解矣行氣閉氣雖是治身之要然當先達解其理又宜空虛不可飽滿若氣有結滯不得空流或致發瘡譬如泉源不可壅遏若食生魚生菜肥肉及喜怒憂恚不除而以行氣令人發上氣凡欲學行氣皆當以漸劉君安曰食生吐死可以長存謂鼻納氣為生口吐氣為死也凡人不能服氣從朝至暮常習不息徐而舒之常令鼻納口吐所謂吐故納新也服氣經曰道者氣也保氣則得道得道則長存神者精也保精則神明神明則長生精者血脈之川流守骨之靈神也精去則骨枯骨枯則死矣是以為道務寶其精從夜半至日中為生氣從日中後至夜半為死氣常以生氣時正偃臥瞑目握固握固者如嬰兒之拳手以四指押拇指也閉氣不息於心中數至二百乃口吐氣出之日增息如此身神具五臟安能閉氣至二百五十華蓋明華蓋眉也耳目聰明舉身無病邪不幹人也凡行氣以鼻納氣以口吐氣微而引之名曰長息納氣有一吐氣有六納氣一者謂吸也吐氣有六者謂吹呼唏呵噓呬皆出氣也凡人之息一呼一吸元有此數欲為長息吐氣之法時寒可吹時溫可呼委曲治病吹以去風呼以去熱唏以去煩呵以下氣噓以散滯呬以解極凡人極者則多噓呬道家行氣率不欲噓呬噓呬者長息之心也此男女俱存法法出於仙經行氣者先除鼻中毛所謂通神之路若天露惡風猛寒大熱時勿取氣明醫論云疾之所起自生五勞五勞既用二臟先損心腎受邪府臟俱病五勞者一曰志勞二曰思勞三曰心勞四曰憂勞五曰疲勞五勞則生六極一曰氣極二曰血極三曰筋極四曰骨極五曰精極六曰髓極六極即為七傷七傷故變為七痛七痛為病今人邪氣多正氣少忽忽喜忘悲傷不樂飲食不生肌膚顏色無澤發白枯槁甚者令人得大風偏枯筋縮四肢拘急攣縮百關隔塞羸瘦短氣腰腳疼痛此由早娶用精過差血氣不足極勞之所致也凡病之來不離於五臟事須識根不識者勿為之耳心臟病者體有冷熱呼吹二氣出之肺臟病者胸背脹滿噓氣出之脾臟病者體上游風習習身癢疼悶唏氣出之肝臟病者眼疼愁憂不樂呵氣出之以上十二種調氣法依常以鼻引氣口中吐氣當令氣聲逐字吹呼噓呵唏呬吐之若患者依此法皆須恭敬用心為之無有不瘥愈病長生要術導引按摩篇第五導引經云清旦未起先啄齒二七閉目握固漱滿唾三咽氣尋閉不息自極極乃徐徐出氣滿三止便起狼踞鴟顧左右自搖亦不息自極復三便起下床握固不息頓踵三還上一手下一手亦不息自極三又叉手項上左右自了捩不息復三又伸兩足及叉手前卻自極復三皆當朝暮為之能數尤善平旦以兩手掌相摩令熱熨眼三過次又以指搔目四眥令人目明按經文拘魂門制魄戶名曰握固與魂魄安門戶也此固精明目留年還白之法若能終日握之邪氣百毒不得入握固法屈大拇指於四小指下把之積習不止眼中亦不復開一說云令人不遭魔魅內解云一曰精二曰唾三曰淚四曰涕五曰汗六曰溺皆所以損人也但為損者有輕重耳人能終日不涕唾隨有漱滿咽之若恆含棗核咽之令人愛氣生津液此大要也謂取津液非咽核也常每旦啄齒三十六通能至三百彌佳令人齒堅不痛次則以舌攪漱口中津液滿口咽之三過止次摩指少陽令熱以熨目滿二十七止令人目明每旦初起以兩手叉兩耳極上下熱挪之二七止令人耳不聾次又啄齒漱玉泉三咽縮鼻閉氣右手從頭上引左耳二七復以左手從頭上引右耳二七止令人延年不聾次又引兩鬢髮舉之一七則總取發兩手向上極勢抬上一七令人血氣通頭不白又法摩手令熱以摩面從上至下去邪氣令人面上有光彩又法摩手令熱揩摩身體從上至下名曰干浴令人勝風寒時氣熱頭痛百病皆除夜欲臥時常以兩手揩摩身體名曰干浴闢風邪踞坐以左手托頭仰右手向頭上盡勢托以身並手振動三右手托頭振動亦三除人睡悶平旦日未出前面向南踞坐兩手托䏶盡勢振動三令人面有光澤平旦起未梳洗前踞坐以左手握右手於左䏶上前卻盡勢挼左䏶三又以右手握左手於右䏶上前卻挼右䏶亦三次又叉兩手向前盡勢推三次叉兩手向胸前以兩肘向前盡勢三次直引左臂拳曲右臂如挽一斛五斗弓勢盡力為之右手挽弓勢亦然次以右手托地左手仰托天盡勢右亦如然次拳兩手向前築各三七次拳左手盡勢向背上握指三右手亦如之療背膊臂肘勞氣數為之彌佳平旦便轉訖以一長柱杖策腋垂左腳於床前徐踞盡勢掣左腳五七右亦如之療腳氣疼悶腰腎間冷氣冷痹及膝冷腳冷並主之日夕三掣彌佳勿大飽及忍小便掣如無杖但遣所掣腳不著地手扶一物亦得晨夕以梳梳頭滿一千梳大去頭風令人發不白梳訖以鹽花及生麻油搓頭頂上彌佳如有神明膏搓之甚佳旦欲梳洗時叩齒一百六十隨有津液便咽之訖以水漱口又更以鹽末揩齒即含取微酢清漿半小合許熟漱取鹽湯洗兩目訖閉目以冷水洗面必不得遣冷水入眼中此法齒得堅淨目明無淚永無蠚齒平旦洗面時漱口訖咽一兩咽冷水令人心明淨去胸臆中熱譙國華佗善養生弟子廣陵吳晉樊城樊何受術於佗佗語晉曰人體欲得勞動但不當使極耳人身常搖動則穀氣消血脈流通病不生譬猶戶樞不朽是也古之仙者及漢時有道士君倩為道引之術作熊經鴟顧引挽腰體動諸關節以求難老也吾有一術名曰五禽戲一曰虎二曰鹿三曰熊四曰猿五曰鳥亦以除疾兼利手足以常導引體中不快因起作一禽之戲遣微汗出即止以粉塗身即身體輕便腹中思食吳晉行之年九十餘歲耳目聰明牙齒堅完吃食如少壯也虎戲者四肢距地前三躑卻三躑長引腰側腳仰天即返距行前卻各七過也鹿戲者四肢距地引項反顧左三右二伸左右腳伸縮亦三亦二也熊戲者正仰以兩手抱膝下舉頭左擗地七右亦七蹲地以手左右托地猿戲者攀物自懸伸縮身體上下一七以腳拘物倒懸左右七手鉤腳五按頭各七鳥戲者雙立手翹一足伸兩臂揚眉用力各二七坐伸腳手挽足趾各上縮伸二臂各七也夫五禽戲法任力為之以汗出為度有汗以粉塗身消穀氣益氣力除百病能存行之者必得延年又有法安坐未食前自按摩以兩手相叉伸臂股導引諸脈勝如湯藥正坐仰天呼出飲食醉飽之氣立銷夏天為之令人涼不熱御女損益篇第六道以精為寶施之則生人留之則生身生身則求度在仙位生人則功遂而身退功遂而身退則陷欲以為劇何況妄施而廢棄損不覺多故疲勞而命墮天地有陰陽陰陽人所貴貴之合於道但當慎無費彭祖曰上士別床中士異被服藥千裹不如獨臥色使目盲聲使耳聾味使口爽苟能節室其道適抑揚其通塞者可以增壽一日之忌暮食無飽夜飽食眠損一日之壽一月之忌暮飲無醉夜醉臥損一月之壽一歲之忌暮須遠內一交損一歲之壽養之不復終身之忌暮須護氣暮臥習閉口開口失氣又邪從口入采女問彭祖曰人年六十當閉精守一為可爾否彭祖曰不然男不欲無女無女則意動意動則神勞神勞則損壽若念真正無可思而大佳然而萬無一焉有強鬱閉之難持易失使人漏精尿濁以致鬼交之病又欲令氣未感動陽道垂弱欲以御女者先搖動令其強起但徐徐接之令得陰氣陰氣推之須臾自強強而用之務令遲疏精動而止閉精緩息瞑目偃臥導引身體更復可御他女欲一動則輒易人易人可長生若御一女陰氣既微為益亦少又陽道法火陰道法水水能制火陰亦消陽久用不止陰氣吸陽陽則轉損所得不補所失但能御十二女子而不復泄者令人老有美色若御九十三女而不泄者年萬歲凡精少則病精盡則死不可不忍不可不慎數交而時一泄精氣隨長不能使人虛損若數交接則瀉精精不得長益行精盡矣在家所以數數交接者一動不瀉則贏得一瀉之精減即不能數交接但一月輒再瀉精精氣亦自然生長但遲微不能速起不如數交接不瀉之速也采女者少得道知養性年一百七十歲視如十五殷王奉事之年問道於彭祖也彭祖曰姦淫所以使人不壽者非是鬼神所為也直由用意俗猥精動欲泄務副彼心竭力無厭不以相生反以相害或驚狂消渴或癲癡惡瘡為失精之故但施瀉輒導引以補其處不爾血脈髓腦日捐風濕犯之則生疾病由俗人不知補瀉之宜故也彭祖曰凡男不可無女女不可無男若孤獨而思交接者損人壽生百病鬼魅因之共交失精而一當百若欲求子令子長命賢明富貴取月宿日施精大佳月宿日直錄之於後天志曰人生俱含五常形法復同而有尊卑貴賤者皆由父母合八星陰陽陰陽不得其時中也不合宿或得其時人中上也不合宿不得其時則為凡夫矣合宿交會者非生子富貴亦利己身大吉之兆八星者室參井鬼柳張心鬥月宿在此星可以合陰陽求子月二日三日五日九日二十日此是王相生氣日交會各五倍血氣不傷令人無病仍以王相日半夜後雞鳴前徐徐弄玉泉飲玉漿戲之若合用春甲寅乙卯夏丙午丁未秋庚申辛酉冬壬子癸亥與上件月宿日合者尤益佳若欲求子待女人月經絕後一日三日五日擇中王相日以氣生時夜半之後乃施精有子皆男必有壽賢明其王相日謂春甲乙夏丙丁秋庚辛冬壬癸凡養生要在於愛精若能一月再施精一歲二十四氣施精皆得壽百二十歲若加藥餌則可長生所患人年少時不知道知道亦不能信行至老乃始知道便已晚矣病難養也雖晚而能自保猶得延年益壽若少壯而能行道者仙可冀矣仙經曰男女俱仙之道深內勿動精思臍中赤色大如雞子乃徐徐出入精動便退一旦一夕可數十為之令人益壽男女各息意共存之唯須猛念道人劉京云春三日一施精夏及秋一月再施精冬常閉精勿施夫天道冬藏其陽人能法之故得長生冬一施當春百蒯道人言人年六十便當都絕房內若能接而不施精者可御女耳若自度不辦者都遠之為上服藥百種不如此事可得久年也道林雲命本者生命之根本決在此道雖服大藥及呼吸導引備修萬道而不知命之根本根本者如樹木但有繁枝茂葉而無根本不得久活也命本者房中之事也故聖人云欲得長生當由所生房中之事能生人能殺人譬如水火知用之者可以養生不能用之者立可死矣交接尤禁醉飽大忌損人百倍欲小便忍之以交接令人得淋病或小便難莖中痛小腹強大恚怒後交接令人發癰疽道機房中禁忌日月晦朔上下弦望日月蝕大風惡雨地動雷電霹靂大寒暑春夏秋冬節變之日送迎五日之中不行陰陽本命行年月日忌禁之尤重陰陽交錯不可合損血氣瀉正納邪所傷正氣甚矣戒之新沐頭新行疲倦大喜怒皆不可行房室彭祖曰消息之情不可不知也又須當避大寒大熱大風大雨大雪日月蝕地動雷震此是天忌也醉飽喜怒憂愁悲哀恐懼此人忌也山川神祇社稷井灶之處此為地忌也既避此三忌又有吉日春甲乙夏丙丁秋庚辛冬壬癸四季之月戊己皆王相之日也宜用嘉會令人長生有子必壽其犯此忌既致疾生子亦凶夭短命老子曰還精補腦可得不老矣子都經曰施瀉之法須當弱入強出何謂弱入強出納玉莖於琴絃麥齒之間及洪大便出之弱納之是謂弱入強出消息之令滿八十動則陽數備即為妙也老子曰弱入強出知生之術強入弱出良命乃卒此之謂也西山群仙會真記序序曰性非生知學道者必資於切問道難言傳立教者不尚於明文藏機隱意恐輕泄於聖言比物囑辭乃密傳於達士世有讀書而五行俱下開卷則一覽無遺聲名喧世孰知不死之方頭角摩天豈悟希夷之理必也訪道尋真求師擇友覽仙經之萬卷不出陰陽得尊師之一言自知真偽水火木金土五行也相生而為子母相剋而為夫婦舉世皆知也明顛倒之法知抽添之理者鮮矣上中下精氣神三田也精中生氣氣中生神舉世皆知也得反復之義見超脫之功者鮮矣知五行顛倒方可入道至於抽添則為有道之人也得三田反復方為得道至於超脫則為成道之人也古先達士無不道成委成道者百無一二今來後學徒有道名委入道者十無八九欲論得道而超脫者西山十餘人矣遂同前聖後聖秘密參同一集五卷取五行正體之數每卷五篇應一氣純陽之義開明至道演說玄機因誦短篇發明鍾呂太上至言庶得將來有悟勤而行之繼僕以出塵寰為蓬瀛之侶華陽真人施肩吾希聖序識道葛仙翁曰天下無二道殊途而同歸聖人無兩心百慮而一致古今一道聖賢同心逮夫道原既判心識自分談道者強自分別同流異派摘葉尋枝自為見鮮以獨立教門萬物之理既不能窮一己之性胡為而盡如釋子殢於頑空乃以今世求於後世儒者執於見在遂以少年榮為老年殊不知先聖之行道存乎一心也西山記曰呂先生言初習儒業長好性宗修天爵而棄人爵鄙頑空而悟真空天爵止於人事真空不離因緣葛仙翁曰以五常言道止得其緒餘用三乘見性難窮其根蒂是知道不疏於儒釋儒釋自疏於大道歷古及今聰明有識之士莫不留心清虛而志在玄元也迨以安樂延年次以長生不死默盜天機當為己用自人昇仙而為天官何止儒者之虛榮於當年由百歲延而及萬年何同釋子之因報於後世修真者邪正不可辨也欲識大道三教中太上為先一身之外更何求也識法太上隱書曰法本無法理歸自然心因境亂法本心生立法之意救補已失而防於未萌故三千六百法養命數十家三千六百法者十年之期養命數十家者天一地二天三地四天五地六天七地八天九地十一三五七九五行之陽數二四六八十五行之陰數大道分而為二氣二氣裂而為五行大而為天地明而為日月靈而為人莫不稟二氣而生五行運五行而貫三才也西山記曰華佗觀五禽之戲而作導引以為人之久逸而氣滯血凝故屈體勞形使榮衛通暢後人因之名為般運欲求超脫誤矣昔陳義遺女於道久餓而學龜之吐納得終年不死後人因之名為服氣欲求丹藥誤也張紹審五味之亂人真液一臟好而一臟惡一氣盛而一氣弱故罷五味而素且淡之後人因之名為休糧誤也劉洞知真陽真陰有餘則引其子不足則殺其鬼補且瀉之也後世因以採日精月華取天地正氣誤也昔廣成子教黃帝房中之術恐走失真氣而虧修養之宜止欲禦敵可欲之境不說採戰有功而奪婦人之氣後人因之以為人補人採氣還精損人害己以望長生誤也廣成子教黃帝依法修養久不見功於崆峒山凡以內事為法則煉外丹以補久虛積傷之損後人因之以無情金石鍛鍊於煙焰之中分胎見寶欲餌之以求上升或不死延年誤也扁鵲解靈樞以鼻引清氣口吐濁氣留之二十四息為一兩火以煉真鉛如戲蕊而曰陽胎煉真汞如含蓮而曰陰胎胎在息住息住神存可以留形住世積而入聖超凡後人因之以多入少出欲聚氣為胎閉息為法誤也九仙經言病大用火病小用水用火則納氣復升於身真氣遍於四大陰鬼邪魔望之不敢近也用水則納氣而復升於身氣透水如湧泉定中以意送在所病之處氣血通流自無滯礙後人因之而獨坐閉氣以舌為轆轤左旋右攪收斂余津漱而咽之復隨腸胃傳送於外乃曰澆灌以長黃芽欲為大藥誤也通玄真經云守無為之道得自然之理清而不濁靜而後動移神於希夷之域保形於仁壽之途一念不生萬惑俱息長生延年安閒自樂後人因之不悟擇靜絕跡默默忘機終年竟不見功誤也靈室內觀經曰外境不入內境不出神志自守閉目內視降君火於下田布黃云於四大笙簧車騎羅列往來自得壺中之趣後人因之形如槁木必若死灰謹守頑空失於昏寂陰靈出於天門止於投胎就舍誤也又有開頂縮龜住山識性燒煉看讀布施供養非徒無益而又害之是少識無知之徒自生小法旁門互相授受迷惑後來致使大道日遠日疏殊不知仰視俯察默合天地陰陽升降之宜日月魂魄往來之理一氣初浮識自己之陰陽五行既分交自己之水火火中有水水中有火火上負陰恍恍惚惚其物為真一之水水上抱陽杳杳冥冥其精力正陽之氣二氣交媾結成內藥養就金丹可為陸地神仙者也識人上清玄格曰大道似不肖盛德若不足韜光晦跡自衛其身人不知也道未足於己言已輕於人事未充於內驕已見於外好勝於人人不知也修真之士識人為先務當其取士也聽其言而觀其行及其求法也察其理而驗其功勿以人而廢言防其大辯若訥者勿以言而用人防其善為說辭者或大醇而小疵始愚而終聖修真之士亦有知人之鑑不可不奉無上之道也西山記曰古今賢聖雖有兼人之智普照之明未嘗不先求於人謂務學而不如務求師師人之模範也黃帝求赤松子半年方得中戒經止於防外行之失劉安玉師王道原終年始得小術法又不言修養之事陰長生不以馬明生久病而怠其志葛稚川不以鄭思遠家法而晦於人耳朱度胡氏而始終如一方昉遇金華而遠近相隨張夢乾三遇海蟾方得三乘之法解志一一見旌揚盡授九轉之功王猛見長壽大仙談笑之間而識破大道梅福遇大洞真君步趣之次而訣盡天機歷古非神仙以入南洲然修真之士不遇者於識人之際不明也其或道貌古顏辯辭利口者始謂得神仙悠久始知常俗之輩學而不遇一也或業重福薄不信天機輕命重財甘為下鬼錄人纖惡棄人大善雖見其人不聽其言雖聽其言不納其理終無所得仙凡自隔遇而不得二也或博學篤志切問近思縱得真訣自生懈怠悅須臾厭持久朝為夕改坐望立成得而不守三也又況交接狂徒搜尋異論廢時亂日何以成功古人上士始也博覽丹書次以遍參道友以道對言所參無異論以人合道所師無狂徒嗟愚而自專賢否不辨賤而自用邪正不分論識人之去就不可勝舉也故古今上聖真人未修煉先修養故曰沐浴不可當風若幽室靜房閉目冥心伸身正坐使元氣上升通滿四大上入泥丸此真沐真浴萬倍於外之水火也又曰不欲遠唾以損氣不欲疾步以損筋不欲極視而昏精不欲疾聽而傷腎不欲久立而傷骨不欲久臥而傷肉多睡濁神頻醉散氣多汗損血力困傷形奔車走馬氣亂而神驚望高登峻魄散而魂飛養形之道安而不勞勞而不乏其力靜而不撓撓而不亂其氣外有所補內有所益然後識五行以保全沖和之氣外固內真兩皆得趣可以長久矣識時洞玄經曰有形者不能無名有名者難逃於數大則天地陰陽升降不失其宜明則日月魂魄往來自有其度差之毫米失之顛倒陰陽有愆伏則四序亂而不能升成萬物寒暑無代謝則八候差而不能運轉一氣人為萬物之貴一氣之靈大則取象乎天地無乖升降之宜明則取法乎日月不亂經營之度定之以時應之以數於道也夫何遠哉西山記曰大道無形生育天地溫涼寒暑一年一交合交合不失其時一年之後有一年大道無情運行日月弦望晦朔一月一往來往來不失其時一月之後有一月大道無名長養萬物勿謂春生夏長也而梅豔菊芳勿謂秋收冬藏也而柏實松茂因時日受氣因氣發生無知之草木如是最靈而為人者胡不順養真性而修煉形軀耶鶴知夜半燕識戊己因陰感陽緣水避土蛇於巳日不過道鶯於春時自出谷無識之禽獸如是最貴而為人者何不順時養元陽而收藏真氣耶嗟無知之徒自氣足之後走失耗散八百一十丈元氣久久而損豈知真氣大運隨天春在肝夏在心秋在肺冬在腎元氣小運隨日子在腎卯在肝午在心酉在肺天地之春夏秋冬日月之弦望晦朔人之子午卯酉正相合也冬陰也陰中陽生而為溫則曰春也是陽為主而陰為客陽中又陽生而為熱則曰夏也夏陽也陽中陰生而為涼則曰秋也是陰為主而陽為客陰中又陽生而為寒則曰冬也此天地之四時矣旦則暗也魄中魂生而為明則曰上弦上弦之後魂為體而魄為用魂中又魂生而曰望矣望則明也魂中魄生而為暗則曰下弦下弦之後魄為體而魂為用魄中又魄生而曰晦矣是日月之四時矣天地有三百六十日日月有三百六十時人有三百六十度天地有二十四氣日月有二十四度人有二十四時自子至午氣生之時陽也自午至子氣謝之時陰也寅辰午申子戌陽生之六時卯巳未酉亥醜陰生之六時甲丙戊庚壬五行之陽時乙丁己辛癸五行之陰時辰則太陽而卯則陽明寅則少陽而醜則太陰子則少陰而亥則厥陰戌則太陽而酉則陽明申則少陽而未則太陰午則少陰而巳則厥陰午則腎氣交心氣從下而上三陽氣聚之時子則心氣交腎氣從上而下三陰氣聚之時魂為陰中之陽其氣生於卯初魄為陽中之陰其氣生於酉末養陽不在春夏春夏所以養陽者以氣在心與肝也養陰不在秋冬秋冬所以養陰者以氣在腎與肝夏至之後真汞積於絳宮冬至之後真鉛積于丹田木運交天霐二十五度是時巽也以陽交陽當此收之而成大藥金運交靈符二十五度是時乾也以陰交陰當此煉之而號還丹煉形起火須在氣升之前聚火還元必用陰降之際煉形住世以氣為先用五行相剋之時煉氣超凡以時為先使三田往返之候修真之士不見功者以旺時不收損時不補散時不聚合時不取無時不求還時不煉不知交會之時又無採取之法蹉時亂日不見尺寸之功安得比天地長久日月堅固哉識物洞天語錄曰以言言道得其緒餘故得道所以忘言以象求意得其彷彿故得意所以忘象然道不在言也以先知覺後知非言不足以求理然意在象也以大明決小明非象不足以陳義言以示其理象以顯其義則大道玄意默會無象無言之間始也詳言密語恐以之不悟比物立象恐彼之不知及夫目擊道存不在言也心同意會不在象也西山記曰形而上者道形而下者器上以下為基道以器為用如鍾離秘訣曰以心為天腎為地肺為月肝為日日月天地物之大明者也崔玄真秘訣曰以腎氣為嬰兒心液為奼女肝氣陰中之陽為日中之魂肺氣陽中之陰為月中之魄兒女魂魄物之靈而神者也如心為朱雀腎為玄武肝為青龍肺為白虎亦是四象也葛仙翁曰嬰兒為心液之上正陽之氣奼女是腎氣之中真一之水金公乃肺之老陽黃婆其陽微弱當使之復還下田余液是老陰腎液到脾液真陽近少陰其陽衰弱當使之復還下田此四象之說詳矣太白真人曰五行顛倒術龍從火里出五行不順行虎向水中生龍本東方甲乙之物而出於火中者心液之上正陽之氣也則曰陽龍出自離官虎乃西方庚辛之物而生於水中者腎氣之中真一之水也則曰陰虎生於坎位然而龍是陽物升舉自在而在水中乃陰中之陽故比心液之上正陽之氣也虎是陰物奔馳自在而居陸地乃陽中之陰也故比腎氣之中真一之水也老君言恍恍惚惚其中有物者為氣中之有水而負陰者是也杳杳冥冥其中有精者為液中之有氣而抱陽者是也陰真君曰北方正氣號河車車謂運載物於陸地往來無窮而曰河車者取意於人身之內萬陰之中有一點元陽上升薰蒸其胞絡上升元氣自腎氣傳肝氣肝氣傳心氣心氣傳肺氣肺氣傳腎氣而曰小河車也肘後飛金晶自尾閭穴起從下關過中關中關過上關自上田至中田中田至下田而曰大河車也純陰下降真水自來純陽上升真火自起一升一沉相見於十二樓前顆顆還丹而出金光萬道則曰紫河車也故車行河如氣在血絡之中氣中暗藏真水如車載物所謂河車者詳矣廣成子以內事教黃帝久不見功乃於崆峒山煉大藥五金之中鉛為黑金黑金之中而取銀八石之中砂為赤石赤石之中而取汞以汞合銀為寶故有鉛汞之說鉛者腎之所藏真氣汞者陰陽所合自己之真精也真陰真陽以成大藥火候無差精變為汞汞變為砂砂變為丹而曰真鉛是也金晶肘後飛入上宮自頂而入下田真火前起升入泥丸自心而過重樓一陰一陽上水下火而為既濟奔於元海而曰紫金丹故曰真汞者是也此汞鉛之理詳矣以物推求陽比象動而升舉之陰比於靜而凝滯之物不必多識象不必多求止於純陰純陽二氣交接而為大藥然陽中有真陰陰中有真陽乃陽交陰陰交陽陽交陽陰交陰陰陽有四交也及乎陰合陽陽合陰陰合陰陽合陽陰陽有四合也四交四合大應天地之八節明應日月之八候廣記多識不止損神傷氣而且議論差別適以廢時亂日終無益也養生三元真經曰人物異形受生惟一氣魂得之於天體魄得之於地無形無象自空中來即父精母血以無為有三百日胎完胎完氣足則生是由無而有不善養生則以有還無矣血氣方剛以所有之神氣復與於兒女血氣既衰將已有之魂魄復還於天地故生中起滅以滅止生氣斷神散而無生矣善人君子莫不欲生而不知養生之時以天地為法日月為本陰絕陽生陽絕陰生生生不窮天地所以長久魄往魂來來往不已日月所以長久是知氣在養而不弱形在養而不悴內外養之無差故得與天地日月同長久也西山記曰古今聖賢談養生之理者著養生論者不為少矣又曰少私寡慾少私寡慾者可以養心又曰絕念忘機絕念忘機者可以養神又曰飲食有節飲食有節者可以養形又曰務逸有度務逸有度者可以養亂又曰入清出濁入清出濁者可以養氣又曰絕淫戒色絕淫戒色者可以養精養生之道不在於此所生微也善養者從微至著所生小也善養者自小及大當旺時養而取之當衰時養而補之如春養脾秋養肝夏養肺冬養心煉形則起火還丹則聚氣此年中用月不失養生之道也及春夏養陽以真氣隨天大運在肝與心心肝者氣生之所秋冬養陰以真氣隨天大運在肺與腎腎肺者液降之所此陰陽傳送不失養生之道也及腎氣生於子時一陽生於二陰之中當此之時若澄心靜濾閉目升身想火輪起于丹田是氣升而養之有法也及肝氣生於卯時一陽升於二陰之下當此之時如孤坐閉目多入少出存兒女相見於黃屋之中而產就嬰兒是陽生而養之有法也及心氣生於午時一陰生於二陽之中當此之時若忘言絕念滿口含津攻心氣不散存龍虎交媾於煙焰之中而盤金鼎奔流於下是丹田氣生而養之有法也及肺氣生於酉時一陰生於二陽之上當此之時若閉目冥心以腹肚微脅存大火炙於鼎中鼎中有三昧炎炎不絕三昧齊發是陰生而養之有時也及夫三百日胎完而真氣生養其真氣而煉之生神五氣朝元三花聚頂五百日陽神生養其陽神而煉之合道是生形已來養之而生真氣自生氣以來養之而生法身身外有身超凡入聖養生之道備於此矣養形玉華靈書曰神以氣為母氣以形為舍煉氣成神煉形成氣陽神未聚三花不入泥丸真氣未朝五彩不生丹闕無形籠絡神氣兩難故天地大也未免輕清重濁之象日月明也難逃圓明缺暗之形積陽生神上以麗乎天者星與辰也積陰生形下以伏乎地者土與石也水中氣升而為雨為云氣中水降而為露為霧萬象群生不能無形惟人也集靈以生資道以成不知養形之端精魂耗散而陰殼空存未死之前已如槁木餘喘既絕盡力糞壤養形之道可不深思西山記曰仲夏仲冬之月善養形者處於深堂避其大寒大熱之氣而伏其肌膚非特此也先寒而衣衣不得頓多先暖而解解不得頓少久勞則安閒以保極力之處久逸則導引以行稍滯之氣暑不當風當風則榮閉而衛結夏不臥濕臥濕則氣散而血注冬不極熱極熱則腎受虛陽而春夏肝與心有雍蔽之疾也夏不極涼極涼則心抱浮寒而秋冬肺與腎有沉滯之患也不可極飢而食食不過飽過飽則傷神飢則損胃不可極飲飲不過多多則損氣渴則傷血沐用旬浴用五夫五則五氣流傳浴之榮衛通暢旬則數滿復還真氣在腦沐之則耳目聰明若頻頻浴者血凝而氣散雖肌膚光澤久而氣自損矣故有癱瘓之疾者氣不勝血神不勝形也若頻頻沐者氣雍於上滯於中令人體重形疲久而經絡不能通暢故古人以陽養陽陽不耗散以陰煉陽陽不損弱如一年內春夏養陽秋冬養陰是借陰養陽以陽消陰也一日內午前煉乾以氣前起煉形後起金晶午後煉坤以藥有藥則聚氣煉丹無丹則收火煮海皆以真陽見用於自身不然斂身聚之可以無中養就真氣升身真氣以滅魔陰焉奉道之士廣覽多學徒以勞損不知陰陽為之總領之元也真陰真陽為胎凝于丹田次以真陰為氣真陽成形身外有身超凡入聖矣養氣太上隱書曰天地以清濁為質非氣不足以運陰陽日月以明暗分形非氣不足以交魂魄以橐龠之用呼吸之理是氣使之然也禽一沖而制在氣腹空如實魚一躍而制在水穿水如無眾植凋殘獨松柏而常茂者氣堅也群動滅寂惟龜鶴之不悴者氣任也形為留氣之舍氣為保形之符欲留形住世必先養氣至大至剛充塞乎天地之間氣聚神靈遨遊風塵之外善養生者養其形善養形者養其氣西山記曰古今養生之士不免於疾病死亡者不知其道也昔人以志士不語為養氣此保氣也失之昏以入清出濁為養氣此換氣也失之虛昏者氣散神狂真靈日厭終無所歸矣虛者丹田無實徒勞而吐納終不能佳矣多入少出攻病可也認為胎息誤矣上嚥下蓄聚氣可也指作還丹誤矣綿綿若存用之不勤委氣而和神也息息要住納之不出閉氣而煉形也一咽復一咽雙收兩夾以噓咽為法是借氣取水灌溉之術也正坐升身氣滿四大血路通行榮衛和暢是布氣焚身之法也若此皆非養氣矣養氣之道生時養之使不衰弱時養之使不散如古行屯者是陽初生屈而未伸故朝屯以取養氣之茂也如古行蒙者是一陽處群陰之中暗而不明故暮蒙以取求陽之義也非特此也才所不敏強思傷也力所不及強舉傷也悲哀憔悴傷也喜樂過度傷也汲汲所欲傷也慼慼所懷傷也或久談言笑寢息失時拽弓引弩耽酒嘔吐飽食便臥跳步喘息歡呼哭泣陰陽不交積傷至盡則早亡矣故善養者淡然無欲處乎寂寞之境自有希夷之趣冬則陽生至春分之後陽盛而陰散防其餘陰入腹而為苦寒之疾夏則陰生至秋分之後陰盛而陽散防其餘陽入腹而為酷暑之患勿觀死者防死氣觸生氣不近穢處防穢氣觸真氣真氣未壯而朝不虛食常充口真氣欲絕而暮不實食常減口然而調氣和氣布氣嚥氣聚氣行氣保氣換氣皆不出養氣之道夫氣如線觸之則斷氣如煙擾之則散不能養者失保形之道然養氣未及採氣採氣未及煉氣採氣還元結成金丹煉之出殼遷變羽客未煉先採之未煉先養之養心通玄經曰人以形為舍心為主主於國則君臣之分主於家則父子之禮心為君父氣為臣子身為家國心氣一注無氣不從在五行為火南方盛陽之精宿應熒惑神受朱雀狀垂二葉色若朱蓮神明依泊變化莫測混合陰陽大包天地細包毫芒制之則止放之則狂清靜道生濁躁神亡但能空寂得之存常永保無為其身則昌惟狂克念可以作聖惟聖罔念可以作狂古今達士養以寡欲務於至誠真源湛然靈光自瑩于丹臺也不為事惑物役可以超凡入聖西山記曰從道受生謂之性自一稟形謂之命所以任物謂之心心有所憶謂之意意有所思謂之志事無不周謂之智智周萬物謂之慮動而榮身謂之魂靜以鎮身謂之魄流行骨肉謂之血保形養氣謂之精氣清而快謂之榮氣濁而遲謂之衛總括百骸渭之身眾象備見謂之形塊然有閡謂之質形貌可則謂之體小大有分謂之軀眾思不礙謂之神漠然變化謂之靈氣來入身謂之生氣去於形謂之死所以通生謂之道道者有而無形無而有精變化不測通神群生真人上仙教人修道即修心也教人修心即修道也道不可見因心以明之心不可常用道以守之故虛心遣其實無心除其有也定心令不動也安心令不危也靜心令不亂正心令不邪清心令不濁淨心令不穢此皆己有令己除之心直不反復也心平無高下也心明不闇昧也心通無窒礙也此皆固有因以然之又在少思少念少欲少事少語少笑少愁少樂少喜少怒少好少惡故得靈光不亂神氣不狂方可奉道保生嗟無知者多思神殆多念志散多欲損氣多事役形多語弱氣多笑損臟多愁攝血多樂溢意多喜則交錯多怒則百脈不定多好則昏亂不理多惡則憔悴無歡故其源不潔和氣自耗不得延年失於養心之故也故古喻之如猿狂而不定比之如賊盜其所有也養壽三清真錄曰父母之真陰真陽二氣以精血為胞胎胎完氣足而為形矣集靈資道神氣相合而為壽定矣大壽一萬二千歲守樸任具雖亡而道不亡也中壽一千二百歲留形住世道在而身亦在也下壽一百二十歲知之修煉可以安樂延年不知修煉走失耗散在我者不為我之所有而又外觸禁忌暗除年算一算為三百日壽一歲為本數之壽一紀為正紀之壽無知少學以小惡為無傷積惡以致於滅身以小損為無害積損以致於滅生始以減一算次以除本數終以除一紀未及中年夭之大半仙子真人憐而哀之雖有超脫之法必先養壽之方審而用之可延至大壽不憚修持於日自有超凡之道西山記曰雖知養生之理不悟修行之法則生亦不長雖知修煉之方不知養壽之道則修亦無驗故養壽者凡以禁忌而防其禍行不多言恐神散而損氣睡不張口恐氣泄而損神臨危登峻則神飛玩殺看鬥則氣結吊死問病則喜神自散臥濕當風則真氣日弱古廟凶祠不可入入之則神驚狂禽異獸不可戲戲之則神恐對三光濡溺折人年壽賀四重深恩滅人大數飲宴於聖像之側魂魄不安坐臥於墓塚之間精神自散枯木大樹之下不可息防九陰之氣觸人陽神深水大澤不可渡恐至寒之性逼人真氣出眾花卉不可折防招妖狂入室非時果實不可食防帶邪氣入腹忘言綺語非患難不可頻說說之減人正壽肥甘醇酒非會合不可頻飲飲之除人本祿負賢忘恩必有禍應輕財毀物自無福生大山勿深入入之必凶美物勿酷愛愛之勿吉損人傷物以冤報冤嫉賢妒能以怨起怨虛傳妄授慢友輕師此類或有觸犯雖得正訣遇異人大道未就先為此除其壽以罪當功竟不能速成也善養壽者以法修其內以理驗其外修內則秘精修氣安魂清神形神俱妙與天地齊年煉神合道超凡入聖也驗外則救貧濟苦慈物利人孝於家忠於國順於上憐於下害不就利忙不求閒凡以方便為心勿以人我介意方始奉道多遇至人自得真法及夫下功之後少有患難速得圓成然是修養所致亦是陰德報之苟不達養壽之宜安得內外齊成乎補內九天秘錄曰三清之下有三太三太之內有二儀二儀既判而列五帝五帝既立而同一區此天地之內上下有陰陽升降東西有日月往來周而復始運而不已代謝循環終無走失惟人也以精為母以氣為主五臟中各有精精中生氣五臟中各有氣氣中生神欲壽無窮長生住世煉精為丹養氣為神真仙上聖修真補內不補外也內真外應無施不可有作必同自凡而入聖也西山記曰男子先生右腎以外精而內血陰為理也女子先生左腎以外血而內精陽為里也腎生脾脾生肝肝生肺肺生心心生小腸小腸生大腸大腸生膽膽生膀胱膀胱生三元三元生三焦三焦生八脈八脈生十二經十二經生十二絡十二絡生一百八十系絡一百八十系絡生一百八十纏絡一百八十纏絡生三萬六千孫絡三萬六千孫絡生三百六十五骨三百六十五骨生八萬四千毛竅胎完氣足靈光入體與母分離而為人也以內外言之經絡之內以為內肌膚之外而為外養命養其五臟五臟為根根固葉自茂矣養形養其五氣五氣為源源深流自長矣真氣大運隨天元氣小運隨日春肝旺脾弱則養脾食甘物五穀中粳米五果中棗肉五畜中牛肉五菜中葵菜清心無憂憂則傷肝隱坐避風因肝惡風也若日用之間卯時以待小運日生元氣傳送在肝閒居冥目以養肝旬日見功目可視秋毫若修煉下功不必如此夏心旺肺弱則養肺食辛物五穀中黃黍五果中桃子五畜中雞肉五菜中蔥菜清心少喜喜多傷心靜坐避熱以心惡熱若日用之間午時以待小運日生元氣傳送在心絕念安居以養心旬日見功可氣通百脈修煉下功亦不必如此秋肺旺肝弱則養肝食酸物五穀中豆五果中李子五畜中犬肉五菜中藿菜靜居避寒寒則傷肺不要多悲悲則損肝若日用之間酉時以待小運日生元氣傳送在肺升身靜坐以養肺旬日見功肌膚光澤若修煉下功不必如此冬腎旺心弱則養心食苦物五穀中小麥五果中橘子五畜中羊肉五菜中薤菜清心無恐恐則傷心若日用之間子時以待小運日生元氣傳送在腎斂身正坐以養腎旬日見功丹田自暖氣力剛健若修煉下功不必如此當四季脾旺腎弱養腎食鹹物五穀中粟米五果中山藥五畜中豬肉五菜中韭菜安心無畏畏則傷脾靜坐避濕濕則損脾也若日用之間戌辰丑未以待小運日生元氣傳送在脾風急震雷透過膀胱變為精華真氣走失而火上起肺開心沖肝浮膽橫萬神以真火燒之棄體外遊骨解筋伸與死無異一泄一氣弱百瀉一神去千泄一臟損已至枯竭四大無主乃曰死矣故真仙上聖有還精之道若志在玄元腎氣交心氣積氣生液如懸珠垂露顆顆還於丹田火候無差自然凝結形若彈丸色同朱橘氣中生氣煉氣成神身外有身超凡入聖若以未悟清虛甘做兒孫之牛馬淫邪之心未息亦不可深究房中之術俱以借其陰貌賺心氣下入黃庭而腎氣不能上升乃以龍盤虎繞欲泄之前棄其情愛一則孤坐斂身雙手抱臍使氣結為胎一則升身偃脊斂身少時使肘後飛入泥丸以填血腦而後百骨充盈有返老還童之驗矣嗟少學無知欲採婦女之精氣以為陰丹又煉無情之金石取天地之秀氣而為外丹餌之填精補海幸而藥盛而時暫無損若以元陽耗散而丹臺空虛餌之在腹當有不救之疾取之於人當有速亡之患返以神仙之法為誑靜言思之誰其過歟補氣玉華靈書曰九天之上無陰九地之下無陽元氣傳送餘氣在脾靜坐閉氣多入少出旬日見功肢體光澤經絡快暢若修煉下功不必如此是五臟各有時一臟旺而一臟弱一氣盛而一氣衰損有餘補不足五臟既和百骸自理百骸自理萬病不生萬病不生千歲可期西山記曰氣本無形必賴有形之軀形全氣在自可修補不擇老幼所貴至誠始終如一天皇聖胎秘用神訣補氣之上法達摩胎息至理補氣之中法其後因胎住息因息就胎扁鵲靈樞葛洪注胎息補氣之下法此外皆非法也補精太上玄鏡曰純陽上升者謂之氣純陰下降者謂之液氣液相交注於骨絡之間者謂之髓氣液相交出於膀胱之外者謂之精內則心腎肝肺脾五臟也大腸小腸膀胱三焦膽胃六腑也外則皮膚毛髮眼耳鼻舌手足榮衛經絡穴四體也精者心氣在肝肝自生精肝精不固目眩無光心氣在肺肺自生精肺精不實肌肉清弱心氣在腎腎自生精腎精不滿神氣減少心氣在脾脾自生精脾精不堅發齒自弱五臟之中腎為精海心為氣館真精在腎余精自還下田真氣在心餘氣自朝中元思慮愁惱其耗氣也如漏鼎中之氣淫邪禍亂其走精也如析釜下之薪補下精之道非但絕色而房中最急慎之西山記曰天地萬物之盜萬物人之盜蓋陽升陰降物受天地純粹之氣陰精陽華人食萬物充實之資一飲一食納之於胃與真氣相合傳流腎府虛氣充盈對境生心心火下逼腎氣不能上升左旋右盤地中升陽一百八十日到天其陽過乎天者陽自陰中來陽負陰胎陽戀陽住陰為陽逼復自天來故天中陰降一百八十日到地其陰過乎地者陰自陽中來陰抱陽質陰戀陰住陽為陰逼復自地起周而復還並無走失尚有震動傾倒之愆又況人腎為水也水中生氣如煙似線觸之則斷撓之則散眼耳鼻舌身意六慾傷於外喜怒哀樂好惡思七情傷於中上則重樓走失下則金龜拋泄如漏網包風能無損乎不知補氣之道如火消膏積日復入輪迴補益洞神真經曰養生之道以不損為延命之術以有補為先居安慮危而防未萌不以小惡為無傷而不去不以小善為無益而不為起臥有四時早晚行止有至和之常制調和筋脈有偃仰之方養正除邪有吐納之術流行榮衛有補瀉之法節宣勞逸有予奪之要忍怒以全陰氣抑喜以養陽氣以清虛去其狂慮以安閒養其真性雖少年致損氣弱體枯年老得悟防患補益以氣補氣氣自有餘以神補神神無不足氣盛而形乃延長神住而命自悠久西山記曰知至道者天不殺服元氣者地不滅夫至道不遠只在己身用心精微命自延久六玄旨曰欲得長生當修所生所生之本始乎精氣精氣結而為形形為受命之本氣是有形之根故午前煉乾午後煉坤氣自腎中生自子時為始午時為終其氣升而旺也所以煉乾者靜坐幽室閉目冥心升身勿動使氣滿四大薰蒸其體榮衛通和積日氣秀神清及夫腎氣到心積氣生液液自心中生自午時為始子時為終其液降而盛也所以煉坤者閉目冥心斂身正坐以兩手抱腹降心火于丹田烹蒸氣海積日氣旺神清此補益於氣也冬避寒夏避暑寒避風暑避熱動勿勞其肢體閒勿怠其肌膚五日一浴十日一沐氣旺時勿動血旺時不息此補益於形也永絕嗜欲見境不動心者上也假借修真因死求生形雖交而氣不交體雖濁而形不濁不得已而親婦人勿使走失時暫棄其情愛抽身於後賺心氣以補下元可以安性命者次也三十歲陰陽兩停而五穀秀氣無所製作未免情欲當五日一度四十歲者十日一度五十歲者二十日一度六十歲者一月一度六十四歲卦盡之年更不言度也若高上玄元欲求長生不死者可不議此也此補益於精也補益形者不若補益精補益精者不若補益氣補益氣者不若補益神補益於神則形氣永安古今達士談益神之道不為少矣往往不見功者非特出至誠也神為主故耳昔劉綱真人於甲子庚申生日本命祭享形神尚得神聚長生不死趙真人於靜房空室調神出殼如壯士展臂可千萬里陰魂不敢相干亦得留形住世況夫補已散之靈氣益見在之魂神禍福預知神之靈也死生永除神之真也補神之道有清身養命絕念忘思動靜不失時修煉應其法丹就而氣自真氣真而神自益矣補損十洲雜記曰純陰無陽鬼也純陽無陰仙也陰陽相雜人也鬼則陰靈之氣凝而為形仙則陽和之氣不散煉而為質人以陽盡而為鬼鬼者人之歸也人以陰盡而為仙仙者人之遷也當其少年陽多陰少之時不肯修煉及夫老弱氣散神衰之後安得無損高人上士憂勤未補之前戒慎補已損之後未損者保養不至於損已損者補益不至於虧非大道高士不可議此西山記曰人受氣賦形三百日胎完與母分體一千日乳抱四千日盜物取天地之氣五千日氣足故女子十四歲天癸降而真陰散男子十六歲真精滿而陽氣泄男子之氣八百一十丈女子之血三石六斗九九八十一純陽之數氣之本數也六六三十六純陰之數血之本數也過此以往走失耗散氣以九九而損血以六六而竭自然虧損又況敗壞而不知修養乎如王侯之府美女兼千卿士之家侍妾數百晝以醇酒淋其骨髓夜以房事輸其血氣耳耽目恣偃臥不休上奔走不安居而又滋味錦繡大醉入房不知御神保氣居無節而精神有限未及半白已憔悴枯朽也故真仙上聖凡所修養有益惟求無損一日之忌暮無大醉一歲之忌暮無遠行終身之忌暮無燃燭行房此補損之大略也五味人不可無也戒之偏多酸損脾甘損腎咸損心苦損肺辛損肝大藥未就尚有飢渴一日三次要食古人所以淡而食之又不葷腥恐汙口腹也五臟積滯用六字氣治之即黃庭圖之法也張澄道以此留形住世王悟真以此治病延年孫思邈以此修身治人六字之妙春不呼夏不呬冬不呵秋不噓四時常有嘻三焦無不足八節不得吹腎府難得盛凡有餘則引其子不足則殺其鬼此妙古今無知者西山上聖得其昧也不須禁忌百端但朝不虛而暮不實上也素無味淡無葷次也何慮四體之不充悅乎及夫六字氣有餘引子不足殺鬼者肝本噓也余則用噓噓亦不能引肝氣若引其子則用呵字瀉心之氣心氣既行肝氣自傳也若肝氣不足則殺其鬼肺金也金剋木木為妻而金為夫夫乃鬼也如肝氣弱必是肺之有餘必殺其鬼用呬字瀉之聰明之士審達五行生剋調和其氣無過不及而陰陽自正依時對節下手行動默契天機混合玄理安有長生之不得神仙之不成耶真水火中黃秘訣曰陰生水水性常冷而有華陽溫泉濡之不勝其暖也陽生火火性常熱而有蕭丘寒焰向之終不能暖也外之水火尚有返復之性內之陰陽安無顛倒之宜如腎水也水中生氣氣為火矣心火也火中生液液為水矣水可以滋流百脈火可以薰蒸四大人之水火也如此通玄論曰道原一判而分二儀天以乾道而輕清在上在上以陽為用暗抱一點真陰在其中也故冬至後地中陽生夏至到天積陽所以生陰其陰感陰而陰不得耗散散為霧凝為露霧露之氣天之所出陰而真水也地以坤道而重濁在下在下以陰為用暗抱一點真陽在其中也故夏至後天中陰降冬至到地積陰所以生陽蓋其陽感陽而陽不散耗升為云施為雨雲雨之氣地之所出陽而真火也人亦若是受胎之初父精母血二氣相合陽氣上升心為氣館氣中暗藏真水在心也陰氣下降腎為水府水中暗藏真氣在腎也不然安得腎氣到心積氣生液一陰生於二陽之中心氣到腎積液生氣一陽升乎二陰之中也西山記曰凡人有三火八水水者一氣傳一氣積氣生液而五臟各有液名曰色水腎氣之中暗藏真一之水而為陰虎者名曰真水肘後飛金晶入上宮自上而下與真火相逢而既濟成然名曰神水凡有疾病閉口納氣一口復一口定中送在病處皆可痊安名曰法水水之為用多矣其名不一丹就真氣生灌溉而為沐浴之法煉形真氣升還返而為還丹之法劉海蟾言兩曜注成七寶殿一渠流轉八瓊漿是玉液還丹也呂公言水火都來相作間卦候飛成地天泰一升一沉陽煉陰陰盡方知此理深是上下水火既濟之候也逍遙子曰法水能朝有秘關逍遙日夜遣循環是法水治病也此水之大概矣三火者膀胱民火腎為臣火心為君火凡所無知為物所擾而怒且憂者則為無明之火若降而下燒丹田一意不散至誠守之而曰燒煉丹藥火之升上起後過雙關而曰河車升之前起上過重樓而曰煉形前後俱起遍滿四大炎炎焚身此火之大概矣九仙經曰病小用水病大用火病大者無常之限也若人誤犯天神或身不寧急入靜室散發撥衣閉目冥心正坐握固叩齒集神升身起火微以留息少入遲出默想如臍下火輪大如斗須臾焰起自身可比輪蓋罩定自身令陰鬼邪魔不敢近也釋教降魔火道家焚身火凡行此火須是久絕嗜欲丹元堅固不然以水火交媾龍虎成丹丹就而陰靈自散不敢近陽神自不肯去也神在形固陰退氣全氣全形堅自可長年真龍虎龍虎真丹經曰真龍真虎所在所交之處古今秘而不說唯太一真書是太上親著又真一元解入言玄言二集稱龍虎真訣一在崑崙五城之內一在北極大淵之內藏之玉函刻之金札封之以金泥印以玉章猛獸列衛神人在旁塵世無緣而知矣太白真人曰五行顛倒術龍從火里出五行不順行虎向水中生少則少矣妙則妙矣乃所以泄天地之機呂公曰因看崔公入藥境令人心地轉分明陽龍言向離中出陰虎還於坎上生二物會時為道本五方行盡得丹名修真上士如知此定跨赤龍歸玉京入藥鏡曰腎中生氣氣中暗藏真一之水名曰陰虎心中生液液中暗藏正陽之氣名曰陽龍龍虎非肝肺也乃玄之又玄知之修煉而為聖傳道集曰腎氣傳心氣積氣生液液中有正陽之氣名曰陽龍是謂出於離宮心液傳腎液積液生氣氣中有真一之水名曰陽虎是謂生於坎位二物會時在人生人在己生神龍虎古今有識者或以多知廣記知其龍不在肝而虎不在肺如何得達交會之時而悟採取之法故少有不長生與成仙者良以此也西山記曰水火既濟龍虎相交所用不一如腎氣傳肝氣肝氣方生腎之餘陰入脾其氣過肝為純陽氣中有真一之水以到於心和氣生液顆顆如懸珠垂露而還下田更不隨溺水以傳膀胱若用火候無差煉而為一氣氣中生氣浩劫不死而為陸地神仙是虎交於龍以腎氣合心氣是也及夫下火加減有時抽添有數以心氣合於腎氣是龍交於虎若以下關透而起自尾閭穴左升者為龍右起者為虎氣從夾脊雙關而過至分道嶺而陽龍之氣入內院陰虎之氣入天池左旋右盤三十六數而真水下降如甘露入心此是龍虎相交於上宮又不必於心腎而有上交上合之別也及夫胎完胎就而真氣既生防其大過必濟之以水而玉液金液還丹及夫還丹日久行於經絡而變陽酥凝於中府而積白雪防其大過必舉以火而有煉質焚身是知還丹之時乃陰虎單行而不必交於龍也焚質之時乃陽龍獨舉而不必交於虎也龍虎之功不為小矣所患乎不知龍虎之本也若識龍虎之象又知交合之時且得采取之法三百日養成內丹而命中有晶乃得與天地齊其壽算矣真丹藥洞天語錄曰高上元君始在塵世而流傳大道引喻天地升降之宜日月往來之數而曰內丹廣成子教黃帝依法行持久不見功乃於崆峒山中凡以內事為法則以金石相配合而曰外丹內之丹藥乃為真藥外之丹藥止可療治病安樂而已內丹小則長生不老大則超凡入聖始乎二氣交而凝結在丹田變精為汞變汞為砂砂變為丹形若彈丸色同朱橘而真氣自生以氣煉氣氣合神聚而入道道成而入聖聖則大而化之無所不通豈外丹之可比耶故知真藥真丹身外無求西山記曰以龍交虎媾結成玄珠火候無差燒成大藥真氣始生升之可以煉形不避寒暑之患真氣既聚納之可以還丹永除飢渴之苦於己也豈非藥乎及夫真氣施於人也亦有驗矣入水水沸吹木木榮變苦為甘改衰為壯即人以療疾苦無不痊瘥凝神以祛鬼魅無不靈應蓋內真而外應也豈非謂人之藥乎或以內事不修真元不識惟以外之無精金石加日添火餌之以求超升誤矣然而古今上士亦論外丹非外丹不可用如廣成子以硃砂為丹煉之九轉而曰神丹陳七子以七寶丹砂煉之九轉而曰靈丹劉安王以童子小便煉之七轉而曰還丹是知靈聚而為神神散而為虛以氣還元而曰還丹後人用之亦見有功昇仙者蓋始也煉之而內事兼修內外俱成得通仙道若以外藥獨用氣弱神衰天地秀氣不能停留反為害不細矣真鉛汞玄洞玉詔曰昔廣成子教黃帝煉外丹方有鉛汞之物凡以內事為法則也人之初生先生腎也腎為北方壬癸水在五金而為鉛次生心也心為南方丙丁火在八石而為砂鉛中取銀如腎氣之中暗藏真一之水砂中取汞如心氣之中暗藏正陽之氣蓋以外鉛中銀而合砂中汞自然成砂火候合宜鍛成大寶取類於人則腎氣之中取真一之水心液之上取正陽之氣二物合而為丹乃如外物見寶之比也傳道集曰抱天一之質而為五金之首者黑鉛也鉛以生銀鉛乃銀之母感太陽之氣而為眾石之主者硃砂也砂以生汞汞乃砂之子難取者鉛中之銀易失者砂中之汞鉛汞若相合鍛鍊自成寶此鉛汞之理見於外也若以內言之父母真氣合而為一即精血為胞胎凝結為內腎內腎者鉛也及夫腎中生氣氣中生水以腎水合心液之上正陽之氣凝結於黃庭而為丹則曰真鉛也以腎氣合心氣積氣生液結為玄珠方還下丹田而曰汞也及夫丹就真氣升腎氣入頂而真水降一升一沉於十二樓前而為既濟既濟一次而還下丹田故曰真汞也元皇君訣曰鉛汞鼎中居燒成無價珠都來兩個字了得萬家書正一真人曰鉛汞傳來幾萬秋幾人悟得幾人修若教此理常人會塵世神仙似水流呂公曰金丹一粒定長生須得真鉛煉甲庚火取南方赤鳳髓水求北海黑龜精古今上聖稱說鉛汞之理不同其來止於鉛為腎水而真鉛為丹汞為心液而真汞為藥真鉛真汞為既濟若憑外說不可中理矣真陰陽九天秘錄曰一陰一陽謂之道陰陽不測之謂神物中神而大者天得一陽以守乾道地得一陰以守坤道物中神而明者日得一陽魂以道應月得一陰魂以道致故夏至一陰自天來若無真陽萬物死也不能焦枯冬至一陽自地升若無真陰萬物生也不能滋潤也日有真陽陽燧感而火出月無真陰故方諸取而水絕此天地日月至大至明真陰真陽豈人之不若是乎西山記曰腎水也水中生氣名曰真火氣中暗藏真一之水是陰中有陽陽中有陰也心火也火中生液名曰真水液中暗藏正陽之氣是陽中有陰陰中有陽也三華者三陽腎氣乃陰中之陽丹中真氣則真陽中之陽也心液之氣乃陽中之陽不說三陰也所貴陰盡陽純矣玉皇聖胎訣言人常降心火於下田外境不入泯絕狂慮一氣不散委於氣海腎氣不能上升其息漸少縱出之悠悠然減省也故後聖有自然胎息矣及達磨胎息至理言人之氣升自有走失莫若內視諸世界遊玩自己天宮超清虛妙境其法貴乎無漏一念不生一意不動無漏則善果成不動而真聖見而面壁九年氣無毫髮走失陰靈自外而身有身東人不悟乃擲缽西歸故聖人曰真胎息也及扁鵲解靈樞以冬至之後真鉛積之一分狀如戲蕊而鎮丹田令人鼻引清氣閉口不出以定息二十四數為火一兩四十五日火進一十六兩而煉就陽胎又以夏至之後汞積之三分狀如抱卵而鎮絳唇亦以鼻引清氣閉口不出以定息二十四數為火一兩四十五日火進一十六兩而煉陰息以陰息投陽胎而生真氣真氣生元神神形合為一與天地齊年離而為二身外有身而為羽客仙子不在塵世以返三島十洲者也及葛洪注胎息論曰凡胎息之要如在母腹中母呼即呼母吸即吸今人不達妙理縱能閉之少時隨口出之喘息不已非止不能留所閉之息而又元氣損虛返為外來陽氣所奪若氣未急之前外身自可停步少時勿使大急未氣急之際先鼻引清氣一口續後便以新取之氣換出舊閉急者之餘氣也故得奪住其氣積而形神清爽可以除療百病曲留強住亦非自然所以為下等胎息真仙上聖而有三品之論也鼻引口吐可以去浮寒逐客熱沖結滯行經絡若定息氣血不交陰陽自媾若定萬息氣住神藏大乘之功不可言也補氣之道此為上矣或嚥氣救飢渴行氣以壯肌膚收氣補下田養氣以返童顏運氣以益血脈雖見小功終不及胎息之補氣得力功速且久也煉法入道西山記曰以法入道道故不難以道求仙仙亦甚易求仙不難所以難者所學之道不正學道不難所以難者所學之法不真昔人隱形易貌留氣返魂咒白刃不傷禁毒蟲不害釘釘自落履火不焦使水逆行迴風倒雨結巾投地而兔走盤帶輟針而蛇行苽果結實於須臾龍魚遨遊於傾刻若此是其術也而與法不同故昔人以冬後陽生而春分之後余寒誤入腸胃以為傷寒之疾既覺急居靜室盤膝正坐閉目冥心定息住氣以雙手疊之兜外腎向前倒身跪禮不過二三十度汗出清涼寒氣自散昔人夢泄遺漏或下元虛冷乃於日落之後靜坐幽室以手兜外腎以手搓臍下八十一數搓手兜腎兜手搓臍八十一數九遍為度但左右換手而已遂丹元補暖真氣充盈昔人以幽居靜室絕念忘言一向下心火閉目存想如火輪炎炎積日氣海堅固顏色異常日久下盡諸穢自耐寒暑也昔人以飲食過度胸臆注滿或寒熱凝滯或痛結雍塞當靜坐鼻引清氣口閉不開多入少出攻所病之處大緊方放其氣不下三五次自然消除永絕萬病昔人心上為陽而陰不能到以腎下為陰而陽不能及故湧泉之上氣升而不降血注而不升致使腳膝沉重陰凝而陽散又況終日奔馳無時休息當夜後湯灌二足此外益而功少不若高舉二足使氣倒流於湧泉逆流於丹闕即日足輕行及奔馬其步如飛也昔人以四肢小疾五臟微疴或而凝滯雍塞靜坐澄清閉目絕念運心氣於所病之處暫閉息少時無攻不勝以上皆法也而與道不同夫道者無所不包無所不通何止為技藝之能治疾病之功而已因術識法因法知道道本一陰一陽而已陰陽相交相合故天地有春夏秋冬之四季日月有弦望晦朔之四候惟人也於一日之間醜末寅初陽合陰也辰末巳初陽交陽也未末申初陰合陽也戌末亥初陰交陰也悟陰陽交合何道之遠哉煉形化氣西山記曰形者氣之舍氣者形之主借形養氣氣壯而形固矣運氣煉形形全而氣自真矣故人之真氣大運隨天春在肝夏在心秋在肺冬在腎人之元氣小運隨日子在腎卯在肝午在心酉在肺古先達士識破天機以氣度合天度以日用參年用自子至午氣生之時而用聚氣還丹之法自午至子氣散之時而用收氣煉丹之法彭玉真人訣曰午前煉乾午後煉坤自寅至午乃升身靜坐冥目忘言鼻息遲遲密想心宮如夫婦相見之儀久久成功而得長生不死昔元昉真人訣曰自晨起不語以舌攪上齶下齶惡濁之津咽之而呵出心中所積喜怒哀樂之氣真氣上升寄留面目以手握之次居靜室宴坐不語至午未之間氣盛神昏側臥閉口而睡積日安樂延年亦可留形住世此知其時候悟其交合而無採取之法也西山上聖知其子時腎氣生卯時肝氣生午時腎氣交心氣積氣生液還於丹田而曰玄珠若火候無差乃成大藥腎氣之中暗藏真一之水心液之上暗藏正陽之氣以陰抱陽用水承氣此大道之本長生之藥如何使之不走失當辰巳之間幽室靜坐神識內守滿口含津勿咽勿吐鼻息少入遲出綿綿若存自然二氣相交凝結如露一百日無差藥力全二百日聖胎堅三百日仙完而真氣生氣中有氣而可煉氣成神故鍾離曰昔有三真頌金丹六訣矣若以修行不悟此世人學道謾勞功又曰閒庭無事憶江南華滿春城水滿潭若見揚州風物好是須穩駕虎龍船此名曰龍虎交媾又曰採藥之法也及自午至子而用收氣煉丹之法者而為火候古今不同夫不悟真理不識天機而達造化之宜者惟扁鵲解靈樞以鼻引清氣入而留之四息為一銖二十四銖為一兩火夏至之後以巽卦天霐運二十五度行之煉真汞而為陰胎冬至以乾卦靈符運二十五度行之煉真鉛而為陽息陽息投陰胎而變金丹金丹一粒可長生不死廣成子教黃帝自晨至暮靜坐忘念屏絕外慮神識內守一意不散降心火于丹田存臍下如淨瓶淨瓶之中有一珠如彈丸用炎炎火不計晝夜而下燒之至於胎成息住自然不飢不渴不畏寒暑可以留形住世此進火得時亦無聚氣之法西山有頌曰佳人才子正當年華落黃昏聚會難不避主公腸欲斷時來須索閉陽關此戌末亥初氣隨真液還丹之際陰交陰而氣欲散失當居靜室息不必閉也但少入遲出心火下降至意留在丹田恐腎氣升而不停心火降而不住乃微以肚腹輕脅丹田自熱煉日中所得之藥始也一百日乾卦次一百日兌卦至乾卦次一百日坤卦至乾卦乾坤相見火候無差若此加減合宜如說抽添須肘後飛金晶也故古先上聖於離卦採藥乾卦進火三百日結就內丹而為陸地神仙形神俱妙浩劫不死故煉形之道非真氣不可也煉氣成神西山記曰以氣煉形形化氣而體骨輕健入水不溺蹈火不熱其大平龍虎交媾而成大藥火候無差以變金丹若以神煉氣氣煉成神非在於陽交陰會其在於抽鉛添汞致二八之陰消換骨煉形使九三之陽長三百日仙胎完而真氣生不可再採藥也肘後飛金晶自腎後尾閭穴升之而到夾脊自夾脊雙關升之而至上宮不止於腎氣補腦而午後降真火以煉丹藥致陰盡陽純也如是子時腎氣方生靜室清心閉目正坐斂身而腎氣自聚微微升身偃胸直腰先到夾脊次到上宮自子醜至辰巳定一百日一撞三關而又積心之真火鍛鍊下元內丹陰固陽凝氣自紛紜是日氣中有氣前升入頂後起入腦前後俱起但升身勿動以焚身逐陰鬼一燒增一氣十燒增一神百燒延萬年千燒出塵世古先上聖恐火大過而又有澆灌之法也始以採藥是玉液還丹次以肘後金晶入腦自上田復入下田是金液還丹之法也以鼓兩頰而噓咽納氣是也丹就而真氣生以真氣煉五臟之氣九仙經云煉神劍金槌本以五臟之氣中黃經云閉之千息以煉五臟五臟各出本色氣聚而上以朝元三陽合而升之入頂是則不出五臟而無修煉之時又無鍛鍊之法也西山有煉氣之法妙且玄矣採藥進火三百日大藥成還丹煉形二百日真氣滿大運不必隨天但可以小運應日閉氣煉氣如甲乙日煉肝氣甲日肝氣先進於艮卦閉息至巽卦為期如青氣現運而在頂乙日養肝氣與彼法同凡起火識五行生剋也丙丁日煉心氣丙日心氣先進於巽卦閉息至坤卦為期如赤氣現運而在頂丁日養心氣凡起火識五行生剋也戊己日煉脾氣先進於春則辰時一時閉息夏則未時閉息秋則戌時閉息冬則丑時閉息凡起火識五行生剋也庚辛日煉肺氣庚日肺氣先進於坤卦閉息至乾卦為期如白氣現運而在頂辛日養肺氣凡起火識五行生剋也壬癸日煉腎氣壬日腎氣先進於乾卦閉息至艮卦為期如黑氣現運而在頂癸日養腎氣凡起火識五行生剋也十日一翻煉遍五臟凡二百五十日各煉二十五日數真氣自聚開河車搬五彩之物笙簧女樂車馬旌旗各分方號隊陣喜笑熙熙上朝帝闕共入天宮或而陰鬼作梗邪魔為障但於靜室中閉目冥心升身正坐三昧真火自起一燒而魔鬼消散火過清涼了無一物前件侍從歌樂轉加繁盛終日默坐內觀明達並無厭足奇驗異證不可備錄既覺身形常似飛騰意氣飄揚難以制御常用調神出殼乃超凡入聖之時也煉神合道西山記曰修真之士志在玄元而甘寂寞一日氣滿功盈五氣朝元三花聚頂血凝氣聚萬神朝真並在上宮富貴華盛樓臺車馬士女笙簧殆非人世所有勿得認為真境是自身上宮未能超脫內院因循不出是為困在昏衢形神俱妙不能超脫止為陸地神仙難以棄殼而返十洲三島西山上聖前功已滿而出殼之法不可不備錄詳記也昔海蟾公功滿數足陽神欲出方在上宮而靜室孤坐如鶴出天門龍生舊穴猛撞天門自開棄殼而去鍾離公功滿數足靜坐內觀如登七級寶臺自下而上一級至一級上盡到時勿忽忽則變殼不出止為陸地神仙登之既盡閉目下跳如夢中方寐身外有身如嬰兒大瑩潔可愛勿得遠遊速須復入本軀入而不出與天地齊年出而不入與凡俗異處呂公出法七層寶臺三級紅樓一如鍾離之法方當內觀紫河車搬神上入天宮留戀紫華而不肯超出故起真火而於煙焰中化一火龍躍出昏衢乃棄殼之法最妙者也世祖禪師雖無火候而陰靈亦不散方在內觀而於定中以神磬聲而去此止可出而不見入法也昔達摩六祖禪師雖是陰神出殼始以形如枯木心若死灰集神既聚一意不散神識內守從心地湧起一升復一升直過三十三天化樂天宮如道家之在上宮也當跪禮前進從三門之中門而出此亦出而不能入也西山上聖功滿數足其出也雖不離內觀中起大歌樂過中門故起火是搬神入頂過門是調神出殼方在內觀起火之後想鬧華深處有孤村寮舍三二間始自彼中出既遠既近而回望故園依依寥落欲去不可回視欲來則不可錯路聖聖相傳皆得棄殼而無難易也頌曰功成須是出神京內境繁華勿累身回望故園風物好鬧華深處有孤村嗟夫少學無知之徒止於定中而出陰神一日誤出天門不能回返本軀名曰尸解坐化迷惑世人深為有識者之所笑也煉道入聖洞天語錄曰世人不悟大理以塵世石火電光中暫榮暫貴役使心緒無定一日氣弱而病氣絕而死轉轉不悟流身異類透靈於別殼終不達生死之宜夫修養真氣真氣既成而鍛鍊陽神陽神既出而得離塵世方居三島功成神遷棄殼須傳流積行於人間行滿功成受紫詔天書而居洞天矣稚川受道記曰道成之人不可不傳傳之非人禍及七祖得人不傳災臨己身赤松子戒黃帝曰道不可私求必以物將其理當信金而示不變也西山記曰所為舍施者表其受道之人誠心也大則舍一身中則舍兒孫下則舍田宅上則舍施於有道之人中則舍施於有法之人下則舍施於有術之人也茅真君戒曰傳道之人必欲與先聖立教遇有志之士勿謂無信金而不傳遇無志之士勿謂得信金而強與非特墜教墜道而又彼此皆無益也玉真人請益元德真君曰上仙入南洲傳道立教必欲立盟誓出金玉者何也真君曰蓋南洲之人孽重福薄不信天機輕命重財願為下鬼若不立信金彼必有反慮若不設盟誓彼必輕泄故取之以金表其不變嗟夫人居大眾萬中無一人奉心清虛萬中無一人志誠萬中無一人明者明破天機而輕於財貨委於性命留意者少矣蓋其人假道求財誑惑有志之士致使信心者見道流棄之遂使高道之士束手鉗口見死不救若奉道之士識人而知其賢愚受法而知其邪正節次得事續續有功使泰華為金未可酬師友之一二也保生要錄序嘗聞松有千歲之固雪無一時之堅若植松於腐壤不期月而必蠹藏雪於陰山雖累年而不消違其性則堅者脆順其理則促者延物情既爾人理豈殊然則所謂調攝之術者又可忽乎臣竊覽前人所撰保生之書往往拘忌大多節目大繁行者難之在於崇貴尤不易為臣少也多病留心養生研究既久編次云就其術簡易乘間可行先欲固其正氣次欲調其肢體至於衣服居處藥餌之方蔬果禽魚之性有益者必錄無補者不書古方有誤者重明俗用或乖者必正目之曰保生要錄雖無裨於聞道粗有資於衛生冒昧上獻伏深戰灼蒲虔貫謹序養神氣門嵇叔夜云服藥求汗或有弗獲愧情一焦渙然流離明情發於中而形於外則知喜怒哀樂寧不傷人故心不撓者神不疲神不疲則氣不亂氣不亂則身泰壽延矣調肢體門養生者形要小勞無至大疲故水流則清滯則汙養生之人欲血脈常行如水之流坐不欲至倦行不欲至勞頻行不已然宜稍緩即是小勞之術也故手足欲時其屈伸兩臂欲左挽右挽如挽弓法或兩手雙拓如拓石法或雙拳築空或手臂左右前後輕擺或頭項左右顧或腰胯左右轉時俯時仰或兩手相捉細細捩如洗手法或兩手掌相摩令熱掩目摩面事間隨意為之各十數過而已每日頻行必身輕目明筋節血脈調暢飲食易消無所擁滯體中小不佳快為之即解舊導引方太煩崇貴之人不易為也今此術不擇時節亦無度數乘閒便作而見效且速夫人夜臥欲自以手摩四肢胸腹十數過名曰干浴臥欲側而曲膝益氣力常時濁唾則吐清津則咽常以舌拄上齶聚清津而咽之潤五臟悅肌膚令人長壽不老黃庭經曰口為玉池大和宮嗽咽靈液災不幹又曰閉口屈舌食胎津使我遂煉獲飛仙頻叩齒令齒牢又辟惡夫人春時暑月欲得晚眠早起秋欲早眠早起冬欲早眠晏起早不宜在雞鳴前晚不宜在日出後熱時欲舒暢寒月欲收密此合四氣之宜保身益壽之道也論衣服門臣聞衣服厚薄欲得隨時合度是以暑月不可全薄寒時不可極溫盛熱能著單熟衣臥熟帳或腰腹膝脛以來覆被極宜人冬月綿衣莫令甚厚寒則頻添重數如此則令人不驟寒不驟熱也故寒時而熱則減減則不傷於溫熱時而寒則加加則不傷於寒寒熱若時妄自脫著則傷於寒熱矣寒欲漸著熱欲漸脫腰腹下至足脛欲得常溫胸上至頭欲得稍涼涼不至凍溫不至燥衣為汗濕即時易之薰衣火氣未歇不可便著夫寒熱平和形神恬靜疾疹不生壽年自永論飲食門飲食者所以資養人之血氣血則榮華形體氣則衛護四肢精華者為髓為精其次者為肌為肉常時不可待極飢而方食候極飽而撤饌常欲如飢中飽飽中飢青牛道士云人慾先飢而後食先渴而後飲不欲強食強飲故也又不欲先進熱食而隨餐冷物必冷熱相攻而為患凡食先熱食次溫食方可少餐冷食也凡食太熱則傷骨太冷則傷筋雖熱不得灼唇雖冷不可凍齒凡食溫勝冷少勝多熟勝生淡勝咸凡食熱汗出勿洗面令人失顏色面上如蟲行食飽沐發作頭風凡所好之物不可偏耽偏耽則傷而生疾所惡之味不可全棄全棄則臟氣不均如全不食苦則心氣虛全不食鹹則腎氣弱是也是以天有五行人有五臟食有五味故肝法木心法火脾法土肺法金腎法水酸納肝苦納心甘納脾辛納肺咸納腎木生火火生土土生金金生水水生木木製土土製水水制火火制金金制木故四時無多食所生並所制之味皆能傷所生之臟也宜食相生之味助王氣也王臟不傷王氣增益飲食合度寒溫得宜則諸疾不生遐齡自永矣論居處門傳曰土厚水深居之不疾故人居處隨其方所皆欲土厚水深土欲堅潤而黃水欲甘美而澄常居之室極令周密勿有細隙致風氣得入久居善中人風者天地之氣也能生成萬物亦能損人初入腠理之間漸至肌膚之內內傳經脈達於臟腑傳變既廣為患則深故古人云避風如避矢盛暑久坐兩頭通屋大招風夾道尤甚盛暑不可露臥自立春後至立秋前欲東其首立秋後至立春前欲西其首常枕藥枕勝於寶玉寶玉大冷傷腦其枕藥性大熱則熱氣衝上大冷又冷氣傷腦唯用理風平涼者乃為得宜藥枕方久枕治頭風目眩腦重冷痛眼暗鼻塞兼辟邪蔓荊子八分甘菊花八分細辛六分吳白芷六分白朮四分芎藭六分通草八分防風八分藁本六分羚羊角八分犀角八分石上菖蒲八分黑豆五合揀擇挼令淨上前件藥細銼去碎末相伴令勻以生絹囊盛之欲達其氣次用碧羅袋重盛縫之如枕樣納藥直令緊實置在合子中其合形也如枕納藥囊令出合子唇一寸半以來欲枕時揭去合蓋不枕即蓋之使藥氣不散枕之日久漸低更入藥以實之或添黑豆令如初三五月後藥氣歇則換之初枕旬日或一月耳中微鳴是藥抽風之驗論藥食門辯服金石金石之藥有可服不可服之理欲究養生之術須窮藥石之由今假設問辭用明至理或問曰夫金石之藥埋之不腐煮之不爛用能固氣可以延年草木之藥未免腐爛之患焉有固駐之功答曰夫金石之藥其性驃悍而無津液人之盛壯服且無益若及其衰弱毒則發焉夫壯年則氣盛而滑利盛則能制石滑則能行石故不發也及其衰弱則榮衛氣澀澀則不能行石弱則不能制石石無所制而行者留積故為人大患也欲益而損何固駐之有哉問曰亦有未虛而石發者乎答曰憂恚在心而不能宣則榮衛澀滯而不行石勢結積而不散隨其積聚發諸癰瘡又有服石之人倚石勢而縱佚遊石勢既行乃作強中之病不曉者以為奇效精液焦枯猛熱遂作洞釜加爨罕不焦然問曰金石之為害若此農皇何以標之於本經答曰太虛積冷之人不妨暫服疾愈而止則無害矣又問前雲石勢驃悍臟衰則發今先虛而服石者豈能制其勢力乎且未見其有害何也答曰初服之時石勢永積又乘虛冷之甚故不發也以此觀之當太虛積冷之時暫可服餌若久長防患則不如草木之藥焉又問草木自不能久豈能固人哉答曰服之不倦勢力相摟積年之後必獲大益夫攻療之藥以疾瘥而見功固駐之方覺體安而是效形神既寧則壽命自永矣果類蓮實粉主補中養神益氣力除百疾久股輕身延年取蓮實八月就他皮黑者去皮心曝乾搗篩為粉早以酒或白粥調之不宜與地黃同食蓮實嫩時生食動氣為粉益人栗子粉主厚腸胃補腎氣取栗子曝乾令皮自坼去皮薄切又曝令極干搗為粉如蓮粉法食之凡食栗子生食動蟲發氣熟食亦發脹皆不及曝令半乾衣中近肌肉暖而食之甚益人葡萄作漿雖是常術且補益功優主筋骨濕痹益氣力強志令人肥健久服輕身不老延年葡萄熟時先於根底著羊肉汁米泔汁各一斗如是經宿揀熟者摘之納新白瓶中令滿稍實密封石器自然成漿去滓飲之味過醇酎甚益人榴梨漿治風熱昏悶煩躁青梨大者二十顆石榴十顆淡竹瀝三大升上搗榴梨捩取自然汁澄濾拌竹瀝一服五合日三服梨極大方用二十顆小者三十顆谷並菜類胡麻主腸中虛羸補五內益氣力長肌肉填髓腦堅筋骨去虛熱久服明目輕身不老延年一名巨勝四稜為胡麻八稜為巨勝陶弘景雲八谷之中唯此為良又云味甘在米豆部此正是烏麻也今時所用巨勝莖莢雖小類麻而葉子大極味苦其性甚冷夫味苦不可入米穀性冷不可為補益其葉又與麻不同陰暗則低日烈則起此當別是一物非巨勝胡麻也今俗但用不覺其非正當用烏油麻味甘而莢有四稜者為胡麻八稜者曰巨勝正合本經不當用味苦而冷者也肉類羖䍽羊丈夫食之損陽女人食之絕陰此羊中有角者是羊髓補虛損腦髓食不益人鹿肉溫補中強五臟益氣力壺居士云鹿性警烈多食良草處必山岡產必澗澤故可饗神者以其潔故也食良草有九物鹿蔥鹿藥白蒿水芹甘草山蒼葛葉並根齊頭蒿薺苨鹿常食此九草性能解毒治風壓丹石服附子多食鹿肉附子少力也五月忌食之茸不可近鼻獐肉溫補五臟八月至十一月食勝羊肉十二月以後動風發氣不堪食鰻鱺魚性溫主五痔殺諸蟲補陽氣食三五度腰腎間百病自瘥五色者兼理婦人帶脈百病碎切去骨以五味調內羊腸中系兩頭炙之候冷然後切食雞雌而黃者性溫主虛渴數溺泄利補五臟益氣力黑者治風圓魚平補去骨節間諸壅熱氣五六月不宜食有人以鱉甲作散五六月間感陰濕氣忽化為小鱉豬無筋雞無髓藥食多絀之鵪性平補不宜合菌食之酥煎良佳修真秘錄食宜篇思仙問曰夫修養之士何物所宜食之充飢得不傷損矣真人曰酸鹹甘苦食之各歸其時春夏秋冬順之勿逆其臟所食大過成疾亦深節戒作方延益無限其傷損之事前已具言延益之宜今為子說無令說略子宜志之八素云春宜食辛辛能散也夏宜食鹹咸能潤也長夏宜食酸酸能收也秋宜食苦苦能堅也冬宜食甘肥甘能緩中而長肌肉肥能密理而補中皆益五臟而散邪氣矣此四時之味隨所宜加之食皆能益臟而除於邪養生之道可不移矣禮記內則云凡和春多酸夏多苦秋多辛冬多咸調以滑甘注云多其時味以養其氣也經曰春無食酸夏無食苦四時各減時味者謂氣壯也減其時味以殺盛氣內則所云多其時味恐氣虛羸故多其時味以養其氣也內則云春宜羔豚膳膏薌春為木王膏薌牛膏也牛中央土畜木剋土木盛則土休廢用休廢之膏以節其氣故用牛膏薌也夏宜腒鱐膳膏臊腒干雉也鱐乾魚也臊犬膏也犬屬西方金也夏屬南方火火剋金火盛則金休廢故用犬膏臊以節氣也秋宜犢麛膳膏腥膏腥雞也雞屬東方木秋屬西方金金剋木金盛則木休廢故用雞膏腥也冬宜鮮羽膳膏羶膏羶羊也羊屬南方火冬屬北方水水剋火水盛則火休廢故用休廢膏羶也鄭云彼羔豚物生而肥犢麛物成而充腒鱐暵熱而干魚雁水涸而性定此八物得四時之氣尤盛為人食之不勝是以用休廢之脂膏煎和膳之也凡牛宜稌羊宜黍豕宜稷犬宜粱雁宜麥魚宜瓜言其氣味相成也周禮天官云凡食齊視春時羔齊視夏時羔宜熱也醬齊視秋時醬宜涼也飲齊視冬時飲宜寒也太素云肝色青宜食甘粳米飯牛肉棗皆甘心色赤宜食酸麻犬肉李皆酸脾色黃宜食鹹大豆豬肉慄皆咸肺色白宜食苦麥羊肉杏皆苦腎色黑宜食辛黃黍雞桃皆辛又肝病者宜食麻麥犬肉李韭心病者宜食麥羊肉杏薤脾病者宜食粳米牛肉棗葵肺病者宜食黃黍雞肉桃蔥腎病者宜食大豆黃黍豬肉慄藿是故謹和五味則骨正筋柔氣血以流腠理以密如是則氣骨以精謹道如法長有天命羊肉大熱羊頭肉平主風眩疫疾羊肚主補胃虛損小便數止虛汗羊乳酪補肺利大腸羊腎補虛弱益髓犬肉溫主補五臟勞傷久服益氣力厚腸胃實下焦填骨髓不可炙食牛肉平牛乳甘寒主補虛羸止渴牛酪主寒熱止渴除胸中熱牛酥寒淘胸間客氣利大小腸鹿頭肉主消渴及多夢鹿肉主補中益氣力鹿蹄肉主骨髓中疼痛鹿久食令人耐寒獐肉補五臟從八月至十一月食勝羊肉驢肉主風狂憂愁不樂能安心氣貒肉主久水脹垂死作羹食之大效豹肉溫酸主強筋骨志性蝟肉平食之肥下焦強胃氣能食雄雞肉酸溫主下氣去狂邪安五臟腸中消渴烏雄雞肉甘溫主補中止痛除心腹惡氣烏雌雞肉味平甘主除風寒濕痹五緩六急安胎及乳癰雁肉味甘平主益氣輕身久服長髮耐老不飢白鴨肉平主補虛羸消毒熱和臟腑利水道黑鴨不可食野鴨肉味鹹寒主補中益氣和臟腑除客熱消食九月後好食消腹中蟲平胃氣調中輕身可長食之勝家鴨鶉溫補五臟益中續氣實筋骨耐寒暑消結實長食令人不厭四月以後八月以前不中食干棗味甘辛溫主心服邪氣安中養脾氣助十二經脈通九竅補少津液大驚強志久服輕身延年不飢成仙慄味鹹溫主益氣厚腸胃補腎令人耐飢生食治腰腳不宜蒸食柿味甘寒補虛勞不足乾者厚腸胃健脾氣消宿血紅柿至補肺氣續經絡氣橘子味酸寒主下氣開胸膈痰疾結氣止渴久服除口臭輕身長年皮陳久者良烏梅味苦平主下氣除煩熱安心神支體疼痛偏枯不仁止下痢好睡口乾𧁲寒益心氣補中焦不足櫻桃平主調中益脾氣多食無損令人好顏色美志性蒲桃味甘平主益氣倍力強志耐飢寒去腸間水調中久服之輕身延年林擒溫主止消渴好睡不可多食覆盆子味甘平主益氣輕身令人發不白甘蔗味甘平主益氣補脾氣利大腸止渴豆蔻味辛主溫中止嘔吐口臭蓮子寒主五臟不足傷中氣絕利益十二經脈二十五絡益血氣食之心歡止渴去熱補中養神除百病久服輕身耐老延年藕寒主補中益氣力養精神除目病久服輕身耐老不飢延年雞頭實主補中愈百病益子精強志明目菱實平主安中補臟令人不飢芋平主寬緩腹胃除死肌令人悅澤椹寒主補五臟明耳目利關節通血脈益精神久食不飢變白髮枸杞味苦寒主五內邪氣熱中消胸脅氣除客熱風痹堅筋骨強陰利大小腸補虛損明目益精氣久服輕身耐寒暑葵味甘寒宜脾久食利骨氣為百菜主竹筍味甘寒主消渴利水道益氣力不可久食苜宿味苦寒利五臟輕身去脾胃邪氣諸熱毒不可久食瘦人薺味甘溫主利肝臟和中明目服丹石人不可多食蔓菁味苦溫主消食下氣利五臟輕身益氣蘿蔔寒利五臟輕身益氣根消食下氣除五臟中風煉五臟中惡氣服之令人白淨細肌理美顏色制面毒白苣味苦寒主補筋力利五臟通經脈令人齒白聰明少睡蔥白味辛溫平冬月食之甚益不可多食虛人蔥青溫歸肉除肝邪安中利五臟益目精殺百藥毒薤味苦辛宜心歸骨除寒熱去水氣溫中散結氣輕身耐老學道人長服之通神安魂益氣續筋骨韭味辛酸溫歸心宜肝可久食安五臟不利病人荏子味辛主咳逆下氣溫中補髓葉調中卻臭氣紫蘇下氣除寒中薄荷味苦平卻腎氣解勞新病人不宜食荊芥味苦溫辟邪氣除勞不宜久食蘭香溫主消食去停水散毒氣茼蒿味辛平主安心氣養脾胃消飲食不可頻食香薷味辛溫散水腫止霍亂去熱風不可多食苦菜味苦寒主五臟邪氣久服安心益氣少臥輕身不老耐飢藍菜平主填骨髓利五臟調六腑理經絡結氣明耳目使人骨健少睡益心力久食大益人生薑溫去痰下氣去胸中臭氣通神明散煩悶開胃口水芹寒養神益力令人肥健殺百藥毒白蒿今青蒿也味辛主補中益氣養五臟長毛髮令黑久服輕身不老小葪根味甘溫主養精保氣令人肥澤野苣寒久食輕身少睡調十二經脈利五臟虛熱氣長食甚益人馬芹溫主心腹滿下氣消食能調味甘香美決明平主明目輕身利五臟牛蒡寒主去熱風頭面煩滿四肢不遂通十二經脈久服輕身菠薐寒主利五臟通腸胃服丹石人食之甚良朱莙達平主補中下氣利五臟白黍米味甘辛溫宜肺主補中益氣粳米味甘辛苦主心煩止渴益氣斷下痢平胃氣長肌肉倉粳米主補中益氣堅筋骨通血脈炊飯水浸令酸食之緩五臟六腑氣白粱米味甘寒除胸中客熱移易五臟六腑續筋骨可長食之粟米味鹹寒主養腎氣去骨痹熱中益氣力陳者止痢壓丹石毒胡麻味甘主益力氣長肌肉填骨髓堅筋骨治金瘡止痛久服輕身長年綠豆味甘酸主虛羸補五內虛乏益氣安精神行十二經脈食之脾厚肚寬可長食之大麥味鹹寒宜心主消渴除煩熱益氣調中久食頭不白穬麥味甘寒主輕身除熱久食令人多力健行五穀之中穬麥為上小麥味甘寒主養肝氣去寒熱止渴煩補中益氣和五臟調經絡薏苡仁味甘溫主筋急拘攣久風濕痹下氣久服輕身益氣除筋骨中邪氣利腸胃消水腫令人能食稗米味甘平主益氣補中利脾胃氣白豆平補五臟益中助十二經脈可長食之飴糖味甘溫主補虛乏益心力止渴治喉咽痛除唾血月宜篇思仙問曰嘗聞月宿所宜食者願賜其法真人曰每月宿下各有所宜之物人若擇而食之亦可除其疾疹矣今傳於爾亦可曉示將來養生論云正月卯日食鮦魚使人無瘟病二月春分食龜使人不蛔子孫蕃息三月宿畢食鮪魚使人不蛔美色多氣力送迎各二日春三月食大肉又先酸麥無齒病因甲乙以具四月宿昂食雞使人目明五月夏至食鳴鵙送迎各二日食鴟梟送迎十日六月宿房食野雉使人陽多遂子孫矣夏三月食雞雉及苦先麥食之無癉病因丙丁以具七月食蠹使人宜子孫送迎各二日蠹木蠍也八月秋分食蠹使人無病淫眾人畏之送迎二日九月宿建星食雁使人不病癉得良辰美筋骨送迎二日秋三月食馬肉及辛食之無寒病因庚辛以具十月宿營室食諸鳥使人爍心益壽美色送迎二日十一月冬至食兔令人不蛔利足不僵十二月臘夜令人持椒臥井旁無與人言納椒井中除瘟病冬三月食彘及咸食之無足病因壬癸以具常以其月不盡三月夕半食者無飽修齡要指四時調攝春三月此謂發陳夜臥早起節情欲以葆生生之氣少飲酒以防逆上之火肝旺脾衰減酸增甘肝藏魂性仁屬木味酸形如懸匏有七葉少近心左三葉右四葉著於內者為筋見於外者為爪以目為戶以膽為腑故食辛多則傷肝治肝用噓字導引以兩手相重按肩上徐徐緩緩身左右各三遍又可正坐兩手相叉翻覆向胸三五遍此能去肝家積聚風邪毒氣不令病作一春早暮須念念為之不可懈惰使一暴十寒方有成效正月腎氣受病肺臟氣微減鹹酸增辛辣助腎補肺安養胃氣衣宜下厚而上薄勿驟脫衣勿令犯風防夏餐雪二月腎氣微肝正旺戒酸增辛助腎補肝衣宜暖令得微汗以散去冬伏邪三月腎氣已息心氣漸臨木氣正旺減甘增辛補精益氣勿處淫地勿露體三光下膽附肝短葉下外應瞳神鼻柱間導引可正坐合兩腳掌昂頭以兩手挽腳腕起搖動為之三五度亦可大坐以兩手拓地舉身努力腰脊三五度能去膽家風毒邪氣夏三月此謂蕃秀夜臥早起伏陰在內宜戒生冷神氣散越宜遠房室勿暴怒勿當風防秋為瘧勿晝臥勿引飲主招百病心旺肺衰減苦增辛心藏神性禮屬火味苦形如例懸蓮蕊著於內者為脈見於外者為色以舌為戶以小腸為腑故食鹹則傷心治心用呵字導引可正坐兩手作拳用力左右互相虛築各五六度又以一手按髀一手向上拓空如擎石米之重左右更手行之又以兩手交叉以腳踏手中各五六度間氣為之去心胸風邪諸疾行之良久閉目三咽津叩齒三通而止四月肝臟已病心臟漸壯增酸減苦補腎助肝調養胃氣為純陽之月忌入房五月肝氣休心正旺減酸增苦益肝補腎固密精氣早臥早起名為毒月君子齋戒薄滋味節嗜欲黴雨淫蒸宜烘燥衣時焚蒼朮常擦湧泉穴以襪護足六月肝弱脾旺節約飲食遠避聲色陰氣內伏暑毒外蒸勿濯冷勿當風夜勿納涼臥勿搖扇腹護單衾食必溫暖脾藏意性信屬土味甘形如刀鐮著於內者為臟見於外者為肉以唇口為戶以胃為腑故食酸多則傷脾旺於四季末各十八日呼吸橐龠調和水火會合三家發生萬物全賴脾土脾健則身無疾治脾用呼字導引可大坐伸一腳屈一腳以兩手向後及掣三五度又跪坐以兩手據地回頭用力作虎視各三五度能去脾家積聚風邪毒氣又能消食秋三月此謂容平早臥早起收斂神氣禁吐禁汗肺旺肝衰減辛增酸肺藏魄性義屬金味辛形如懸磬名為華蓋六葉兩耳總計八葉著於內者為膚見於外者為皮毛以鼻為戶以大腸為腑故食苦多則傷肺治肺用呬字導引可正坐以兩手據地縮身曲脊向上三舉去肺家風邪積勞又當反拳槌背上左右各槌三度去胸臆間風毒邪氣為之良久閉目咽液叩齒而起七月肝心少氣肺臟獨旺增咸減辛助氣補筋以養脾胃安靜性情毋冒極熱須要爽氣足與腦宜微涼八月心臟氣微肺金用事減苦增辛助筋補血以養心肝脾胃勿食姜勿沾秋露九月陽氣已衰陰氣太盛減苦增甘補肝益腎助脾胃勿冒暴風恣醉飽冬三月此謂閉藏早臥晚起暖足涼腦曝背避寒勿令汗出目勿近火足宜常濯腎旺心衰減咸增苦腎藏志性智屬水味鹹左為腎右為命門上對臍附腰脊著於內者為骨見於外者為齒以耳為戶以膀胱為腑故食甘多則傷腎治腎用吹字導引可正坐以兩手聳托左右引脅三五度又將手反著膝挽肘左右同捩身三五度以足前後踏左右各數十度能去腰腎風邪積聚十月心肺氣弱腎氣強盛減辛苦以養腎氣為純陰之月一歲發育之功實胚胎於此大忌入房十一月腎臟正旺心肺衰微增苦減咸補理肺胃一陽方生遠帷幕省言語十二月土旺水氣不行減甘增苦補心助肺調理腎氣勿冒霜雪禁疲勞防汗出起居調攝平明睡覺先醒心後醒眼兩手搓熱熨眼數十遍以睛左旋右轉各九遍閉住少頃忽大掙開卻除風火披衣起坐叩齒集神次鳴天鼓依呵呼呬吹噓嘻六字訣吐濁吸清按五行相生循序而行一周散夜來蘊積邪氣隨便導引或進功夫徐徐櫛沐飲食調和面宜多擦發宜多梳目宜常運耳宜常凝齒宜常叩口宜常閉津宜常咽氣宜常提心宜常靜神宜常存背宜常暖腹宜常摩胸宜常護囊宜常裹言語宜常簡默皮膚宜常干沐食飽徐行摩臍擦背使食下舒方可就坐飽食發痔食後曲身而坐必病中滿怒後勿食食後勿怒身體常欲小勞流水不腐戶樞不朽運動故也勿得久勞久行傷筋久立傷骨久坐傷肉久臥傷氣久視傷神久聽傷精忍小便膝冷成淋忍大便乃成氣痔著濕衣汗衣令人生瘡夜膳勿飽飲酒勿醉醉後勿飲冷飽余勿便臥頭勿向北臥頭邊勿安火爐切忌子後行房陽方生而頓減之一度傷於百度大怒交合成癰疽疲勞入房虛損少子觸犯陰陽禁忌不惟父母受傷生子亦不仁不孝臨睡時調息咽津叩齒鳴天鼓先睡眼後睡心側曲而臥覺直而伸晝夜起居樂在其中矣延年六字訣此法以口吐鼻吸耳不聞聲乃妙此行六字工夫秘要訣也非此六氣行不到手本經以此導之若不引經不可知耳肝若噓時目瞪睛肺知呬氣手雙擎心呵頂上連叉手腎吹抱取膝頭平脾病呼時須撮口三焦客熱臥嘻寧吹腎氣訣腎為水病主生門有病尪羸氣色昏眉蹙耳鳴兼黑瘦吹之邪妄立逃奔呵心氣訣心源煩燥急須呵此法通神更莫過喉內口瘡並熱痛依之目下便安和噓肝氣訣肝主龍塗位號心病來還覺好酸辛眼中赤色兼多淚噓之立去病如神呬肺氣訣呬呬數多作生涎胸膈煩滿上焦痰若有肺病急須呬用之目下自安然呼脾氣訣脾宮屬土號太倉痰病行之勝藥方瀉痢腸鳴並吐水急調呼字免成殃嘻三焦訣三焦有病急須嘻古聖留言最上醫若或通行土壅塞不因此法又何知四季卻病歌春噓明目木扶肝夏至呵心火自閒秋呬定收金肺潤腎吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切忌出聲聞口耳其功尤勝保神丹長生一十六字妙訣一吸便提氣氣歸臍一提便咽水火相見右即上十六字仙家名曰十六錠金乃至簡至易之妙訣也無分於在官不妨政事在俗不妨家務在士商不妨本業只於二六時中略得空閒及行住坐臥意一到處便可行之口中先須嗽津三五次舌攪上下齶仍以舌抵上齶滿口津生連津嚥下汩然有聲隨於鼻中吸清氣一口以意會及心目驀地直送至腹臍下一寸三分丹田元海之中略存一存謂之一吸隨用下部輕輕如忍便狀以意力提起使歸臍連及夾脊雙關腎門一路提上直至後頂玉枕關透入泥丸頂內其升而上之亦不覺氣之上出謂之一呼一呼一吸謂之一息無既上升隨又似前汩然有聲嚥下鼻吸清氣送至丹田稍存一存又自下部如前輕輕提上與臍相接而上所謂氣氣歸臍壽與天齊矣凡嚥下口中有液愈妙無液亦要汩然有聲咽之如是一咽一提或三五口或七九或十二或二十四口要行即行要止即止只要不忘作為正事不使間斷方為精進如有瘋疾見效尤速久久行之卻病延年形體不變百疾不作自然不飢不渴安健勝常行之一年永絕感冒痞積逆滯不和癱疽瘡毒等疾耳目聰明心力強記宿疾俱瘳長生可望如親房事欲泄未泄之時亦能以此提呼咽吸運而使之歸於元海把牢春汛不放龍飛甚有益處所謂造化吾手宇宙吾心妙莫能述十六段錦莊子曰吹噓呼吸吐故納新熊經鳥伸為壽而已矣此導引之法養形之秘彭祖壽考之所由也其法自修養家所談無慮數百端今取其要約切當者十六條參之諸論大概備矣凡行導引常以夜半及平旦將起之時此時氣清腹虛行之益人先閉目握固冥心端坐叩齒三十六通即以兩手抱項左右宛轉二十四以去兩脅積聚風邪復以兩手相叉虛空托天按項二十四以除胸隔間邪氣復以兩手掩兩耳卻以第二指壓第三指彈擊腦後二十四以除風池邪氣復以兩手相提按左膝左捩身按右膝右捩身二十四以去肝家風邪復以兩手一向前一向後如挽五石弓狀以去臂腋積邪復大坐展兩手扭項左右反顧肩膊隨轉二十四以去脾家積邪復兩手握固並拄兩肋擺撼兩肩二十四以去腰肋間風邪復以兩手交捶臂及膊上連腰股各二十四以去四肢胸臆之邪復大坐斜身偏倚兩手齊向上如排天狀二十四以去肺間積邪復大坐伸腳以兩手向前低頭扳腳十二次卻鉤所伸腳屈在膝上按摩二十四以去心胞絡邪氣復以兩手據地縮身曲脊向上十三舉以去心肝中積邪復起立據床扳身向背後視左右二十四以去腎間風邪復起立齊行兩手握固左足前踏左手擺向前右手擺向後右足前踏右手擺向前左手擺向後二十四去兩肩之邪復以手向背上相捉低身徐徐宛轉二十四以去兩脅之邪復以足相扭而行前數十步高坐伸腿將兩足扭向內復扭向外各二十四以去兩足及兩腿間風邪復端坐閉目握固冥心以舌抵上齶攪取津液滿口漱三十六次作谷谷聲咽之復閉息想丹田火自下而上遍燒身體內外熱蒸乃止能日行一二遍久久身輕體健百病皆除走及奔馬不復疲乏矣八段錦導引法閉目冥心坐冥心盤趺而坐握固靜思神叩齒三十六兩手抱崑崙叉兩手向項後數九息勿令耳聞自此以後出入息皆不可使耳聞左右鳴天鼓二十四度聞移兩手心掩兩耳先以第二指壓中指彈擊腦後左右各二十四次微擺撼天柱搖頭左右顧肩膊隨轉動二十四先須握固赤龍攪水津赤龍者舌也以舌攪口齒並左右頰待津液生而咽漱津三十六一云鼓漱神水滿口勻一口分三咽所漱津液分作三口作汩汩聲而咽之龍行虎自奔液為龍氣為虎閉氣搓手熱以鼻引清氣閉之少頃搓手急數令極熱鼻中徐徐乃放氣出背摩後精門精門者腰後外腎也合手心摩畢收手握固盡此一口氣再閉氣也想火燒臍輪閉口鼻之氣想用心火下燒丹田覺熱極即用後法左右轆轤轉俯首擺撼兩肩三十六想火自丹田透雙關入腦戶鼻引清氣閉少頃間兩腳放舒伸放直兩腳叉手雙虛托叉手相交向上托空三次或九次低頭攀足頻以兩手向前攀腳心十二次乃收足端坐以候逆水上候口中津液生如未生再用舌急攪取水同前法再漱再吞律如此三度畢神水九次吞謂再漱三十六如前口分三咽乃為九也嚥下汩汩響百脈自調勻河車搬運訖擺肩並身二十四及再轉轆轤二十四次發火遍燒身想丹田火自下而上遍燒身體想時口鼻皆閉氣少頃邪魔不敢近夢寐不能昏寒暑不能入災病不能迍子後午前作造化合乾坤循環次第轉八卦是良因訣曰其法於甲子日夜半子時起首行時口中不得出氣唯鼻中微放清氣每日子後午前各行一次或晝夜共行三次久而自知蠲除疾病漸覺身輕能勤苦不怠則仙道不遠矣導引卻病歌訣水潮除後患平明睡起時即起端坐凝神息慮舌抵上齶閉口調息津液自生漸至滿口分作三次以意送下久行之則五臟之邪火不炎四肢之氣血流暢諸疾不生久除後患老而不衰訣曰津液頻生在舌端尋常數嚥下丹田於中暢美無凝滯百日功靈可駐顏起火得長安子午二時存想真火自湧泉穴起先從左足行上玉枕過泥丸降入丹田三遍次從右足亦行三遍復從尾閭起又行三遍久久純熟則百脈流通五臟無滯四肢健而百骸理也訣曰陽火須知自下生陰符上降落黃庭周流不息精神固此是真人大煉形夢失封金匱欲動則火熾火熾則神疲神疲則精滑而夢失也寤寐時調息神思以左手搓臍二七右手亦然復以兩手搓脅擺搖七七嚥氣納于丹田握固良久乃止屈足側臥永無走失訣曰精滑神疲欲火攻夢中遺失致傷生搓摩有訣君須記絕欲除貪最上乘形衰守玉關百慮感中萬事勞形所以衰也返老還童非金丹不可然金丹豈易得哉善攝生者行住坐臥一意不散固守丹田默運神氣沖透三關自然生精生氣則形可以壯老可以耐矣決曰卻老扶衰別有方不須身外覓陰陽玉關謹守常淵默氣足神全壽更康鼓呵消積聚有因食而積者有因氣而積者久則脾胃受傷醫藥難治孰若節飲食戒嗔怒不使有積聚為妙患者當正身閉息鼓動胸腹俟其氣滿緩緩呵出如此行五七次便得通快即止訣曰氣滯脾虛食不消胸中鼓悶最難調徐徐呵鼓潛通泰疾退身安莫久勞兜禮治傷寒元氣虧弱腠理不密則風寒傷感患者端坐盤足以兩手緊兜外腎閉口緘息存想真氣自尾閭升過夾脊透泥丸逐其邪氣低頭屈抑如禮拜狀不拘數以汗出為度其疾即愈訣曰跏趺端坐向蒲團手握陰囊意要專運氣叩頭三五遍頓令寒疾立時安叩齒牙無疾齒之有疾乃脾胃之火薰蒸每侵晨睡醒時叩齒三十六遍以舌攪牙齦之上不論遍數津液滿口方可嚥下每作三次乃止凡小解之時閉口咬牙解畢方開永無齒疾訣曰熱極風生齒不寧侵晨叩漱自惺惺若教運用常無隔還許他年老復丁升觀鬢不班思慮太過則神耗氣虛血敗而鬢班矣要以子午時握固端坐凝神絕念兩眼令光上視泥丸存想追攝二氣自尾閭間上升下降返還元海每行九遍久則神全氣血充足發可返黑也訣曰神氣衝和精自全存無守有養胎仙心中念慮皆消滅要學神仙也不難運睛除眼翳傷熱傷氣肝虛腎虛則眼昏生翳日久不治盲瞎必矣每日睡起時趺坐凝思塞兌垂簾將雙目輪轉十四次緊閉少時忽然大瞪行久不替內障外翳自散切忌色欲並書細字訣曰喜怒傷神目不明垂簾塞兌養元精精生氣化神來復五內陰魔自失驚掩耳去頭旋邪風入腦虛火上攻則頭目昏旋偏正作痛久則中風不語半身不遂亦由此致治之須靜坐升身閉息以兩手掩耳折頭五七次存想元神逆上泥丸以逐其邪自然風邪散去訣曰視聽無聞意在心神從髓海逐邪氛更兼精氣無虛耗可學蓬萊境上人托踏應輕骨四肢亦欲得小勞譬如戶樞終不朽熊鳥演法吐納導引皆養生之術也平時雙手上托如舉大石兩腳前踏如覆平地存想神氣依按四時噓呵二七次則身輕體健足耐寒暑訣曰精氣衝和五臟安四肢完固骨強堅雖然不得刀圭餌且住人間作地仙搓塗自美顏顏色憔悴所由心思過度勞碌不謹每晨靜坐閉目凝神存養神氣衝澹自內達外以兩手搓熱拂面七次仍以嗽津塗面搓拂數次行之半月則皮膚光潤容顏悅澤大過尋常矣訣曰寡欲心虛氣血盈自然五臟得和平衰顏仗此增光澤不羨人間五等榮閉摩通滯氣氣滯則痛血滯則腫滯之為患不可不慎治之須澄心閉息以左手摩滯七七遍右手亦然復以津塗之勤行七日則氣血通暢永無凝滯之患修養家所謂干沐浴者即此義也訣曰榮衛流行不暫休一才凝滯便堪憂誰知閉息能通暢此外何須別計求凝抱固丹田元神一出便收來神返身中氣自回如此朝朝並暮暮自然赤子產真胎此凝抱之功也平時靜坐存想元神入于丹田隨意呼吸旬日丹田完固百日靈明漸通不可或作或輟也訣曰丹田完固氣歸根氣聚神凝道合真久視定須從此始莫教虛度好光陰淡食能多補五味之於五臟各有所宜若食之不節必至虧損孰若食淡謹節之為愈也然此淡亦非棄絕五味特言欲五味之沖淡耳仙翁有云斷鹽不是道飲食無滋味可見其不絕五味淡對濃而言若膏粱過度之類如吃素是也訣曰厚味傷人無所知能甘淡薄是吾師三千功行從茲始天鑑行藏信有之無心得大還大還之道聖道也無心者常清常靜也人能常清靜天地悉皆歸何聖道之不可傳大還之不可得哉清靜經已備言之矣修真之士體而行之欲造夫清真靈妙之境若反掌耳訣曰有作有為云至要無聲無臭語方奇中秋午夜通消息明月當空造化基卻病八則平坐以一手握腳指以一手擦足心赤肉不計數目以熱為度即將腳指略略轉動左右兩足心更手握擦倦則少歇或令人擦之終不若自擦為佳此名湧泉穴能除濕氣固真元臨臥時坐於床垂足解衣閉息舌拄上齶目視頂門提縮穀道兩手摩擦兩腎腧各一百二十多多益善極能生精固陽治腰病兩肩後小穴中為上元六合之府常以手捏雷訣以大指骨曲接三九遍又搓手熨摩兩目顧上及耳根逆乘髮際各三九能令耳目聰明夜可細書並足壁立向暗處以左手從項後緊攀右眼連頭用力反顧亮處九遍右手亦從項後緊攀左眼扭顧照前能治雙目赤澀火痛單病則單行靜坐閉息納氣猛送下鼓動胸腹兩手作挽弓狀左右數四氣極滿緩緩呵出五七通快即止治四肢煩悶背急停滯覆臥去枕壁立兩足以鼻納氣四復以鼻出之四若氣出之極令微氣再入鼻中勿令鼻知除身中熱及背痛之疾端坐伸腰舉左手仰掌以右手承右脅以鼻