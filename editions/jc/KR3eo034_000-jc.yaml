若無病人常欲得旦起午時日沒三辰如用辰別二七除寒熱病脊腰頸項痛風痹口內生瘡牙齒風頭眩終盡除也鼻門一法東向坐不息三通手捻鼻兩孔治鼻中患交腳箕坐治鼻中患通腳癰瘡去其涕唾令鼻道通得聞香臭久行不已徹聞十方一法踞坐合兩膝張兩足不息五通治鼻瘡一法端坐生腰徐徐以鼻納氣以右手捻鼻除目暗淚苦出徐徐閉目吐氣鼻中息肉耳聾亦能除傷寒頭痛恍恍皆當以汗出為度一法東向坐不息三通以手捻鼻兩孔治鼻中息肉耳門一法坐地交叉兩腳以兩手從曲腳中入低頭叉項上治久塞不能自溫耳不聞聲一法腳著項上不息十二通必愈大塞不覺暖熱久頑冷患耳聾目眩久行即成法法身五六不能變遺泄門一法治遺精白濁諸冷不生戌亥間陰旺陽衰之際一手兜外腎一手搓臍下八十一次然後換手每手各九次兜搓九日見驗八十一日成功一法治遺精以床鋪安短窄臥如弓彎二膝並臍縮或左或右側臥用手托陰囊一手伏丹田切須寧心淨臥戒除房室思欲之事若固不泄可保身安淋門一法偃臥令兩足布膝頭邪踵置尻口納氣振腹鼻出氣去淋數小便一法蹲踞高一尺許以兩手從外屈膝內入至足趺上急手握足五指極力一通令內曲八利腰髖治淋一法偃臥令兩足膝頭邪踵置尻口納氣振腹鼻出氣去淋莖中痛一法以兩足踵布膝除癃一法偃臥令兩足布膝頭取踵置尻下以口納氣腹脹自極以鼻出氣七息除氣癃數小便莖中痛陰以下濕小腹痛膝不隨二便不通門一法正坐以兩手交背後名曰帶便愈不能大小便利腹愈虛羸反以兩手著背上上推使當心許箕坐反倒九通愈不能大小便利腹愈虛羸也一法龜行氣伏衣被中覆口鼻頭面正臥不息九通鼻微出氣治大便閉塞不通一法偃臥直兩手捻左右脅除大便難腹痛腹中寒口納氣鼻出氣溫氣咽之數十病愈疝氣門一法挽兩足指五息止引腹中氣去疝瘕利孔竅一法坐舒兩腳以兩手捉大拇指使足上頭下極挽五息止引腹中氣遍行身體去疝瘕利諸孔竅往來易行久行精爽聰明修長諸痔門一法惟高枕偃仰心平氣定其踵自收一法一足踏地一足屈膝兩手抱犢鼻下急挽向身極勢左右換易四七去痔五勞三里不下一法踞坐合兩膝張兩足不息兩通治五痔一法兩手抱足頭不動足向口受氣眾節氣散來去三七欲得捉左右側身各極挽腰不動去四肢腰上下髓內冷血冷筋急悶痔一法兩足相踏向陰端急蹙將兩手捧膝頭兩向極勢捧之二七競身側兩向取勢二七前後努腰去心勞痔病老人門修真書云春噓明目木扶肝夏至呵心火自闌秋呬定知金肺潤腎吹惟要坎中安三焦嘻卻除煩熱四季長呼脾化餐切記出聲聞口耳其功尤勝寶神丹訣云肝若噓時目睜睛爭知肺呬手雙擎心呵腦後高叉手腎若吹時抱膝平脾用呼時須撮口三焦客熱臥嘻嘻四季常是噓八節不得吹蓋肝為相火有瀉無補腎為真水有補無瀉也肝噓主嗌乾面塵眼眵赤多淚疼痛脅下痛小便黃赤色或澀心呵主煩燥喉瘡熱腫多汗掌中熱咽乾渴脾呼主熱痰涎目黃喉痹鼽衄口乾舌痛身重腹脹肺呬主喘嗽煩渴胸膈煩膨有痰掌中熱風汗出腎吹主有疾尪羸面黑口乾耳鳴咽嗌腫股內疼痛足下熱痛三焦嘻主頰痛喉痹耳閉渾渾然以上主治六經本病之邪也然無臟不足又在藥食氣味為補經云形食味故味歸形氣養形故形歸氣氣化則精生味和則形長故五味為宜若五志所過非藥可治者五勝為宜憂勝怒肝屬木在志為怒過節則反自傷故曰怒傷肝故以所勝者制之恐勝喜心屬火在志為喜過節則反自傷故曰喜傷心故以所勝者制之怒勝思脾屬土在志為思過節則反自傷故曰思傷脾故以所勝者制之喜勝憂肺屬金金在志為憂過節則反自傷故以所勝者制之思勝恐腎屬水在志為恐過節則反自傷放以所勝者制之通玄集云其補真妙理只要心頭無事內外俱忘一齊放下把捉得定陽生子時陰生午時靜室披衣握固端坐盤膝蹲下腹肚須臾升身前出胸而微偃首於後後開夾脊雙關肘後微扇三伸腰自尾閭穴如火相似自腰而起擁在夾脊慎勿開關即時甚熱氣壯漸次開夾脊而放氣過仍仰面腦後緊偃以閉上關慎勿令開即覺熱極氣壯漸次入頂以補泥丸髓海則身耐寒暑為習長生之基如前出胸伸腰閉夾背存而升之腰間火不起當靜坐內觀如法再作以至火起為度自醜行至寅終可止是曰肘後飛金精又曰抽鉛使腎氣生肝氣也又略昂首偃項放令頸下如火方點頭向前低頭曲項退舌尖近後以柱上齶自有津出不漱而嚥下還黃庭是名金液還丹四時不拘時候節次行此自艮至巽而已晚間乃勒陽關法自兌至乾而已養生秘錄玉溪子丹房語錄心凝曰神凝神歸氣以煉丹情復乎性復性歸根以養命還丹之本鉛汞而已元精為命之根寶元精而真鉛自生元神乃性之宗嗇元精而真汞自產是知固精以養氣固氣以養神鉛汞有時而相投駐息綿綿而成火候真氣無刻不相聚忘念久久而成金丹若真鉛走而真汞枯元神散而元精竭欲求返還不亦難乎非遇志人勿輕傳授保而重之秘之口訣外陰陽往來則外藥也內坎離輻輳則內藥也外有作用內則自然精氣神之用有二其體則一以外藥言之交合之精先要不漏呼吸之氣更要細細至於無息思慮之神貴在乎安靜以內藥言之煉精煉元精抽坎中之元陽也元精固則交合之精自不泄矣煉氣煉元氣補離中之元陰也元氣住則呼吸之氣自不出入煉神煉元神也坎離合體成乾也元神凝則思慮之神泰定其上更有煉虛一者非易輕言貴在默會心通可也勉旃勉旃玉溪子宜春心訣三千六百法養命數千家率皆旁門小法無非曲徑僕閱歷參同僅三十載作規中圖十二字訣用傳學道君子以正心誠意為中心柱子處中以制外以熙和中和斂靜斂肅八字為輔調御四時由外以應中上合天心中稽人事默符造化順軌陰陽外法五行內理五臟以為日月循環無端不施為不存想晏然大定以總元機但要絕嗜欲定心氣省思慮節飲食調鼻息警昏睡慳視聽養天和於四威儀四聰合自然之妙別無繁難也已立鄞鄂者以是契符火養聖胎未立鄞鄂者以是益元氣養精神為立鄞鄂之漸至於虛耗損失疾病交攻則以是驅疾固元為補益延年養命之術可謂簡易法門矣宋咸淳己巳歲下元節宜春玉溪子李公明序規中圖規中者如居一規之中如大圓鏡之一我但正心誠意為主為中心柱子當萬慮具泯之時真人出現如魚躍深淵游泳自樂而不離方寸是也喜怒哀樂未發當此時可以居規中游泳而潛御四時以正造化四威儀中不可失節焉物來則應應過復歸於中絕不可動著中心柱子於中常令空虛一塵不立久之不縱不拘自得受用其妙也六陰歸坤萬物荄元復赴建始萌長子絕父體一陽潛動處萬物未生時從這裡起便是作用處當斯時也跏趺大坐凝神內照調息綿綿默而守之則一氣從虛無中來杳杳冥冥無色無形非子玄冥坤癸之地生於腎中以育元精日益月強始之去痾次之返嬰積而為內丹之基本矣袁真人云元氣補元氣豈是凡砂石此補益之上法也朝屯者君子經論之始是萬物萌芽之初仁之端也夫子時始生之氣在腎是不召而自來宜保而養之調息無令耳聞但聽有悠悠綿綿合乎自然則與天地橐龠相應久之則腎氣合心氣二氣之交感以降甘露而產玄珠焉暮蒙者以養正聖功也使不失赤子之初心義之端也午時其始生之氣在心是亦不召而自來無思無慮冥心內照以合之靜坐而照久而則心合腎氣而成既濟之功焉人居三才之一一身之造化與天地等耳故日月常行天地之氣相應真一之精相符人之元氣八百一十丈與二氣橐龠相合所以元氣大運隨天小運隨日也但人生不能體天地造化之大以至作喪傷敗精神迷亂自與之違天地豈違者哉知道之士若能順理握機則可以符化工而為修丹內煉長生久視之道也舍人之外總皆稟混淆而在元氣中均為化物耳又安能馭之氣也參同契云春夏據內體從子到辰巳秋冬當外用自午從戌亥又云賞罰應春秋昏明應寒暑爻辭有仁義隨時發喜怒如是應四時五行得其理中黃內旨玉真先生云無極中黃大道本是口傳心授不立文字吾今慈憫初生之士一時聞之不能記憶故設為此善巧方便令彼入耳注心眼觀神領傳度既畢即時焚之勿令泛之內旨曰夫天有九宮地有九州人有九竅天有中黃為太陽地有中黃為太陰人有中黃為丹扃俱名為中黃八極中言其位黃言其色故謂中黃八極者是八方總會要處又只是中宮即黃庭即玄牝即先天一氣即玄關一竅即至善之所即黃極之道即允執厥中在五行謂之土在五臟謂之脾在五常謂之信藥物三氣五神火候乎吸盡在是矣行住坐臥皆當注念不可須臾離也不廢人事但當正心處物常應常靜吾祖師所謂多言數窮不如守中又言三十輻共一轂輻者脅肋轂者中扃也又言天地之間其猶橐龠乎乃呼吸之謂也呼則腎氣升得土則止吸則心液降逢土則息即此謂水火鍛鍊而成大丹若能存守則法無不靈吾常謂若要道法靈須是守中扃中者理得上下四隅不偏不倚之謂也天地相去八萬四升里人之心腎即一身之天地相去八寸四分以中指節文為則自臍上至尻尾骨尖尺有八寸四分今云臍者蓋與腎對也故心之下去三寸六分臍腎之上三寸六分惟中間一寸二分為黃庭主我身命所謂至聖之道秘之秘之三茅真君云精養於氣氣會於神精神不散是曰修真子不離母母不離子子母持守長生不死洞真先生云謹守謹守莫言莫言自然自然玄之又玄聞道之士皆千生幸慶宿有仙緣或資談笑漏泄於人有不測之禍蔓延之災受授之後勤而行之玉溪真人云儒家堯舜禹湯文武周公孔子顏曾思孟歷代道統相傳即此道也升少慕清虛留心至道萬法千門無不師訪因遊衡岳方遇至人密受紫陽仙翁丹訣按九宮八卦以年易月以月易日以日易時取天地之正氣奪造化之奇功納歸中宮交感成丹非止延年可以住世所謂我命在我不由天升自得之後體力不衰髮鬢不白日行百里舉動輕便神異證驗不可具述其間水火既濟又為坎離交會之法久而行之可以成丹今之人蓋火燥炎上水濕潤下自勾引陰邪之氣乘間而入令人多病壽夭若遇此訣使之五行顛倒術龍從火里出五行不順行虎向水中生順行則凡逆行則聖玄之又玄今悉於後訣曰一升便提氣氣歸臍一降便咽水火相見此十六字簡而易行不拘時候或在官府不妨政事雖處富貴不妨行用所謂至道不繁也如有風疾見效甚速但於日中少暇或盤膝或垂足正坐皆無所拘取鼻中出入息為候入息謂之吸即便升氣將下部微力前提其氣盡歸臍間此之謂氣氣歸臍蓋臍乃人之氣海所聚元氣盡藏於茲出息謂之呼即便放身自在一咽汩然有聲此謂之水火相見如是行之不計次數要行且行得止便止若能久持臍下常如火熨腹中氣響如雷小便漸減精氣不泄腰脊堅強飲食倍進百病去體外邪不侵行及一年宿有諸疾盡除行之既久自然三宮升降二氣循環遂成大道長生久視也昔年都下有過海王先生教人行持隨鼻出入息升降之法而不得提搐之法次有恩州李道人授楊和玉只教提搐之法而又不得出入息之法皆用其偏枯升因遊南嶽紫氣峰下親受李先生秘訣先生山東人也一百五歲發須不白面如童顏行步如飛予得其傳行之既驗不敢自秘謹以傳好道之士四段錦一開臂二開胸三攪車四挽弓青霞翁丹經直指僕自幼學道弱冠棄家遍歷江湖求師問友得先師張悟真以來諸前烈丹經詩詞傳記熟讀精思尋友求義又嚐遍參道友術士訪名山洞天禱求石碑壁記得海瓊仙指迷大道之要後遇率然居士於朱陵洞天作詩章以相贈始得證海瓊之妙旨乃知年少所學所求所見已是屋上架屋枝上接枝殊不知屋便是屋枝便是枝道在邇而求諸遠也一但頓悟切恐湮沒無傳且念後之學者未必如此肯心留意因錄數語以貽後人得之者可因文解意猛省用功雖不求師而在其中矣夫男子四大一身皆陰惟先天一氣真陽此氣非吹噓呼吸之氣亦無形影氣象可見故悟真先生以為可見不可用可用不可見也然此氣未受形之先在父母胎中先受此氣然後生二腎便生二眼由此生心生肝生脾生肺生九竅四肢而後人象俱足也此氣只在兩腎中間名為玄牝之門先師玄牝歌言之詳世間人莫能悟之今人宰牲殺豬但見兩腎中間腰脊去處有一空膜中有此呼吸膨動直至肉冷方息是也此氣未死之先氣血全盛魂魄相屬內含五采受氣如湯人一死則如牲畜氣血一散而氣餒矣只此一氣便是金丹大藥故先師以肝心脾肺膽腎腸精津液涕唾氣血為非道又以精神魂魄意似是非者此也人之一身右足大陰左足太陽而足為湧泉發水火二氣自雙足入尾閭上合於二腎左為腎堂右為精府一水一火一龜一蛇互相囊龠二腎之間虛生一竅是為玄牝二腎之氣貫通玄牝之間由此發黃赤二道上夾脊雙開貫二十四椎中通心腹入膏肓之下會於風府上朝泥丸由泥丸而下明堂散灌五宮下入重樓玉闕直注於絳宮複流入於本府日夜循環周流不息皆是自然而然即不是動手腳做成的今人流入旁門者不知虛無自然默默運用之理卻乃妄行屈伸呵咽摩擦引導存思注視妄想妄作反致成疾如白蓮道人多黃腫運氣道人多氣蠱皆其驗也夫此一氣人人一般即無多少但有涵養的做得成無涵養的做不成其流行出入自有定數如海中潮候弦朔必應天上斗柄子午自移又若女子月經因時而至確然不差此氣遇陽時為火陰時為水火即木液水即金精又左腎為坎右腎為離離中有己坎中有戊以戊己二土合為圭字又名水中金金者刀也故名刀圭又火即木水即金為金木無間水火同鄉其實金木水火只是一土一土為總五行爾先師以為五臟無氣六腑無精故謂此也此氣自然時時運轉不假人力凡言轆轤三車黃河曹溪取象如此非以人力強為也此氣常以子時而至為陽火午時而至為陰水以卯時而至為木液酉時而至為金精卯中有甲酉中有庚故須採取用甲庚子中有戊午中有己故運中土自非洞曉乾坤升降陰陽盛衰藥材老嫩水火潛亢之理不足以語此然先師言之甚詳而後人甚惑言之愈多而後人愈疑者何也皆緣終於虛無無則不知下手功夫是以胎息不成而歸於頑空忽於自然溺於妄想強作是以心神枉費而返致疾夫虛無者言其不可見聞自然者言其不可以迎取今之採取火候等逐節工夫深淺之言句句分明節節謹切謹守奉行無不應驗凡未入室以前且理會得安鼎採藥每日夜且習打坐坐一定然則骨節關開脈通自膀胱至夾脊便如車輪運動先天一氣自然由三關朝泥丸下重樓入絳宮然其來有時而採亦有時須得甲庚金木旺相之時默默端坐不須用摩動須臾覺頂中火熱喉中甘露垂垂滴而下便以目內視一意以內送納之絳宮玄牝而止凡一日之間以甲應上弦庚應下弦自子至卯為上弦得汞半斤自午至酉為下弦得鉛半斤採甲汞庚鉛各半斤自然定數所謂鉛見癸生須急採者言木汞金鉛以甲庚二時採取也如此採取之法然初採之時不計年月久久積之方成鼎爐夫一身爐也絳宮鼎也今人以脾中黃庭頂中泥丸為鼎皆非也年月既久爐鼎方成然後種藥藥物一生且採且煉採而積之為藥煉而成之為火採之一日有一斤數煉之一日有銖之得採藥之時須採甲庚旺氣行火之法則忌甲庚沐浴有此不同云採之法亦如鼎然不過目其自然之來迎之以意送之以目故丹書有黃婆青女之說黃婆意也青女眼也以意迎逢謂之黃婆媒合以目內送謂之青女傳言人身之氣隨意而動意行即行意止即止故送入鼎中隨意即止不復下流矣謂之種藥藥既入鼎然後有火候焉聖人傳藥不傳火以火與藥同歸殊途同情異功故爾子為一陽至巳為六陽自子至巳火得六數而六陽成乾當其子至巳以意迎之謂之進火謂之添午為一陰至亥為六陰自午至亥水得六數而六陰成坤當其午至亥以意送之謂之退火謂之抽故子巳為火午亥為水言火不言水者添進為火抽退為水耳自然而然不假人為丹經言河圖洛書之有數者言其火候自然與此生成之數合也非必待用力而合此數也言朝屯暮蒙晝姤夜復亦言與卦默合非必用力而方合此卦爻也如運用之說則言此氣運行流灌五臟百脈如亥子旺腎寅卯旺肝巳午旺心申酉旺肺辰戌丑未旺脾自然此氣運行由旺宮而出亦不必妄想此時此臟有氣出入流運然採取造鼎之初則無禁忌時至即為既了即了至如入藥行火則須擇日入室一毫俗事不可妄干使耳目鼻口四象相忘胸中淡然虛室生白一有所著便是封固不密藥物走漏便非道也既居室內惟半飢半飽不可求睡每使胸次惺然常常提醒見藥即採遇火即行一年之內止除卯酉二月不行水火以其卯則木旺酉則金旺木旺則火旺金旺則水旺故耳凡此二月不行水火者蓋行則返過而傷也一年十二月內除卯酉二月外止存十月故十月而胎成過十月又不須行火則又謂之傷丹此謂火候十月胎成移入泥丸謂之換鼎此胎氣既足如人已生但須乳哺故換鼎入泥丸乳哺之謂此時不須工夫火候亦無沐浴但只常常溫養之如此三年九載則天門自開嬰兒自然出矣往來無礙而位登仙翁矣此首尾用工之說皆出自然不假人力強為妄想不過及時以意迎之而已此是積日累月造鼎安爐一年十月結胎行火先師以為一日金丹赫赫紅是也又謂頃刻可成者何也言一時半日之工夫可奪一年半紀之造化當其藥生之時不過頃刻迎逢謂之頃刻金丹即非終日終夜勞神苦思強為之也夫藥爐鼎火候沐浴胎息嬰兒運用抽添主賓浮沉升降鉛汞水火真土金精木液一切言說皆是假名換姓其實只為一物鉤鎖連環自可熟論見義其有用工下手虛無自然之說先師許多丹經詞訣盡矣參同吻合一以貫之不過如此而已然言之非艱行之為艱行之亦非艱守之為艱何以守之為艱大抵旁門小法具無報應惟金丹一件便有報應今人採藥年少者須半年功夫守齋戒沐浴絕欲忘念靜坐默取採之候時節到來耳目手足輕健百病具無自然兩腎火起夾脊如車輪泥丸如湯澆口中常有甘露滴滴而來若能不睡存神不絕不過兩月餘得目生神光此心明瞭也若有慧性此之驗也得之者不可便以為至道否則狂念一生遂成顛風至若三月行火之餘時刻工夫不差則九竅光明頭有金輪洞視內外遠接鬼神當此之時嬰兒已成形象不可便縱其運動出入須加緊護牢收否則火漏丹散十月既滿嬰兒受氣已足自然如瓜果之熟脫蒂而去然後出入往來可以移身丈尺遠則不可遠出一出便還須收回否則神一奪而迷途遂至投胎托化不復顧屋廬矣直須三年九載日子滿足骨格老成如人生十數載知人事深淺輕重方可縱其自然往來出入此則飛昇變化登真仙位矣然猶有魔障焉當其入定坐忘之時而聰明倍生神異百出凡天下奇奇怪怪之事生前死後神仙希遇之事鬼怪警怖之狀並集於前直如慧眼神見又若神明依附此魔障之來不可便以為道須要定見把握一念凝堅所謂太玄之一守其真形是也切不可見妄為真從情為性如此守一方能成道今人多如此時無定力定見故為外邪所附不為學道無成及致墜墮以為神仙有無何渺茫惜哉僕平生讀書結友參師問道躬行力踐所見功驗如此並以告之未來學者有志之士得而誦之尋文求義參之先師丹經遺論求之道藏玄文秘旨一一皆合但能依此修行之十月胎成移鼎溫養之後又參向上一著方可看悟真下篇求精進法又當自然有希有之遇有不言傳者若不如此次第行之則身中無主嬰兒不育妄參禪學如水之無源木之無根覺成頑空頑空之下不思工字用工丹田合一方是貫通之理一有走漏到老無成終歸輪迴惡趣皆思平日空下工夫修煉成丹合一成真方是貫通誠實也再用丹田修煉成珍則脫體化神方是寶也修得實寶在身丹成之後修成深淺把握定否如何有報應卻是用功處一時不可怠忽一步不可放縱就中飛昇為上尸解為次奪舍又次之投胎為下矣至如飛昇長生久觀一也尸解二也二者尤須功圓行滿有代天宣化濟物利人之功方能及此若無功行但足以增年益壽亦不能為仙矣何以言之神一去而不回則氣一絕而不蘇上則奪舍下則投胎又下為無著之魂僕痛惜愚惑之徒談道者千萬功成者一二故並述為來者之戒不揆輕泄冒成此書後之作者得玩味披研如對師資如見君父珍藏什襲永為身寶非人勿示非人勿傳有違此語先禍其身後及九祖墜沉無間永無出期時咸淳甲子秋望日書於朱陵洞天大道歌道不遠在身中物即皆空性不空性若不空神氣住氣歸元海壽無窮欲得身中神不出莫向靈臺留一物物在身中神不清耗散真精損筋骨神御氣氣留形不須雜術自長生術則易知道難遇幾人遇了不專行所以千人萬人學畢竟終無一二成神若出便收來神返身中氣自回如此朝朝與暮暮自然赤子產真胎金鎖乃玄關處玉匙即元氣也靜坐之際調鼻中之息規守中扃以得定處自然神息綿綿不可以一毫別唸待調息已勻鼻中自覺無出入息但存中去處一念堅固以元氣呼吸息納於玄關忽覺一聲其關即開當時自有所見之趣工夫至此中字方洞徹矣金鼎欲留砂里汞金鼎是中字又即鼎爐中間欲留存砂里汞是元精也玉池先下水中銀玉池是華池水是神水也金鼎中欲留其汞靜坐間先守中扃中扃若守得定了出入息自然微默微默之後自覺息定元氣自在內藏呼吸待身體自覺混融恍不知有物有自身有天地後如此華池水自來待得滿口一咽汩然有聲就下以意送至中扃中扃玄關處汩然一聲響似開鎖恁時就閉目回照顧己內境自靈異景象不可盡述之耳金丹問答問曰如何謂之金液還丹答曰金液者金水也金為水母母隱子胎因有還丹之號也前賢有曰丹者丹田也液者肺液也以肺液還於丹田故曰金液還丹問曰何謂鉛汞答曰非凡黑錫水銀也真一子曰鉛是天地之父母陰陽之根基蓋聖人採天地父母之根而為大丹之基採陰陽純粹之精而為大丹之質且非常物造作也汞性好飛遇鉛乃結以其子母相戀也問曰何謂火答曰火者太陽真氣乃坎中之陽也紫清真人曰坎中起火是也問曰何謂候答曰五日為一候是甲子一終也日有十二時五日六十時終一甲子也紫陽曰一刻之工夫自有一年之節以起火之際頃刻一周天是也問曰此火候如何答曰年中用月月中用日日中用時時中用刻也問曰何謂真一答曰人能將自己天真安於天谷之內乃守真一之道也金洞主云真一者在於北極大淵之中也問曰何謂動靜答曰陽主動陰主靜翠虛曰動中求靜靜中有為動靜有作口口傳之問曰何謂九還答曰金生四成數九還者自上而還下九乃老陽之數陰真君曰從子至申為九還亦順也問曰何謂七返答曰火生二成數七返者自下而返上也七乃少陽之數陰真君曰從寅至申為七返逆行也問曰何謂爐答曰上品丹法以神為爐以性為藥以定為水以慧為火中品丹法以神為爐以氣為藥以日為火以月為水下品丹法以身為爐以氣為藥以心為火以腎為水又有偃月爐問曰何謂鼎答曰鮑真人云金鼎近泥丸黃帝鑄九鼎是也問曰何謂藥物答曰即此藥物順則成人逆則成丹五行顛倒大地七寶五行順行法界火坑百姓日用而不知也紫清曰採藥物於不動之中是也問曰何謂神水華池答曰李筌云還丹之要在於神水華池紫陽曰以鉛入汞名曰神水以汞投鉛名曰華池海蟾曰從來神水出高源紫清曰華池正在氣海內問曰何謂三關答曰頭為天關足為地關手為人關問曰何謂內三要答曰第一要大淵池也第二要絳宮也第三要地戶也問曰何謂外三要答曰口之與鼻共竅是神氣往來之門戶下工之際調鼻息緘舌氣閉兌也問曰何謂兌也答曰真一子云兌口也問曰嬰兒奼女正在何處答曰嬰兒在腎奼女在心問曰腎屬水為陰嬰兒屬陽心屬火為陽奼女屬陰何緣居此答曰腎屬坎陰中有陽乃真陽也心屬離陽中有陰乃真陰也問曰泥丸宮正在何處答曰頭有九宮中曰泥丸問曰何謂金公答曰金邊著公乃鉛也紫陽曰要能制伏覓金公問曰何謂黃婆答曰黃乃土之色位屬坤因取名焉紫清曰金公無言奼女死黃婆不老猶懷胎問曰呼吸何如答曰呼則出心與肺吸則入腎與肝呼則接天根吸則接地根呼則龍吟云起吸則虎嘯風生呼吸風雲凝成金液問曰何謂瓊漿玉液答曰皆神水也問曰何謂神氣答曰神是火火屬心氣是藥藥屬身神氣子母也虛靖天師云氣者生之元神者生之制持滿馭神專氣抱一神依氣住相合乃可長生三茅真君曰氣是添年藥心為使氣神若知行氣主便是得仙人問曰何謂十二重樓答曰人之喉嚨管有十二節是也問曰何謂簾幃答曰眼是也下功之際含光雲房曰閉戶垂簾默默窺問曰何謂子午答曰子午乃天地之中也在天為日月在人為心腎在時為子午在卦為坎離在方為南北問曰何謂五位相得而各有合答曰天地五十五數故乾得一九合而成十坤得四六合而成十巽兌得二八合而成十震艮得三七合而成十離得五坎得十坎離無偶所以自合也以數言之則得天地之中數以爻言之則得天地之中爻以位言之則得天地之中位坎離不亦大乎問曰何謂五嶽答曰五嶽真形圖曰在人之頭紫清有巾藏五嶽冠之句問曰何謂玄牝答曰在上曰玄在下曰牝玄關一竅左曰玄右曰牝問曰何謂玄牝之門答曰鼻通天氣曰玄門口通地氣曰牝戶口鼻乃玄牝門戶矣問曰何謂三男三女答曰乾道索坤長男曰震中男曰坎少男曰艮坤道索乾長女曰巽中女曰離少女曰兌問曰何謂火龍水虎答曰虎西方金也金生水反藏形於水龍東方木也木生火反受克於火太白真君曰五行不順行虎向水中生五行顛倒術龍從火里出是也問曰何謂分至答曰子時象冬至陰極而陽生午時象夏至陽極而陰生卯時象春分陽中含陰酉時象秋分陰中含陽人身亦有分至紫陽曰以身心分上下兩弦以神氣別冬夏二至問曰何謂沐浴答曰真氣熏蒸神水灌溉為沐浴太上曰灌以甘泉滌垢汙出自華池後歸坤戶杏林曰沐浴資神水是也問曰何謂抽添答曰既抽鉛於肘後須添汞於中黃傳道集曰可抽之時不可添是也問曰何謂搬運答曰搬金精於肘後運玉液於泥丸下手工夫口訣存焉問曰何謂三田答曰腦為上田心為中田氣海為下田若得斗柄之機斡運則上下循環如天河之流轉也問背後三關答曰腦後曰玉沉關夾脊曰轆轤關水火之際曰尾閭關問曰何謂神室答曰元神所居之室也朗然子曰未明心室千般撓達了心田萬事閒問曰何謂三花聚頂答曰神氣精混而為一也玄關一竅乃神氣精之聚也問五氣朝元答曰五臟真氣上朝於天元也問和合四象答曰眼不視而魂在肝耳不聞而精在腎舌不動而神在心鼻不嗅而魄在肺精神魂魄聚於意土也問曰馬牙真主人神符白雪答曰皆鉛汞之總名也問曰河車答曰北方正氣名曰河車左曰日輪右曰月輪搬運正氣運在元陽應節順行下手無非此車之力問老嫩何也答曰採藥之時審其老嫩彭鶴林曰嫩時須採老時枯紫陽曰鉛見癸生須急採金逢望遠不堪嘗是也問浮沉答曰鉛浮而銀沉也問清濁答曰陰濁而陽清也清者浮之於上濁者沉之於下修丹者留清去濁屬陰也問五行相剋答曰金碧經云金木相伐水火相剋土旺金鄉三物俱喪四海輻輳以致太平並由中宮土德之功也問曰往來何也答曰子往午來陰符陽火自子進符至辰巳自午退符至戌亥始復終坤皆以卦象則之一消一長一往一來以成其變化易曰闔戶謂之坤闢戶謂之乾一闔一闢謂之變往來不窮謂之通也問雌雄答曰雌陰雄陽也一陰一陽謂之道孤陰寡陽不能自生參同契曰雌雄相錯以類相求注曰雄金砂也雌火汞也相須合吐類聚生成以為神藥也問曰防危答曰防火候之差失忌夢寐之昏迷翠虛曰精生有時時至神知百刻之中切忌昏迷問交合答曰磁石吸鐵隔礙潛通問有無答曰金碧經云有無互相制上有青龍居兩無宗一有靈化妙難窺問刑德答曰陽為德德則出萬物生陰為刑刑則出萬物死故二月陽中含陰而榆莢落象金砂隨陰氣動靜落在胎中故曰歸根也八月陰中含陽而薺麥生象金水隨陽氣滋液於鼎內故卯酉乃刑德相負陰陽兩停故息符火也問黑白答曰參同契曰知白守黑神明自來白者金也黑者水也以金水之根而為藥基矣問寒暑答曰真一子云不應候風雨不調水旱相伐或陽火過刻或陰符失節凝冬變為大暑盛夏反作濃霜火候過差靈汞飛走運火之士可不謹之問晦朔答曰參同契曰晦朔之間合符中行乃金水符合之際也問固濟答曰太真云固濟胎不泄變化在須臾言其水火既濟閉固神室而不可使之泄漏問聖胎答曰無質生質結成聖胎辛勤保護十月如幼女之初懷孕似小龍養珠蓋神氣始凝結極易疏失也問四正答曰子午卯酉為四正玄關一竅為四正宮也問黃庭正在何處答曰在膀胱之上脾之下腎之前肝之左肺之右也問金烏玉兔答曰日中烏比心中液也月中兔比腎中之氣也問煉形答曰煉形化氣煉氣化神煉神合道也金洞主曰以精煉形非凡砂石問張紫陽曰心腎非坎離何也答曰心腎特坎離之體耳有體有用問所有者何也答曰氣乃心之用也屬離形乃腎之用也屬坎交媾之際運用於此矣問功夫答曰知時而交媾進火而防危陽生而野戰刑德而沐浴以至溫養成丹也問野戰答曰龍虎上經曰文以懷柔武以討叛紫陽曰守城野戰知凶吉增得靈砂滿鼎紅問溫養答曰杏林雲溫養象周星毗陵曰金鼎常留湯用暖玉爐不要火教寒是也問烹煉答曰烹金鼎煉玉爐口訣存焉問賞罰答曰春氣發生謂之賞乃巳前陽火之候也秋氣殺物謂之罰乃午後陰符之候也問守城答曰抱元守一而凝神聚氣也問堤防答曰驅除雜念而專心不二也問神廬者何也答曰鼻也乃神氣出入之門黃庭經云神廬之中當修治呼吸廬間入丹田問太一含真答曰守真一於天谷氣入玄元即達本來天真答上曰真道養神若能守我在死氣之關令七祖枯骨皆在生氣生我者道活我者神將神守道以道養神是也問三尸答曰中黃經云一者上蟲居腦中二者中蟲居明堂三者下蟲居腹胃名曰彭琚彭質彭矯也惡人進道喜人退志上田乃元神所居之宮惟人不能開此關被屍蟲居之生死輪迴無有了期若能握元神棲於本宮則屍蟲自滅真息自定所謂一竅開而百竅齊開大關通百體盡通則天真降靈不神之神所以神也問胎息答曰能守真一則息不往來如在母胞胎之中謂之大定也問玉池答曰口也黃庭經云玉池清水灌靈根是也問橐龠答曰橐乃無底囊龠乃三孔笛又是鐵匠手中所弄鼓風之物也老子曰天地之間其猶橐龠乎升降論曰人能效天地橐龠之用開則氣出合則氣入出則如地氣之上升入則如天氣之下降一升一降自可與天地齊長久矣問五芽答曰乃五臟之真氣中黃經曰子能守之三蟲棄得見五芽九真氣問屯蒙答曰道樞云坎者水也一變為水澤之節再變為水雷之屯其爻居寅離者火也一變為火山之旅再變為火風之鼎三變為山水之蒙其爻居戌抽添水火在於寅戌十二卦氣在於屯蒙運用也問採日精月華答曰非外之日月也採心中真液腎中真氣也問內外八卦答曰頭為乾足為坤膀胱為艮膽為巽腎為坎心為離肝為震肺為兌也問修煉待時然後下手答曰有時中之工夫有刻中之工夫毗陵曰煉丹不用尋冬至心中自有一陽生馬自然曰不擇時中分子午無爻卦內別乾坤此皆刻中之工夫也問金丹形象如何答曰形若彈丸色同朱桔抱朴子曰大如彈丸黃如桔中有佳味甘如蜜沙門得之即禪定黃衣得之即超逸審之行之天地畢元樞歌曰君不見一粒金丹何赫赫大如彈子黃如桔人人分上本圓成夜夜靈光長滿室蓋人人具足個個圓成當知非有形之物也呂公曰還丹本質也問玄關一竅正在何處答曰在人之首功夫容易見下手的難尋若不遇真師摩頂授記皆妄為矣問真空答曰返本還元為真空杏林曰不知丹訣妙終日玩真空問作用答曰螟蛉咒子傳精送神問出神答曰能守真一真氣自凝陽神自聚蓋以一心運諸氣氣住則神住真積力久功行滿然後調神出殼也問超脫答曰超者出也脫者換凡軀也皆天門出前聖有脫殼之驗六祖七層寶塔出鍾呂七級紅樓出海蟾公鶴沖天門出詩曰功成須是出神京內院繁華勿累身會取五仙超脫法煉成仙質離凡塵問尸解答曰尸解有五金木水火土也又有積功累行而白日飛昇者徽宗皇帝尊道篇末曰亙古迨今飛昇者千有餘人拔宅者八十餘家出真誥問金丹之道不亦難乎答曰是不難也悟者惟簡惟易迷者愈繁愈難杏林雲簡易之語不過半句證驗之效只在片時翠虛曰藥之不遠採不難毗陵曰皇道不繁人自昧紫清曰只一言貫穿萬卷仙經但片晌工夫無窮逸樂師曰下手工夫容易堅心守道為難也養生詠玄集序夫詠玄者乃詠玄中深奧也窈冥取理恍惚求真撮眾妙之英華採群經之要會言上直而義正道入重玄旨似遠而意明風存上祖引龍虎同歸之躁競顯玄牝絕利之玄微直示指歸立成妙用正演開遮之說明分去就之元回玄包羅升沉浩渺故使下士撫掌上士勤行克成於神氣全真冀泯於根塵妄照誠知珠玉兮何重性命兮何輕寧不窮解分息動之玄而縱流光走魄之逝深可悲哉此詠玄詩實長生度世之法要也至如玄元帝之靈篆常秘枕中淮南王之神方密藏肘後蓋上聖所遵所重乎至言也學者值遇宜須秘慎深自惜焉榮衛氣二氣相成道始生夫姿形立兆未有獨分一氣而獲著生蓋榮衛調和方生存也故云二氣相成始生者道也道者生也故老子云道不可見因生以明之生不可常用道以守之渾融同處一源行二氣渾融之謂和氣同處一源以其生生也陰陽感激相須理稟二氣而兆形質舍二氣而著生成此皆感激陰陽資養性命不得和柔即戰爭忽二氣爭競不相和柔即勃亂五臟而患生焉故經云陰疑於陽必戰是知無全陽之男全陰之女故天為全陽而負陰露地屬全陰而抱陽精蓋天地陰陽相須而化生萬物易云乾男坤女故人倫亦全法天象地矣榮氣榮氣生來不獨分榮氣者清陽也內觀經云氣清而駛謂之榮在人身中不可獨建故不獨分也清陽虛在賴陰存陰氣聚而陽托陽氣存而陰賴故曰陽賴陰存以相成也從茲始得成胚兆夫二氣相感始成於胎孕解胎而生亦自有榮氣之始也煉取歸元別有門於二氣中淘煉歸於本源純一清淨之氣別修除滓穢成全陽而榮與道同真矣衛氣衛氣元從陽氣來衛者濁也內觀經云氣濁而遲謂之衛本因元氣交感方有形軀既有形軀始明衛氣故衛從榮來色身兆合處胞胎形質既兆即稟二氣之所感處於胞胎也暗符天地排宮室人之一身暗象天地故內觀經云眼為日月發為星辰眉為華蓋頭為崑崙布列宮闕安置精神此之謂也自此澄凝細可裁自此精血澄凝以成形質細可裁量以通其用蓋人之衛氣凡有二名一者精血澄凝以成形質二者同榮氣流行而通其生也是知人之身者因示修真之地得乎最靈之稱可不惜而怠惰而求於逝也其衛氣亦象三才一者澄凝以成形質象地也二者榮衛合處曰沖和之氣象人也三者真精命蒂居上丹田全陽之宮以象其天也稟此三氣以通其生而道自歸之是故體三才而履道也魂魄二氣含和即著生魂者陽真精也魄者陰真精也二精處乎泥丸宮以蒂二氣不相離潰而神明居之生方著也老子曰萬物負陰抱陽以成其道始名魂魄應真靈子產曰人始曰魄既生陽曰魂是故二氣發生莫非魂魄而應真靈及其生也萬變千化有生有死無超躍三清漂淪諸趣得喪之機實在此矣在天日月全通象日月者天地魂魄也故魂者為日主晝天真精也魄者為月主夜地真精也是知明暗同源往來通會蓋人之魂魄全通象於日月也淮南王曰天之氣成魂地之氣成魄又五臟內鏡云父之精氣為魂母之精氣為魄其理昭然矣萬化皆從守一寧萬化者蓋心之所滅而運役魂魄著於生云故聖人設千經萬術教化群品顯是守一之法而息諸妄也魂陽精魂主號神金魂者陽真精也故陽精是神之金聖人為之法體遞相系屬以通真也韓子云非至精不能變至神抱朴子云老君者天之魂感日精而孕化成兆身故顯至陽之精也感應潛符運用心心動即氣轉故云潛符以明感應也若使圓通諸妄息若息諸妄至於圓通即氣以合於神而生變也靈光照耀脫全陰真精既備乃合靈逍遙不夜即脫坼全陰之質故聖人稟御以通靈變也魄陰氣衝融應感陽境動宜其心而成感激也二來和會致流漿二氣既投弗可致也窮玄偶此非真用窮玄者隨境放逸致二氣乖蕩即非真用之法違道之真理也魂不飛揚魄不妨魂不飛揚魄不妨者應心之用也魂既不飛魄亦不應蓋心為去留之轄氣是生死之基而修生之理非此者未之有也穀神聖祖函門顯穀神聖祖於函關為關令尹喜說道德經五千言指象立端顯明穀神削其浮訛以彰玄妙也深微歷代事長新義理深微卒何窮究縱多分曉莫盡洪源故云深微歷代事長新言經文玄邃者也若於已上披尋得思理棄言崇於已上行持之法匪於谷外也便是今生了悟人契悟者不拘優劣及有無之分若穎悟即一生了決果陶屬論於諸生也谷玄谷因何隱至靈谷者二氣孕化之兆也都緣谷內抱真精真精者二氣之精莫處乎泥丸宮此乃因茲隱至靈若精散即神去也如從得所相包系神氣相須各不離潰也和會依憑始有聲和會各相依憑以成其體既和會感至靈即方明著生即有聲言者耳神闃寂猶來無所依闃寂者幽寂也言神之未處四大恆遊太極無所依附及降兆於身始明靈即立生有道本體象乾坤凡生行藏皆能通應老子云視之不見聽之不聞搏之不得又易曰陰陽不測之謂神即知其不以意度寧足以言詮而明之也因過玄谷眾神歸既過玄谷眼即視色耳能聽聲鼻能嗅香舌能別味意懷貪愛身受寒溫靈變多端故云眾神歸也子今認得還元路返本還元之道滅心抱一之法必在事兼道匪多事而至也不計程途迥細微非步涉程途以明其要莫不探賾遠妙體用雙明而能捨妄歸真背塵合道也返本還元氣衰形悴少精神人之衰老為染嗜欲以致傷敗而多殂落西升經云如木自出火還復自燒腐又陰符經云心生於物此之謂也返本還元是最真氣全神備道可克成太白真人云老者復丁壯者返嬰此蓋明返本而還元者也補過功成方漸契補過者為補從來耽淫銷削之過補之功成方契返本之道也復知大患即吾身復知者重明返本還元也返本還元凡有二初明補過謂求全氣而返真次云復知者以其本乃歸乎本元老子云吾有大患為吾有身及吾無身吾有何患依此而論故老子不以全身為至也神與氣合神氣相須不去離夫神之無氣若魚之去泉氣之去神如燈之無火不可去離也深明翻恐世人疑將神合氣化入無形有無之理亦不執滯若深明之廣學者疑惑蓋人有智識明昧淺深者也且緣凡聖行持別聖人不視外色不聽外聲不思外事神凝氣合凡俗以貪妒為心勞神役智故聖人行神與氣合之事也非絕神壚安得之倘去就之未歸即神氣之不合實如貓捕鼠同聲相應同氣相求自此則可結胎育嬰換帤之臭質回顏返老煉冗冗之凝軀或發火以焚身或化金而成骨或則脫落滓滯或則凝撮真如入不二之玄門盡無窮之至理是知神與氣舍方有滋應用隨其所歸是非深淺而通變化之道者也抱一深玄抱一事為宗神氣相抱混而為一之宗老子曰抱一為天下式又云善抱不脫善計不用籌策又莊子云通於一萬事畢也未了真元道不通未諳軏轄寧得通和心地虛無方見諦虛無者虛無其心也故老子十三虛無經所載蓋顯五千文中生之徒十有三十二者全明生之徒也所明十三總歸於虛以為善既心地虛無以求抱真一也信知萬物用非同學者多途玄陳各異故云萬物之用不同虛無抱一之道者也胎息用得沖和道自全沖和者二氣混同榮衛合處若用及網衛則契最玄之理而著於會通生道余也適名胎息理幽會謂契重玄之理即明真住之法也處胞赤子何當契靡由百穀生自何存細審行持法自然了認赤子之道可明胎息之機自然理會神凝心通念絕蓋聖人稟之而生憑之而成苟不得其要樞即難除其大患指歸之路屆茲而無法可言返本之源應用而有期必契體而用之必無差失棲真子云我氣內閉我身長寧凡修胎息之法皆是自然之道保任真息綿綿來往微微不得令靜躁不恆自以求乎安也晝夜修行不斷日往月來真人自不出戶若得真全胎結其道至矣老子曰綿綿若存用之不勤此理明絕諸慮以定其至而生慧昭然也若至定位即生定水灌溉五臟生光華此曰真水非乎涎濁之液唾此去留形住世之法要三住銘云心若住氣亦住氣若住形亦住三者盡住即我命在我不在於天矣自然水性謙柔火性剛水火各屬自然蓋論水火相生之理以明神氣自然之道也就卑炎上各相當就卑者水之性炎上者火之體故氣能蒸上液能潤下二物遞相交感氣上蒸以生液液下潤而生氣固養一身自茲感化故名之各相當非人所擠抑也交併感應皆相類交併者水入相投而成感應類象外之凡水火若炎釜水氣即生蓋顯大道之感應皆自然也莫斆殊途理自長既知本體自然之道故非外有所求且天覆地載男生女孕君臣父子皆稟自然之數非乎殊途異類之屬而能會和如此即還丹之道昭矣本元之理明矣龍虎龍虎同源躁競時龍者隱顯非常有無不的故象神之妙也虎者其性勁勵其力剛強復象氣之為物也聖人混神氣為一物也故得制伏之機凡俗以內外各行而生躁競之患遂致龍騰虎走不相系屬也只應聚極卻支離既立兆形乃全其神氣皆以嗜欲所感至於衰老脫削元氣既盡即神無所投致之死也故曰聚極則支離也先須制虎為樞轄欲降其龍先須制虎故陰符經曰擒之制在氣蓋全氣以明其用者也便得龍潛兩自持虎伏龍潛兩自憑而歸真一之道太皇老歌曰虎伏龍亦潛降龍先伏虎但畢河車功不用提防拒蓋顯擒之用也煉陽銷陰陽煉陰銷舉世稀煉陽魂銷陰質也煉陽銷陰之法天真皇人傳黃帝三一之訣此其道也若神氣相合陽自煉陰自銷此皆自然之理陰陽使其然哉黃庭經云玄元上一魂魄煉其理至所至玄人罕得知其深奧故曰舉世稀也靈文妙訣好遵依靈文金簡之書妙訣乃三一之法此皆起歸秘藏飛入玄都非乎至人不傳斯道煉陽銷陰之理化本虛無之機遇云凡人何所至矣陽緣躁動難拘繫欲拘繫者理不偏取道可雙全匪羈孤而成妙用也玄剛云凡人余陽一分則不死余陰一分則不仙也認取靈元上上機靈元有上機乃制躁動之樞要太白真人曰玄機至則身存機往則身喪也上丹田宮闕重重號玉都玉都者泥丸宮也上丹田有九處宮闕悉相通貫故云宮闕重重也還丹成就處陽壚還丹者真精也上丹田乃全陽之宮獨貯還丹之所人皆有之故云成就處陽壚也通神夾脊為衢道此宮有二條脈夾脊降至下丹田氣海以通真精點化和氣而應脫泄者也下應關元事不虞關元者乃下丹田脫泄精氣之關口也若人交感陰陽則真精降下至關口點和氣變為凝精以應神用蓋此關乃百聚之口通諸臟腑及四肢筋脈如藕絲竅氣化之所故號關元也上若應下而道者以為不虞矣中丹田建申令屬應中元建申者七月中元亦應人之中丹田也一部三焦心肺肝三焦者心肺肝也主喘息之府此乃中丹田所管故號生之府津液下潤而致於是也自有靈臺駐真宰靈臺者五臟心之一臟也真神依附以為宮室故云駐真宰也修持見在證輕安若知真神之動用則修持見在證輕安則永無憂患也下丹田沖和運育下丹田下丹田者臍下三寸氣海是也沖和者一氣榮榮氣混衛氣故名和氣其氣運轉於五臟四肢常湊於下丹田故曰氣海也點化猶來道不玄心若動作貪著淫欲即上丹田真精降至下丹田點化和氣和氣即化遂乃棄損而道豈玄也二氣相投皆感應謂男女二情交相感激而有云雨施之事皆自然感應乃至成於胎孕自真元之精成變化在修生者宜須慎守以求制御之法故太白真經云留精於身即生身施精於人即生人移此元氣結彼元氣彼既成形此則受損是知慎於是也細尋運會地交天天地陰陽二氣相推而生變化蓋陰陽有運會之理不言而信故云氣上蒸而雨澤雨澤下潤而萬物化生但細推天地運合日月迴旋以明法象通乎無私之理重玄上玄潛與下玄通上玄門也下玄關也謂上玄不止即下欲難除也故云上下潛通也動靜由來事一同動止上下相應而通其氣故以重玄明之兼心法而論也至如龍吟云起虎嘯風生皆以隨類相從各得其所故上玄下玄應用等心法而兼濟助事同一也消息上玄令泯滅專一漸求泯滅老子云合抱之木生於毫末九層之臺起於累土故消息亦皆如之若修至神與氣和真全胎即自然心隨息盡氣逐息生塵境既消繫系都盡胎息論云胎從元氣中結氣從鼻中生溫在乎專用泯滅故知日新此之謂也下玄從此亦同功老子云前後之相隨者也陰丹陰丹多見賺時人得者全少失者至多都是傳來托誤文得者少托誤文者多見夭逝不體真元故非真諦且凡心既發如猛火投焰事既熾然卒何固濟故道之玄妙起自心法既忽蕩動氣亦奔騰豈謂初機之道返為害命未曉重玄篇內旨未曉重玄之旨徒枉陰丹之功味於無味亦徒云既若無味則何用行持故云亦徒云也黃庭經云長生至慎房中急何謂死作令神泣蓋王屋真人羅真人狐剛子元陽諸仙人不可一一舉備所說陰丹皆得重玄之妙用道體交合神凝之法若初學強自行持而至中夭與道愈失與道愈失與道愈彰生自何存也故陰丹之法本為絕塵之事古聖人恐真者未遂了達且居常道故示之陰丹之妙其理法天象地升陰降陽所忌者以淫心難制以女子交感而男子先脫其精如此行之而疾病俱生以運夭逝其外晦朔弦望風雨飢飽喜怒勞佚次而忌之凡女人有經後六日三陽數與女人交合者生男三陰數與女交合者生女凡一月此六日若是須二情齊降方獲成就自此陰陽筭數還知貧富貴賤其理昭然矣玄關無關善閉豈能開老於曰善閉無關鍵而不可開玄關者不獨稱乎心也若明善閉之法以通玄妙始得玄關之稱蓋善閉之道即心地之法也妙使靈童出得來靈童者得道之稱也若契玄關之理即達善閉之道或出或處得妙便法要至乎輕安也已絕六塵玄路啟六塵者謂眼耳鼻舌身意六根各有法識所染是六塵故云玄關善閉以求泯滅其塵妄若志之所至即玄之又玄也自茲生死不相該無染塵識安系去留心法兩忘取損同泯棲真子云百邪不能幹其正群動不能撓其清故生死不該屬也玄珠玄珠安比世間珠非身外有珠方璧之類也故曰居易求玄珠賦云動為道樞靜為心荷玉光不耀至真不渝也悟者將知是命符若悟珠之至理乃明生之要會而與命符也不昧不明隨應化老子云不昧不明玄之又玄蓋顯玄珠之本體相應其通而變者也動為瑕玷即縈紆心動即隨緣逐境乃是玄珠之瑕玷故云動為瑕玷即縈紆即玄珠不能瑩徹也玄牝門通真玄牝是靈關玄門者神廬也牝門者大關也此修行之大要也故云靈關老子云穀神不死是謂玄牝玄牝之門是謂天地根不悟修生事更難若不悟玄牝門行持修生之理與精神為關鑰即修生之事無所可著也浪緊溯流動用到初行持者乘舟溯流功用到則非常道老子曰理大國若烹小鮮寬猛之理得所也只茲灘後更無灘若功用到永離憂患恆居安靜故云更無灘也玄門九洞三山各少人九洞三山者海中所有之島乃仙人集居之所絕學至人多隱其間故舉以明得道之所由顯玄門是修生之樞要九洞三山亦象人之三田九竅也盡經此路學修真玄門一路得盡同若失之歸即動皆非下連紫府通華蓋華蓋者肺也紫府腎宮氣海也蓋玄門開合皆通應也得喪絕塵非絕塵若得神廬之妙則永故云絕塵若喪淳樸之根巡還六趣即云非絕塵牝門諸竅開因牝竅開牝門者大關也諸竅開坼至於筋脈五臟命關皆悉相應脫漱氣液至於衰志而無覺知以崇其道求乎生也精神自此去如催牝門既開則出損精氣精氣若損神漸昏蒙而見危壞固關樞要將為首修生者因閉天關次為其首也迷者多因致禍災若不明開合之理但貪著滋味之感則萬禍入寒暑侵至於殞逝皆由之也絕利一源絕利一源事細微絕陰路而啟陽門初機道也老子胎息精微論曰玄之又玄是我命門又陰符經云絕利一源用師十倍三返晝夜用師萬倍匪運而有用師之倍蓋絕一源於是也調和全自理神機調和調源也全在神機運合者也若教依舊還貪著若念未盡不能制止蕩逸去來即非道也倏忽交爭見是非若神氣亂行妄生動作則暴亂生乎是非致錯誤之由也心染汙隨緣聖莫窮心者性之用也隨緣染境起滅無常是知聖莫窮也都來心法共伊通千方萬法至於出死入生未有不因心而修學至於成備者也是非得喪全由此萬事是非或舍或留或迷或悟皆由此也返本歸原道愈同返其本歸其源故道是群經之要會與道合即同也性性為心所本同途性不可見由心明之心不自彰因性方起既為心所起故曰同途認取元陽制動樞元陽者元和之氣能制躁動故為樞也此全明心法也依附凝軀方建立人依屋宇始免風霜性托形軀方能建立也自心卻返到虛無心契妙軌以法行持云歸虛無之妙故云自心卻返而歸元也動即為心乃之動而非動其動則應見隨機變通無滯群品於始終之理知他心起滅之端妙不可量功不可測化無所化稱莫以稱在凡即云妄想紛紜在聖即曰真元作用者也其靜則為性是知靜則非靜泯滅變化之道消亡應現之機不涅不緇無塵無垢熙熙上聖之真風蕩蕩極迷途之化本巍巍事既實而言莫詮道以崇而理難諭前際後際有空煥乎浩浩之元宛乎融融之德妙中之妙玄之又玄此蓋歸乎化源而窮理盡性變化莫測者也法法本無言理自如不拘動靜理自如如猶知自是眾經樞聖人所設萬論千經說不可及法乃無樞要也人有穎悟玄玄趣若得悟玄中深趣即真道之諦理也秘向心頭作妙符法者心源之妙符起生死之大要非輕取輕傲求非躁撓所能知非訛所能學非唸誦而至非步歷而至明昧雖殊古今不異真言訣云去其死先去其生去留之理體而用之故高真教主太上虛宗或明於三心九心或顯於一法萬法至於皇人丹訣青童玉書理有實歸本元是非執滯調不訛而經眾妙直露希夷其餘化體飛形育嬰固命乃至五行假借動靜得常三身互道往不廢亦乾枝葉殊未屆其根株蓋受道於深淺之師致理有見聞之執深宜濟度勿憚參承養生膚語天地以氣生人故人一日一時未嘗能離乎氣魚之在水兩腮翕動無有停時人在宇宙間兩鼻翕張亦無有停時所以統轄造化之氣人賴之以生也故曰食其時百骸理動其機萬化安為此也人生奔馳勞頓氣因之驟矣驟則出多入少外者不入內者愈虛所以死期將至惟至人觀天道執天行抱神以靜氣氣歸臍壽天地矣故知人生天地間雖可見者形所以能長久者氣郭康伯遇神人授一保身衛生之術云但有四句偈須是在處受持偈云自身有病自心知身病還將心自醫心境靜時身亦靜心生還是病生時郭信用其言知自護愛康健倍常年幾百歲皆由善攝元氣所致天氣常清天色常明更無一物撓亂所以長久今人所見雲氣倏忽變現起滅者皆近地之界百里而上無有也譬如人身有七情六慾之干有三毒六害之擾豈能長久誠能至清至明如天地豈得不如天地之不毀乎青天歌云青天忽起浮雲障云起縱橫遮萬象養生者辨之觸事而感生善應而勞生此皆致老之理也莊子稱魯有單豹者巖居而水飲不與民同利行年七十而猶有嬰兒之色余以為此即養生之理也人之生也以有上棟下宇之求飢食渴飲之資故不得不與民角利日夜憂勞其心無有頃暇故老及之也今巖居水飲則於世無求不與民同利則於物無競無求無競雖欲不壽得乎古人謂之卻老卻之者去其可老之道也人有喜談道者余止之曰道不易談也不能絕色不必談道不能絕世不必談道何也道所以全吾真也而不絕色則為滲漏之軀真何能全道所以完吾性也而不絕世則為合塵之徒性何能全或者引休妻不是道及引大隱在市廛為證此則禪家最上一乘之妙若以此為解徒使退墮耳衛生歌云木還去火不成灰人能去火方延命諒哉斯言夫人之忿怒羨豔悲壯激切鼓動奔馳跳躍翔舞謳歌叫嘯之類凡激於人我而發者夫熟非火之所以為哉木與木相鑽而火生人與人相形而欲生其理一也人能勘破此理每事抑損懲其忿而窒其欲則五氣自平六脈自和延生必矣魂魄合而成形賢愚在德肥瘦在母壽夭在父血盛則肌肥精足則神壯神和則德全此聞之汪弄丸云以此見天之賦命生由父之精而死亦由父之精也但養和全德此則由乎己者不可不知所事權德輿文云舟有溺騎有墜寢有魘飲有醉食有饐行有饜其甚則皆可以致斃無非危機嗚呼豈獨在於高官尊爵已哉正在飲食衽席輿馬燕寢之間人之所易而弗之防故自阽於危耳學道之士須識吾之一身從太虛中而來既從太虛中而來則此身初亦無有豈應執著之以為己物故此身之靈明主人必使不著於有不著於無一如太虛之無物以擾之然後本體之心方得清靜合虛靈覺常圓而一切繁華一切繫累不能奪矣繁華繫累不能奪則俗心日退真心日進退得一分俗心自能進得一分真心孟子所謂養心莫善於寡欲者是也心自太虛則身還太虛所謂仙所謂佛何俟多談周萊峰以養生術請錢午江曰不過履和適順而已履和則不傷和適順則不違順夫天地之氣至和大順盡之人身小天地也豈不可仿天地之長年乎萊峰刻石臨清公署制小牙牌勒四字置衿袖終其身先輩之重箴言如此陰陽本不相對待造化之生物也陽入於陰陰留陽而不得飛則生陽出於陰陽不顧陰而不能留則死是死生俱繫於陽固與陰不相關也仙家謂一分陽氣不盡不死一分陰氣不盡不仙然則陰陽豈可對待言哉雖然陽之所在不獨生死系之即諸物之靈蠢亦系之人陽氣在上故耳目聰明於物最靈鳥獸陽氣與陰氣混淆故蠢草木陽氣在根故尤蠢以此為言則人之陽氣安可不寶耳聾目瞶陽將散矣是以君子先時竟竟惟陽是守有以也夫人生食用最宜加謹以吾身中之氣由之而升降聚散耳何者多飲酒則氣升多飲茶則氣降多肉食穀食則氣滯多辛食則氣散多鹹食則氣墜多甘食則氣積多酸食則氣結多苦食則氣抑修真之士所以調燮五臟流通精神全賴酌量五味約省酒食使不過則可也人始死耳目口鼻手足形體具足而父母兄弟妻子莫之愛者謂其神之去也然則人之所愛在神不在形矣而今人所養顧在形不在神何耶今人作文神去作事神去好聲神去好色神去凡動靜運用紛紜神無不去人莫之惜顧神絕乃獨悲之深焉是何見之晚也人之致思發慮致一思出一神注一念出一神如分火焉火愈分油愈干火愈小神愈分精愈竭神愈少及其絕而悲之深焉是何見之晚也古仙云元神一出便收來神返身中氣自回如此朝朝並暮暮自然翁嫗返童孩噫其誠通天地之生機也夫高南州云陰陽交合造化之妙無可倫比因述一術士言八月十五日夜半子時俟月色正中以方諸取月華水盈缸俟來年五月五日午時以陽燧置缸上須臾日照水中缸中水奔騰翻湧而起頃之水盡涸矣觀其藥候以為服食此丹家煉神水法也服食雖未易卒得然因此可以窺造化交合之妙卻病之術有行功一法虛病宜存想收斂固秘心志內守之工夫以補之實病宜按摩導引吸努掐攝外發之工夫以散之凡熱病宜吐故納新口出鼻入以涼之冷病宜存氣閉息用意生火以溫之此四法可為治病捷徑勝服草木金石之藥遠矣此得之老方士言道書云有妻子者則為妻子所累有富貴者則為富貴所累道不可行也審如是必棄妻孥捐富貴而後可乎夫妻孥不病道病在於累妻孥富貴不絕道絕在於累富貴蓋妻孥富貴在境而累不累在心舜嘗二女裸矣亦嘗受堯禪矣不為許由之逃務光之辭而竟無傷於道此其道之微旨可想已王宏宇論修真有難易曰吾輩破漏之軀與童真修煉自別緣童貞原是乾體不破不漏非破乾而成離者比欲修純乾止用得一段純陽工夫耳若吾輩必補離成乾然後更著工夫所以難也此論甚合元理續仙傳有賣藥翁嘗呼曰有錢不買藥吃盡作土饅頭去此言最警悟人之不為土饅頭寡矣人日非而己不悟何與但藥有數種苦不能辨有靈藥可以益壽延年有至藥可以起死回生有神藥可以回陽換骨若夫金石草木但可以治病雖然遲速末後一著土饅頭如故許道人云人心貴澄靜若能半夜打坐不倒身端坐凝寂則性命入吾囊橐若夜夜不倒身則性命在我掌握長生可冀矣何者魂強魄弱故也又問何如用工曰真人潛深淵浮游守規中二語盡矣陸元鶴談養生之旨曰不過藏神於淵令不外遊久之自然神化毋多談予唯其語夫神之為物不可以知知不可以識識恆留於身其中炯然則精氣歸真神化自現古仙云氣是添年藥心為使氣神若能神氣住便是得仙人所謂神氣住者非神也耶世率稱仙真為神仙以其所煉在神也鄭龍門見召指座右二沃丹花曰此四本同發惜止移其二入堂中今十餘日矣其二則未暇為日色所曝遂萎謝且曰此可以悟養生若如此花天豈有所限量邪余因惕然有警誠悟此理則自不置其身於傷生之境嵇中散一溉後枯之說可信壯年嗜欲一時不見久之漸至怯薄譬如富家妄費一時不見久之漸至貧窮自然之理人聽見在旦暮故不悟耳推此以觀凡讀書史作文字養生作家取效亦復如是弗謂無功久之自然見效偶遇方僧談終南山苦行道流多有至二三百歲者日常掘食黃精蒼白朮諸藥草以充食又有服餌茯苓者其法山中大松樹多合抱者搜其根土深數尺斷樹命根以大甕盛蜜與新茯苓放樹根下春則蜜氣升於樹顛冬則蜜復降入甕如此三年方取出地每日啖如拳大一塊飲水一甌不復火食茯苓既是長年之植又不火食其享有異壽固宜也若今世人志行如常而欲企異常之壽不亦難乎哉俗謂人之雄健者曰有氣力以見力與氣元自相通力從氣而出也凡叫喊跳躍歌嘯狂舞奔逸趨走之類凡以力從事者皆能損氣古之善養生者呼不出聲行不揚塵不恆舞而熊經鳥伸不長嘯而呼吸元神殆皆息力以生氣乎凡風寒暑濕在外則為氣中於人身則為毒或有發為癰疽發為瘧痢者中伏傷生之道不可不謹故人之起居室之棲止須秘密堅固高朗乾燥斯無患矣井不汲不溢精不用不盈何以以水由地中汲則益之精充身中損則充之本非有溢而盈也世人不解斯理謂汲井不見其損不知汲頻則地元竭用精不見其耗不知用頻則真元疲是以明於汲井之理者井養而不窮明於用精之道者神用而不竭有人好養真而未嘗輕事遠遊曰昔也某曾泛舟遊於江遇風幾覆沒以是不數遊也余笑曰閉爾戶坐爾室寧獨無江乎哉夫江之險猶憑舟也若戶與室之險在衽與席在飲與食寧復有舟可憑哉奚獨江也焦若火凝若冰利若戈矛何時而不有奚獨江也與哉客曰吾聞命矣吾將事遠遊發本緇也而何為素齒本縝也而何為疏眸本瞭也而何為眊耳本聰也而何為瞶手本攫也而何為疲足本趨也而何為痿肩能負何為老而痹身能任何為病而弱顏能丹何為衰而枯此意可省其殆生之所以死者耶殆死之所以形見其徵者耶知生之所以死者則知死之所以生矣夫人之形日日有生生而不知所以寶其生時時有死死而弗知所以救其死及其偃然臥溘然冥然後隨而哀之噫亦晚矣夫早服重積者非至人烏足語此上品上藥神與氣精精能生氣氣能生神則精氣又生神之本也保精以裕氣裕氣以養神此長生之要方但心為精主意為氣馬心馳意動則精氣隨之行故正心誠意為中心柱子為此雖然猶是初功須到得心慮俱泯神識兩忘方是真人境界心慮俱泯神識兩忘為何泯其心所以存其心忘其神所以養其神氣盛神全自然底於神化顧色泉生平好奉道旨偶夜夢之海上有二人從逐而行相謂曰此君姓顧篤好學仙色泉顧而問之一人高聲曰仙沒有無欲即仙因與同東行指海中而去醒而自思疇昔所夢非仙也邪余因無欲即仙一語甚近道志之黃可齋言嘉靖年間至京遇內膳來自吏部李古沖所得嘗一臠味極咸不可入口蓋諸物俱用秋石煮制故耳大抵內膳烹調五味過厚食之至有不知其何物者因言食淡極有益五味盛多能傷生彼曾至東光縣村落中三老人昆弟俱年八十餘極強健問之云此地難得鹽吾輩盡淡食且務農無外事此不可解養生哉可齋亦食淡已十年丹書云食淡精神爽老子云五味令人口爽以此觀之五味之用可無慎哉天食人以五氣地食人以五味今人口鼻中氣喘急氣出反為天地所盜得天氣之養者寡日常所養惟賴五味若過多偏勝則五臟偏重不惟不得養且以戕生矣試以真味嘗之如五穀如菽麥如瓜果味皆淡此可見天地養人之本意至味皆在淡中今人務為濃厚者殆失其味之正邪古人稱鮮能知味不知其味之淡耳胡浦南巡撫西江以勞勩致衰疾聞方士言乃多索民間乳飲每晨進甌許無驗又多索松子取實日進數盂代餐飯半月餘更覺虛疲不可支得告歸竟不起此胡沙岡言因思物有形質豈能復化為精氣況諸香走竄腠理耗散元精其不驗宜矣夫善養生者豈徒特藥物已哉王陽明詩曰飢來吃飯倦來眠只此修元元更元說與世人渾不解卻於身外覓神仙昔慧海師或問修道如何用功師曰飢來吃飯困時即眠一切人吃飯時不肯吃百種需索睡時不肯睡千般計較眠食不得自如豈得長生邪嘗舉示二則公案於道友且問百尺竿頭更進步如何道曰飢食困眠猶是欲界須陽長陰消至氣滿不思食神滿不思睡方是究竟欲最難制惟斷乃成姻家董三岡性剛果年六旬始舉子既育之日曰吾將絕欲延壽觀此子之成立也諸姬別館自此俱異處壽七十八而終余聞嚴介溪因閫中不和年方四旬余即絕欲至後貴極人臣果八十五終寶精之驗如此崑山周六觀蓋癯然一儒也余曾識荊能詩善畫作趙體書亦逼真又好客好古玩好聲伎好鼓琴余私念此君精神如此諸好畢集何以支久逾年周果不祿以此見人生所好自當專一若多好多能反能耗神損精其殆與食少事煩者同一機邪張全山官學職年八十有六有少容陳泰嚴談其為人甚可法官雖小若以為貴家雖貧若以為富年老生一子且幼若以為眾且壯也欣然無憂戚之色且不形之論議真實作自家事宜其壽也因憶全山對徐存齋云彼蒼報施決不差爽然則全山之得壽其亦有由致與馬見田善談元理年六十有五而鬚髮盡黑李少白不善談元理行年七十而鬚髮亦黑有少容予嘗以養生術叩見田曰不食鹹不飲茶寶養精氣神為主日坐一室無所事事及叩少白少白無言但日嬉嬉然不關心世務雖患難無憂戚之色而已然未常絕足城市然則二君致壽果相符邪抑外不相符而中實無異邪心動則神疲凡諸技倆營營與人角勝負者未有不減年筭者也技倆之中作詩弈棋勞神獨甚周萊峰云某之所見以弈傷生者四人矣宋豫齋王連川王汾源郭南洲是已又云孫李泉五更作詩以勞成疾而卒陳雨泉云王同墟與客弈忽瞑目呼之不應則死矣弈之勞神如此噫傷生之事豈獨在酒色之間已哉嘉定陸筠臺少病寒證瘥而不慎遂病亡陽稍聞人聲輒悸欲死服藥累年無效陸乃盡除藥餌日事睡臥待斃而已如是者五年病似少瘥性頗通靈門有隸人至呼曰隸人至矣有友人至呼曰有友人某至已而數里外之事率能前知更年餘乃起如少壯時能挽他有力人不能挽之弓既病起累月少汩人事靈知遂昧不復如其病臥時矣與余友善後得子號蘭室過佘山遇顧豫齋與語豫齋好靜修築館佘山彌歲不歸談內養一訣止是專氣致柔如嬰兒作不生計則長生可冀若分別爾汝高下有敬慢有愛憎皆是有生後事非未生前工夫也此言真得修養之奧內養秘訣得之未真切未可輕試屢有因之而召禍者曾見謝賓山之徒試內視之訣行火太急未期痢下五色死有一蘇友從方外學閉氣訣於某塔寺僅半歲亦病痢下而亡某士夫聞一同年病疽發而殞云此必曾學坐功也詢之果然以是知遇訣未真欲益反損試觀人間煉黃白朮火候少差鼎爐隨失況於人身又非鼎爐可見者比下工試手者其慎無倚信哉色易溺人聖人亦不能卒制止是遠之而已故曰去讒遠色遠之自可馴致於絕也飲食亦易動饕貪故曰君子遠庖廚也旨酒則疏儀狄而絕之疏之云者殆亦遠之義與因談食色性也之義而漫論及此不知可測聖賢制欲之真方否道者謝賓山別去數年復來謁云別後過建業浮彭蠡之袁南饒廠之間訪龍虎山遺蹟年餘逾匡廬走荊襄鄭衛諸境已而過河間徒步真保長途以及北都居三年復還寓金焦歲余訪賢日久曾無一遇但只勘得世情熟破問世情若何曰只是要佔便宜損人利己而已遇富人則敬遇貧人則賤在在皆然語音不同其情一如既而曰只討一人我平等人亦不易得況肯損己利人何以學道余聞之悚然果能人我一如是謂無我是謂克己巍巍聖境緲不可即吾鄉佘山廟塑像甚工聞寺僧云舊有一塑工某姓來自江西經歲余塑諸像金澤寺像亦其人所塑成而病諸侶欲為延醫工卻之曰無以為也吾想像臆度盡吾神矣此所以病也世豈有藥物能復吾神哉竟死仙廟諸像今具在諸剎罕見其比龍生九子不成龍各有所好囚牛平生好音樂今胡琴頭上刻獸頭是睚眥平生好殺今刀柄上龍吞頭是嘲風平生好險今殿角走獸是蒲牢平生好鳴今鐘上獸紐是狻猊平生好坐今佛座獅子是霸下平生好重碑坐獸是狴犴平生好訟今獄門獅子頭是贔屓平生好文今碑兩旁龍是蚩吻平生好吞今殿脊獸頭是惟龍無好所以成龍此可以證無欲即仙之旨龍川紀事載仙都山道士論養生有內外精氣內也非金石所能堅凝四肢百骸外也非精氣所能變化欲事內必調養精氣極而後內丹成內丹成則不能死矣然隱居人間久之或托尸解而未能變化輕舉蓋四大本外物和合而成惟外丹然後可以點瓦礫化皮骨飛行無礙矣然內丹未成內無交之則服外丹者多死余謂此論固為唐皇服丹燥渴而發然以內丹為精氣則膠於凡軀不知藥自外來之旨以外丹為金石則滯於形質而不知從有入無之妙豈足通元家之奧義邪
