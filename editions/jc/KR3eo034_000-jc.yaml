股除五絡之氣利腸胃去邪氣掩左脛屈右膝內壓之五息止引心肺去風虛令人明目張脛兩足指號五息止令人不轉筋兩手牽膝置心上五息止愈腰痛外轉兩足十通內轉兩足十通五息止復諸勞右即上彭祖谷仙臥引除百病延年益壽要術凡十節五十息五五二百五十息欲導引常夜半至雞鳴平旦為之禁飽食沐浴王子喬八神導引法延年益壽除百病法曰枕當高四寸足相去各五寸手去身各三寸解衣被髮正偃臥勿有所念定意乃以鼻徐納氣以口出之各致其藏所竟而復始欲休先極之而止勿強長息久息乃自長矣氣之往來勿令耳聞鼻知微而專之長遂推之伏兔股胻以省為貴若存若亡為之百遍動腹鳴氣有外聲足則得成功成功之士何疾而已喉嚨如白銀環一十二重系膺下去得肺其色白澤前兩葉高後兩葉卑心系其下上大下銳率率赤如蓮華未開倒懸著肺也肝系其下色正青如鳧翁頭也六葉抱胃前兩葉高後四葉卑膽系其下如綠綈囊脾在中央亦抱正黃如金鑠鑠然也腎如兩伏鼠夾脊直臍肘而居欲得其居高也其色正黑肥肪絡之白黑昭然胃如素囊念其屈折右曲無汙穢之患肝藏魂肺藏魄心藏神脾藏意腎藏精此名神舍神舍修則百脈調邪病無所居矣小腸者長九尺法九洲也一云九土小腸者長二丈四尺諸欲導引虛者閉目實者開目以所苦行氣不用第七息止徐徐往來度二百步所卻坐小嚥氣五六不瘥復如法引以愈為效諸有所苦正偃臥被髮如法徐以口納氣填腹自極息欲絕徐以鼻出氣數十所虛者補之實者瀉之閉口溫氣咽之三十所腹中轉鳴乃止往來三百步不愈復為之病在喉中胸中者枕高七寸病在心下者枕高四寸病在臍下者去枕以口納氣鼻出氣者名曰補閉口溫氣咽之者名曰瀉閉氣治諸病法欲引頭病者仰頭欲引腰腳病者仰足十指欲引胸中病者挽足十指引臂病者掩臂欲去腹中寒熱諸不快若中寒身熱皆閉氣張腹欲息者徐以鼻息已復為至愈乃止一平坐生腰腳兩臂覆手據地口徐納氣以鼻吐之除胸中肺中痛嚥氣令溫閉目也二端坐生腰以鼻納氣閉之自前後扭頭各三十除頭虛空耗轉地閉目搖之三端坐生腰以左脅側臥以口納氣以鼻吐之除積聚心下不快四端坐生腰徐以鼻納氣以右手持鼻除目晦淚苦出去鼻中息肉耳聾亦然除傷寒頭寒頭痛恍恍皆當以汗出為度五正偃臥以口徐納氣以鼻出之除裡急飽食後小咽嚥氣數十令溫寒者使人乾嘔腹痛以口納氣七十所大填腹六右脅側臥以鼻納氣以口小嚥氣數十兩手相摩熱以摩腹令其氣下出之除脅皮膚痛七息止七端坐生腰直上展兩臂仰兩手掌以鼻納氣閉之自極七息中痛息名曰蜀王臺除脅下積聚八覆臥去枕立兩足以鼻納氣四四所復以鼻出之極令微氣入鼻中勿令鼻知除身中熱背痛九端坐生腰舉左手仰其掌卻右手除兩臂背痛結氣也十端坐兩手相叉抱膝閉氣鼓腹二七或三七氣滿即吐即氣皆通暢行之十年老有少容十一端坐生腰左右傾閉目以鼻納氣除頭風自極七息止十二若腹中滿食飲苦飽坐生腰以口納氣數十以便為故不便復為之有寒氣腹中不安亦行之十三端坐使兩手如張弓滿射可治四肢煩悶背急每日或時為之十四端坐生腰舉右手仰掌以左手承左脅以鼻納氣自極七息除胃寒食不變則愈十五端坐生腰舉左手仰掌以右手承右脅以鼻納氣自極七息除瘀血結氣十六兩手卻據仰頭自以口納氣因而咽之數十除熱身中傷死肌十七正偃臥端展足臂以鼻納氣自極七息搖足三十而止除胸足中寒周身痹厥逆十八偃臥屈膝令兩膝頭內向相對手翻兩足生腰以口納氣填腹自極七息除痹疼熱痛兩腳不隨十九覺身體昏沉不通暢即導引兩手抱頭宛轉上下名為開脅二十踞伸右腳兩手抱左膝頭生腰以鼻納氣自極七息除難屈伸拜起腦中痛瘀痹二十一踞伸左足兩手抱右膝生腰以鼻納氣自極七息展左足著外除難屈伸拜起腦中疼一本除風目晦耳聾二十二正偃臥直兩足兩手捻胞所在令赤如油囊裹丹除陰下濕小便難頹小腹重不便腹中熱但口納氣鼻出之數十不須小嚥氣即腹中不熱者七息已溫氣咽之十所二十三踞兩手抱兩膝頭以鼻納氣自極七息除腰痹背痛二十四覆臥旁視兩踵生腰以鼻納氣自極七息除腳中弦痛轉筋腳痠疼二十五偃臥展兩手外踵指相向以鼻納氣自極七息除兩膝寒脛骨疼二十六偃臥展兩腳兩手兩踵相向以鼻納氣自極七息除死肌不仰足脛寒二十七偃臥展兩手兩腳左傍兩足踵以鼻納氣自極七息除胃中食苦嘔二十八踞生腰以兩手引兩踵以鼻納氣自極七息布兩膝頭除痹嘔也二十九偃臥展兩手兩腳仰足指以鼻納氣自極七息除腹中弦急切痛三十偃臥左足踵拘右足拇指以鼻納氣自極七息除厥逆疾人腳錯踵不拘拇指依文用之三十一偃臥以右足踵拘左足拇指以鼻納氣自極七息除周身痹三十二病在左端坐生腰左視目以口徐納氣而咽之數十所閉目目上入三十三病在心下若積聚端坐生腰仰向日仰頭徐以口納氣因而咽之三十所而止開目三十四病在右端坐生腰右視目以口徐納氣而咽之數十所開目王喬導引圖一在彭祖中七日伸左腳屈右膝內厭之五息止引脾氣去心腹寒熱胸臆邪脹彭祖導引圖導引服解發東向握固不息一通舉手左右導引以手掩兩耳以指掐兩脈邊五通令人目明發黑不白治頭風淘氣訣訣曰凡人五臟亦各有氣夜臥閉息覺後欲服氣者先則淘轉令宿食故氣得出然後調服其法閉目握固仰倚兩拳於乳間兩膝舉背及尻內閉氣鼓氣海中氣便自內出斡而轉之呵而出之一九或二九止是淘氣畢則調之導引服東向坐不息四通啄齒二七愈齲齒痛或曰治蚶不齲嚥氣訣夫人皆稟天地元氣而活之每咽吐納則內氣與外氣相應自氣海中隨吐而上直至喉中但喉吐極際則輟口連鼓而咽之郁然有聲汩汩然後左邊而下至經二十四節如水歷坎聞之分明也女人則從右邊而下如此則內氣相固皎然別也以意送之手摩之令速入氣海氣海在臍下三寸是也亦謂下丹田初服氣人上焦未通以此摩而助之務令速下若氣已流通不摩而自下一閉口而連咽止二咽號云行一濕咽取口中津液相和咽之謂之雨施服氣入內氣未流行每一咽則施之不可遽行至連咽也三年行之乃以功成也導引服正住倚壁不息行氣從頭至足止愈疽痂大風偏枯諸痹或曰行氣從足起令上氣至頭止導引服氣先偃臥閉口鼓腮腹令氣滿口咽咽時作意蹙向後日夕為之妙也導引服踞地壁角中兩手抱膝低頭不息九通愈頸腰腳痛一曰治勞他同導引服左右伸兩臂不息九通愈臂痛勞風氣不隨塞閉導引服正坐仰天呼出酒食醉飽之氣即飢醒宜夏月行之令人溫涼不躁導引服正坐張鼻服氣排至臍下小口微排不息以除結宜夏月喜熱導引服小低頭微息但抱手左右不息十二通消食令人輕身益精神配氣不得入或導引服瀉行氣皆低頭抱踞以繩自縛低頭不息十通消食輕身導引常以兩手如拓千斤之右左右互相為之終身無疾導引兩手據地縮身曲脊向上三舉之此勢每日為之補益延年當為之時勿當風仍須閉氣每一服了吐氣莫令耳聞若勞倦以呬吐之臟中病若冷則吹氣若熱呼氣出之矣導引服蛇行閉氣偃臥正直復起踞隨王相所在向之不息少食通暢服氣為糧以唾為漿春出冬藏華池玉漿甜如飴子勉行之勿生疑一本春生夏養冬合內藏閉目前光他同導引思氣者呵屬心心主舌口乾澀氣不通及諸邪氣呵以治之如大熱大開口小熱小開口亦須作意量宜治之過度則必損導引思氣者呼屬脾脾主中宮土如氣微熱腹肚脹滿氣悶不泄以呼治之導引思氣者噓屬肝肝主目目溫赤噓以治之導引思氣者吹屬腎腎主耳腰膝冷陽道衰吹以治之導引思氣者呬屬肺肺主鼻有寒熱不合呬以治之呵呬呼噓吹嘻是五臟各主一氣及勞極依理之立瘥導引之法臥床當令高無令地氣上衝鬼氣有干導引之法無令躁暴者一身之賊導引之法無令向北反神有犯每事不言亥子日不向北唾減損年命導引服思司命兩人更回左右旋思常見導引服思神光黃且明月在己邊晝夜常見導引服思五臟形氣色串周流身匝導引服思五臟色神在所處自此以下人形皆五導引服思五臟化為龍魚導引服思精臍中腎氣正赤白從背上頭下迎身名曰還精導引服思心為火如斗辟惡氣導引服思飛分身飛行常念有人若在己前後久可得與語南北在所問上抄集寧先生導引圖異同事道林導引要旨低頭以兩手抱兩足不息十二通主消穀令人身輕益精氣諸邪惡百病不得入踞坐合兩膝張兩足不息五通治鼻口熱瘡及五痔累膝坐以兩手據兩膝上伸腰極起頭引之不息三通治膚交趺坐叉兩手著頭上挽頭結下著地不息五通令人氣力自益長跪坐曲手以抱兩乳下左右膝搖不息令人延年益壽住年不老以兩手抱兩膝著胸前不息三通治腰痛腎疝及背膂中疼痛大箕坐以兩手捉兩足五指自極低頭至地不息十二通治頸項腰背痛又令人耳目聰明交趺坐以兩手交叉著頭下自極不息六通治腰痛不能反顧仰頭以手摩腹以手持足距塵不息十二通治膝痹不任行步及腰背痛伸兩腳以兩手指著足指上治腰痛如折及歃血瘀血屈兩腳坐臥住足五指治腰背痛臥以手摩腹至足以手持引之不息十二通治腳痹濕及腰背痛左手急引發右手急掐項中利陰陽之勢正坐以兩手交背後治虛羸大小便以一手攀上懸繩一手自持腳治痔及腫伏蹲踞以兩手抱兩膝低頭不息九通治頸痛勞極腰痛百節蹉錯正坐仰天呼出飲食醉飽之氣立消也夏天為之令人自然涼不熱以兩手大指捻鼻孔不息令人陰陽不倦外轉兩足十過內轉兩足十過補虛損益氣赤松子坐引之道能常為之令人耳目聰明延年益壽百病不生其先長跪兩手向前各分開以指外向次復長跪兩手夾叉腰左右次復長跪以右手反腰左手高頭而止次復長跪右手伸後去左手叉腰前次復緩形長跪左右手更伸向前更屈從後叉腰次復長跪高舉兩手二六功課撒開兩手魚躍鳶飛打破桶底中流自在此是轉身向上一路還從法外護持所以飢食困眠假借四大行住坐臥不離色身但令二六時中隨方作課使生氣流行身無奇病只此著衣吃飯家風便是空假中觀正局辰夙興整衣襟坐明窗中調息受天氣進白湯一甌勿飲茶櫛發百餘遍使疏風清火明目去腦中熱盥漱畢早餐宜粥宜淡素飽徐行百步以手摩腹令速下食天氣者亥子以來真氣也靜而清喧而濁故天氣至巳午而微矣巳讀書或楞嚴或南華或易一卦循序勿氾濫勿妄想勿聚談了大義知止勿積疑倦即閉目咽津數十口見賓客寡言以養氣午坐香一線畢經行使神氣安頓始飯用素湯當飢而食未飽先止茶滌口膩漱去乃飲多行步少坐勿傴胸中悶則默呵氣二三口凡飲食之節減滿受虛故當飢節其滿未飽留其虛未獵史看古人大局窮事理流覽時務事來須應遇物來須識破勿晝臥無事無物不妨事物之來涉獵流覽都是妙門生趣讀書人日用不知申朗誦古人得意文一二篇引滿數酌勿多飲令昏志或吟名人詩數首弄筆仿古帖倦即止吟誦浮白以王真氣亦是張顛草書被酒入聖時也酉坐香一線動靜如意晚餐宜早課兒子一日程如法即止小飲勿沉醉陶然熱水濯足降火除濕暮漱滌一日飲食之毒戌燈夜默坐勿多思勿多閱多思傷心多閱傷目坐勿過二更須安睡以培元氣臥必側身屈上一足先睡心後睡眼睡心是止法睡眼是觀法亥子亥末子初嬰始孩也一身元氣於焉發陳當其機候起坐擁衾虛心靜寧無為而行約香一線固其命門精神日余元氣大盈醒而行之難老而長存也醜寅醜寅間精氣發生時也勿酣睡靜守令精住其宅或轉側臥如弓氣亦周流不漏泄如句萌不折迎生氣也卯醒見晨光披衣坐床叩齒三百轉動兩肩調其筋骨以和陰陽振衣下榻俾勿濫觴靈劍子引導子午記夜半子夜半子少陽之氣生於陰分紓伸轉掣混元經戌亥子三時陰氣生而人寐既寐即氣滯於百節養生家睡不厭縮覺不厭伸轉掣務令榮衛周流鼓腹淘氣淘氣決閉目仰面停兩手於乳間側立兩膝舉腰背鼓氣海中氣使內外轉呵而去之不使耳聞一九二九止凡欲服氣須淘轉呵出獨令宿食消化故氣出盡然後始可調而服之服氣人睡覺口乾舌澀是五臟熱即大開口微呵數十遍候喉中津液出是熱退而五臟涼矣取氣太衝踴身令起平身正坐兩手叉項後仰視舉首左右招搖使項與手爭次以手攀腳稍閉氣取太衝之氣太衝二穴在大指本節後二寸骨罅間陷者是挽如引弓左挽如引弓狀右挽亦如之大洞真經按摩篇叉兩手乃度以掩項後仰面視上舉手使項與手爭為之三四令人精和血通風氣不入能久行之無病畢又屈動身體伸手四極反張側掣宣搖百關為之各三華倫別傳云人身欲得勞動但不當極爾體常動搖各氣得血脈流通戶樞不蠹流水不腐形體亦然真人導引蓋取諸此元通經云元氣難積而易散關節易閉而難通故修生之士以導引為先氣息平定內視神宮眉間一寸為明堂深三寸為洞房上入三寸為上丹田泥丸宮中丹田為絳宮下丹田為氣宮各有神人故曰神宮叩齒及牙先叩齒當門小鳴後叩大牙大鳴真誥云叩齒所以警身中諸神神不得散則鬼氣不得侵捏目四眥太上三關經常欲以手按目近鼻之兩眥閉氣為之氣通即止終而復始常行之眼能洞見又云導引畢以手按目四眥三九過令見光明是撿眼神之道久為之得見靈也摩手熨目用兩手掌側立摩掌如火有硫黃氣乃止開目熨睛數次對修常居內經云常以手按眉後小穴中二九一年可夜書亦可於人中密行之勿語其狀眉後小穴為上元六合之府主化眼生暈和營精光長珠徹瞳保煉目瞳是真人坐起之道一名真人常居真諺云子欲夜書當修常居真人所以能旁觀四達八遐照燭者實常居之數明也紫微夫人誥仰和天真俯按山源天真是兩眉之角山源是鼻下人中也兩眉之角是徹視之津梁天真是引靈之上房灌溉中嶽消魔經鼻欲得按其左右唯令無數令人氣平所謂灌溉中嶽名書帝籙俯按山源紫微夫人云俯按山源是鼻下人中之本側在鼻下小谷中也楚莊公時市長宋來子常灑掃一市常歌曰天庭發雙華山源障陰邪清晨按天馬來詣太清家真人無那隱又以滅百邪常歌此乞食一市無人解其歌者乞食公西嶽真人馮延壽也周宣王時史官也手為天馬鼻為山源每經危險之路廟貌之間心中有疑忌之意者乃先反舌內向咽津一二過畢以左手第二節三指攝兩鼻孔下人中之本鼻中隔孔之內際鼻中隔之際曰山源一名鬼井一名神池一名魂臺手按山源則鬼井閉門手薄神池則邪根散分手臨魂臺則玉真守關於是感激靈根天獸來衛千精震伏莫幹我氣此自然之理使然也鼻下山源是一身之武津真邪之通府守真者所以遏萬邪在我運攝之耳營治城廓消魔經云耳欲得數按抑左右令無數使人聰徹所謂營治城廓名書皇籍擊探天鼓天鼓者耳中聲也以兩手心緊按耳門以指擊其腦戶常欲其聲壯盛相續不散一日三操有益於下丹田或聲散不續無壯盛者即元氣不集宜整之拭摩神庭真誥云面者神之庭發者腦之華心悲即面焦腦減則發素太素經云一面之上常欲得兩手摩拭之使熱高下隨形皆使極匝令人面有光澤皺斑不生行之五年色如少女所謂山澤通氣常盈不沒又云勤而行之手不離面乃佳上朝三元真誥云順手摩發如理櫛之狀使發不白以兩手乘額上謂之手朝三元固腦堅發之道也頭四面以手乘之順發就結唯令多也黃庭經云一面之神宗泥丸泥丸九真皆有房方圓一寸處其中下摩生門黃庭經云兩部水王對生門生門者臍也閉內氣鼓小腹令滿以手摩一周天山巔取水此在口訣氣海與腎相連屬壬癸水性就下水歸於海不能獨升必以陽配陽既下臨陰即上報故化為雲霧蒸為甘雨潤澤枯槁百骸九竅無所不達煙蘿子所謂火逼水云濛濛五行相連會成功啟玄子亦云無出則不入無降則無升海底覓火此在口訣世人不蒙師授多將心火為火火屬神且內中壚鼎在心下得心火為火其火在鼎上千經萬論言火從下發未聞火從上來周易卦有水火既濟是上水下火火自臍下起水在鼎中生故曰上水下火訣云但從山頭取水海底起火重陽中取汞重陰中取鉛故行有路取有時世人竊用其道不受口訣反受其病通真子歌云解接無根木能挑海底燈古歌亦曰還丹修煉本無形元火烹來即漸成須信神仙路咫尺朗然飛步上青冥養虎嚥氣此在口訣陰真人云若欲長生當服內氣素問云聖人傳精神服天氣而通神明天氣者內氣也陰符經云天生天煞食元和之氣天不能煞地不能埋名之曰真人故修行之士飢食元和之氣渴飲華池之水老子所謂實其腹者此也若未絕粒人欲服氣當須少食務要腹中曠然虛靜然亦無早晚腹空則咽之然而所以要口訣者服氣須分內外辨清濁別咽喉不分內外則吸邪氣不辨清濁則無分兩不別咽喉則不入胃脘偷龍咽津此在口訣人之得體始於北極元泉之下元泉者真一也自丹田上朝舌下二竅謂之神水華池咀嚼至濃養生家名曰煉精合虛鼓漱攪成大藥其數一周天赤龍不能勝載方為鉛汞重寶內想神宮微微出氣作意咽之直令喉中作聲下入丹田中凝結如雞子潔白狀紫河車歌曰左為日兮右為月兩半同升合為一出彼玉池入金室大如彈丸黃如桔中有佳味甘如蜜子若得之慎勿失審能修之仙道畢內景經亦云舌下玄膺生死岸又曰玉池清水灌靈根審能修之命長存赤城長生記人身上之津液非漱咽則無以灌溉於五臟發其光澤也離卦用九坎卦用六太白真人云五行顛倒術龍從火里出五行不順行虎向水中生又曰欲知顛倒術相剋乃相生又曰欲知顛倒由離坎須識浮沉定主賓草堂歌曰若欲學長生先須筭五行五行不顛倒還丹不解成會得五行顛倒方知利中有害害卻成利珞琭子云每見凶中有吉吉乃先凶陰符經所謂天有五賊見之者昌且以天地萬物觀之無有不顛倒者然須識真五行方解顛倒術曹真人云五行處處有豈是真人惜欲識五行真一水還一石鄭真人云一陰一陽之謂道一水一石之謂丹又歌曰為得鉛中金兼得石中水蓋水中出金石中出液日南午所謂天地設位而易行乎其中矣日南午太陰之氣乘於余陽燕坐燕坐者儒家所謂潛神釋氏所謂坐禪左玄真人云夫欲修生放舍外事無令乾心然後安坐內觀於心若覺一念起即除滅其法要於淨室寬衣疊足蟠坐閉目安穩一切善惡都莫思量則元氣自復兀然而佳矣調息太白真人授沖和子云神廬者鼻也夫欲安元和之氣先淨室中調令氣微微然小則生之門大則死之路故生死之機在此矣啟之又不可閉之又難為但令微之又微不得令奔而口吐故老子云綿綿若存用之不勤容成子吐故納新察鼻之出入內觀經云元氣入鼻灌泥丸也保神經云欲得延年壽無過治髓門髓門者玄牝之門也心無外緣黃庭經云臍下一寸名曰下丹田劉真君歌曰欲得不死長在天須將元氣守丹田大抵心無外緣是真人初修道法所謂收視為聽其法要喘息不出於鼻內思惟不離於身中老子云雖有榮觀燕處超然君子終日行不離輜重皆此義也以神馭氣尹真人曰若神能馭氣即鼻不失於息真人以神為車以氣為馬終日行而不失上至泥丸下至命門二境相通可救老殘若呼不得神宰一息不全若吸不得神宰一息不全若能息息之中神氣相合子母不相離即當內結求死不得功成之後男子關元無聚精女子臍下不結嬰若神氣各馳情為欲牽元氣下降自不能制遂有畎澮之憂若息息之中神氣相持子母不離雖有會合常味於無味乃於得術矣西竺迦葉留形馬明龍樹並得此密傳於世得聞此者皆累世積福於仙錄有緣乃可遇之古歌曰若欲長生學伏心莫觀他事去來今但向定中神氣合何憂不至大仙林閉神廬以定火候草衣子歌曰採煉鉛汞在午前一陰生即破其乾所以修生之士陽時則服氣午後只閉息而已所以煉陰也赤城記所謂煉氣者閉息也閉息千日則五臟不交六腑不傳百脈不行百關自湊神氣自御萬化自定天地不能盜其體陰陽不能衰其形從一至十從十至百從百至千閉息一百二十為小乘閉息一千二百為中乘閉息一萬二千為大乘晝夜計一萬三千五百息呼吸計五百四十動為一息去仙不遠矣其術湛然無思澄心燕坐昂頭瞑目閉息以右手第二指第三指節謂之生死門受神之所乃以數珠按之心默數之息急即右轉咽喉不可令大急急則微出外氣復吸則上此在口訣開生門而復嬰兒胎息者抱一守中之法也嬰兒在腹中取氣於臍管十月脫胎即取氣於神廬真人鼻無出入其息深深老子所謂復歸於嬰兒者胎息之謂也胎息歌云鼻口非呼吸方為胎息功雖居宇宙內如在胞胎中世人為生門有臍蓋閉塞所以氣出不得臍虛之後求息則息自然氣從此處出鼻中無息也蟠足正坐兩手交在臍上者為臍虛存一之後應從此處出也聖胎內結聖胎內結握固凝然衛生之經思過半矣自子至午為煉陽自午至酉為煉陰陽主乎動陰主乎靜陽不欲溢陰不欲覆陰平陽秘精神乃治然而知之非難持之在久無間斷與道相應則內外俱進而還丹之事可議矣穀神論含津煉氣吐故納新上入泥丸下注丹田謂之內丹陽龍陰虎木液金精二氣交會烹煉而成謂之外丹修道之人先成內丹後煉外藥內外相應即致神仙煙蘿子云真外應丹自來金華山人云只修真氣不修丹到了多應變化難定機子亦云雖是長生客未為拔宅仙更須修大藥方始得飛仙導引訣並閉息為之息滿急則微微吐放仰托一度理三焦雙手極力向上如擎天狀托之左右各三次左肝右肺如射鵰先左引次右引極力為之如前東肝單托西通腎右手握固柱右腎堂左手極力托之左手握固柱左腎堂右手極力托之左右各三次五勞回顧七傷調右手抱左肘則左顧左手抱右肘則右顧皆極力三作游魚擺尾通心臟雙展兩臂擺之數多為妙手攀雙足理於腰正坐舒展雙足以雙手取足心極力三攀之次鳴天鼓三十六兩手掩耳後頭敲雙手緊掩兩耳叩齒三十六下以第二指敲耳後骨養生導引法全中風門一法正倚壁不息行氣從頭至足止愈疝大風偏枯諸風痹一法仰兩足指五息止引腰去背痹偏枯令人耳聞聲常行眼耳諸根無有掛礙一法以背正倚展兩足及指瞑心從頭上引氣想以達足之十趾及足掌心可三七引候掌心似受氣止蓋謂上引泥丸下達湧泉是也一法正柱倚壁不息行氣從口趣令氣至頭始止治疽痹大風偏枯一法一足蹋地足不動一足向側相轉身欹勢並手盡急回左右迭二七去脊風冷偏枯不通潤一法手前後遞互拓極勢三七手掌向下頭低面心氣向下至湧泉倉門卻努一時取勢散氣放縱身氣平頭動膊前後欹側柔轉二七去膊並血冷筋急漸漸如消一法兩手抱左膝生腰鼻納氣七息展右足除難屈伸拜起脛中痛萎一法兩手抱右